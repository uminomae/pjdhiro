<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1e3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="40" y="52" font-family="system-ui, sans-serif" font-size="15" fill="#94a3b8" letter-spacing="3">SESSION REPORT</text>
  <text x="40" y="90" font-family="system-ui, sans-serif" font-size="28" fill="#f1f5f9" font-weight="bold">10時間を超える自律的作業の完走</text>
  <text x="40" y="118" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">2026-03-18 — Claude Code + 50 background agents</text>

  <!-- Divider -->
  <line x1="40" y1="138" x2="760" y2="138" stroke="#334155" stroke-width="1"/>

  <!-- Pipeline visualization -->
  <!-- Phase labels -->
  <text x="60" y="175" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">INVESTIGATION</text>
  <text x="60" y="225" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">REPORT</text>
  <text x="60" y="275" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">PDF + PUBLISH</text>

  <!-- Investigation bar (30/30) -->
  <rect x="180" y="160" width="540" height="24" rx="4" fill="#1e293b"/>
  <rect x="180" y="160" width="540" height="24" rx="4" fill="url(#bar)" opacity="0.9"/>
  <text x="710" y="177" font-family="system-ui, monospace" font-size="13" fill="#f1f5f9" font-weight="bold" text-anchor="end">30/30</text>

  <!-- Report bar (30/30) -->
  <rect x="180" y="210" width="540" height="24" rx="4" fill="#1e293b"/>
  <rect x="180" y="210" width="540" height="24" rx="4" fill="url(#bar)" opacity="0.9"/>
  <text x="710" y="227" font-family="system-ui, monospace" font-size="13" fill="#f1f5f9" font-weight="bold" text-anchor="end">30/30</text>

  <!-- Publish bar (30/30) -->
  <rect x="180" y="260" width="540" height="24" rx="4" fill="#1e293b"/>
  <rect x="180" y="260" width="540" height="24" rx="4" fill="url(#accent)" opacity="0.9"/>
  <text x="710" y="277" font-family="system-ui, monospace" font-size="13" fill="#f1f5f9" font-weight="bold" text-anchor="end">30/30</text>

  <!-- Divider -->
  <line x1="40" y1="305" x2="760" y2="305" stroke="#334155" stroke-width="1"/>

  <!-- Stats row -->
  <text x="80" y="340" font-family="system-ui, monospace" font-size="32" fill="#3b82f6" font-weight="bold" text-anchor="middle">90</text>
  <text x="80" y="358" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">調査ファイル</text>

  <text x="220" y="340" font-family="system-ui, monospace" font-size="32" fill="#8b5cf6" font-weight="bold" text-anchor="middle">30</text>
  <text x="220" y="358" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">レポート</text>

  <text x="360" y="340" font-family="system-ui, monospace" font-size="32" fill="#10b981" font-weight="bold" text-anchor="middle">30</text>
  <text x="360" y="358" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">PDF</text>

  <text x="500" y="340" font-family="system-ui, monospace" font-size="32" fill="#f59e0b" font-weight="bold" text-anchor="middle">60</text>
  <text x="500" y="358" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">レビュー</text>

  <text x="640" y="340" font-family="system-ui, monospace" font-size="32" fill="#ef4444" font-weight="bold" text-anchor="middle">70+</text>
  <text x="640" y="358" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">コミット</text>

  <!-- Footer -->
  <text x="40" y="400" font-family="system-ui, sans-serif" font-size="11" fill="#475569">30 academic domains x 3 phases + reports + PDF + publish — fully autonomous pipeline</text>
</svg>
