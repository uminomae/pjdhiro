<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for arrowhead marker -->
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F5" />

  <!-- Title & Subtitle -->
  <text x="600" y="80" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="48" font-weight="600" text-anchor="middle" fill="#333333">
    Four-Layer Model
  </text>
  <text x="600" y="125" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="20" text-anchor="middle" fill="#555555">
    A structural reading of awareness as a dynamic process
  </text>

  <!-- Layer 0: Bodily Footing -->
  <g id="layer-0">
    <rect x="50" y="220" width="245" height="450" rx="8" fill="#EAE6E2" />
    <text x="172.5" y="390" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="16" text-anchor="middle" fill="#333333" style="line-height: 1.4;">
      <tspan x="172.5" dy="0" font-size="22" font-weight="600">Layer 0: Bodily Footing</tspan>
      <tspan x="172.5" dy="2.5em">The physical state (respiration,</tspan>
      <tspan x="172.5" dy="1.4em">tension, etc.) that provides the</tspan>
      <tspan x="172.5" dy="1.4em">footing for experience, prior to</tspan>
      <tspan x="172.5" dy="1.4em">any problem judgment.</tspan>
    </text>
  </g>

  <!-- Layer 1: Discrepancy -->
  <g id="layer-1">
    <rect x="335" y="220" width="245" height="450" rx="8" fill="#DDE5EA" />
    <text x="457.5" y="390" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="16" text-anchor="middle" fill="#333333" style="line-height: 1.4;">
      <tspan x="457.5" dy="0" font-size="22" font-weight="600">Layer 1: Discrepancy</tspan>
      <tspan x="457.5" dy="2.5em">The detection and selection of</tspan>
      <tspan x="457.5" dy="1.4em">a mismatch between prediction</tspan>
      <tspan x="457.5" dy="1.4em">and reality, forming the</tspan>
      <tspan x="457.5" dy="1.4em">threshold for unease.</tspan>
    </text>
  </g>

  <!-- Layer 2: Directional Interpretation -->
  <g id="layer-2">
    <rect x="620" y="220" width="245" height="450" rx="8" fill="#EADCB9" />
    <text x="742.5" y="380" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="16" text-anchor="middle" fill="#333333" style="line-height: 1.4;">
      <tspan x="742.5" dy="0" font-size="22" font-weight="600">Layer 2: Directional</tspan>
      <tspan x="742.5" dy="1.4em" font-size="22" font-weight="600">Interpretation</tspan>
      <tspan x="742.5" dy="2.5em">Interpreting a discrepancy as a</tspan>
      <tspan x="742.5" dy="1.4em">specific kind of problem (e.g.,</tspan>
      <tspan x="742.5" dy="1.4em">survival, trust), which orients</tspan>
      <tspan x="742.5" dy="1.4em">emotion and action.</tspan>
    </text>
  </g>

  <!-- Layer 3: Revision Margin -->
  <g id="layer-3">
    <rect x="905" y="220" width="245" height="450" rx="8" fill="#E1DDEF" />
    <text x="1027.5" y="390" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="16" text-anchor="middle" fill="#333333" style="line-height: 1.4;">
      <tspan x="1027.5" dy="0" font-size="22" font-weight="600">Layer 3: Revision Margin</tspan>
      <tspan x="1027.5" dy="2.5em">The capacity to hold a response</tspan>
      <tspan x="1027.5" dy="1.4em">without immediate action,</tspan>
      <tspan x="1027.5" dy="1.4em">preserving a margin for</tspan>
      <tspan x="1027.5" dy="1.4em">re-evaluation and revision.</tspan>
    </text>
  </g>

  <!-- Connectors -->
  <line x1="295" y1="445" x2="330" y2="445" stroke="#555555" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="580" y1="445" x2="615" y2="445" stroke="#555555" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="865" y1="445" x2="900" y2="445" stroke="#555555" stroke-width="2" marker-end="url(#arrowhead)" />
</svg>