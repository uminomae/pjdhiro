<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#FAF8F5" />

  <!-- Title and Subtitle -->
  <text x="600" y="85" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#333333">4層モデル</text>
  <text x="600" y="135" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" text-anchor="middle" fill="#555555">意識を作動の流れとして捉える構造的モデル</text>

  <!-- Layer Panels -->
  <g id="layer-0">
    <rect x="50" y="200" width="220" height="400" rx="12" ry="12" fill="#E6F0F9" stroke="#A8C5E1" stroke-width="1.5" />
    <text x="160" y="245" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#3D6A98">Layer 0</text>
    <text x="160" y="300" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#1C4973">身体的足場</text>
    <line x1="110" y1="335" x2="210" y2="335" stroke="#A8C5E1" stroke-width="1" />
    <text x="160" y="380" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" line-height="1.6" text-anchor="middle" fill="#1C4973">
      <tspan x="160" dy="0">呼吸、緊張、心拍など、</tspan>
      <tspan x="160" dy="1.6em">一人称経験が立ち上がる</tspan>
      <tspan x="160" dy="1.6em">土台となる身体の状態。</tspan>
    </text>
  </g>

  <g id="layer-1">
    <rect x="343" y="200" width="220" height="400" rx="12" ry="12" fill="#E6F5F0" stroke="#A8D6C1" stroke-width="1.5" />
    <text x="453" y="245" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#2A7C5B">Layer 1</text>
    <text x="453" y="300" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#16593D">差異の検出</text>
    <line x1="403" y1="335" x2="503" y2="335" stroke="#A8D6C1" stroke-width="1" />
    <text x="453" y="380" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" line-height="1.6" text-anchor="middle" fill="#16593D">
      <tspan x="453" dy="0">予測と現実のズレを検出し、</tspan>
      <tspan x="453" dy="1.6em">一部を違和感や欠けとして</tspan>
      <tspan x="453" dy="1.6em">前景化させるプロセス。</tspan>
    </text>
  </g>

  <g id="layer-2">
    <rect x="636" y="200" width="220" height="400" rx="12" ry="12" fill="#FFF2E6" stroke="#FFD1A8" stroke-width="1.5" />
    <text x="746" y="245" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#B36F2D">Layer 2</text>
    <text x="746" y="300" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#8C5215">意味の方向づけ</text>
    <line x1="686" y1="335" x2="806" y2="335" stroke="#FFD1A8" stroke-width="1" />
    <text x="746" y="380" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" line-height="1.6" text-anchor="middle" fill="#8C5215">
      <tspan x="746" dy="0">検出された差が何を意味</tspan>
      <tspan x="746" dy="1.6em">するかを解釈し、情動と</tspan>
      <tspan x="746" dy="1.6em">行動の方向を定める。</tspan>
    </text>
  </g>

  <g id="layer-3">
    <rect x="929" y="200" width="220" height="400" rx="12" ry="12" fill="#F0EAF7" stroke="#C9B2E1" stroke-width="1.5" />
    <text x="1039" y="245" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#6C4A8B">Layer 3</text>
    <text x="1039" y="300" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#4E2E6E">見直しの余地</text>
    <line x1="989" y1="335" x2="1089" y2="335" stroke="#C9B2E1" stroke-width="1" />
    <text x="1039" y="380" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" line-height="1.6" text-anchor="middle" fill="#4E2E6E">
      <tspan x="1039" dy="0">自動的な反応を保留し、</tspan>
      <tspan x="1039" dy="1.6em">再評価や更新を可能に</tspan>
      <tspan x="1039" dy="1.6em">する認知的な余地。</tspan>
    </text>
  </g>

  <!-- Connectors -->
  <g id="arrows" fill="#888888" stroke="#888888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 280 400 L 333 400" />
    <path d="M 333 400 L 323 395 L 323 405 Z" />

    <path d="M 573 400 L 626 400" />
    <path d="M 626 400 L 616 395 L 616 405 Z" />

    <path d="M 866 400 L 919 400" />
    <path d="M 919 400 L 909 395 L 909 405 Z" />
  </g>

  <!-- Footer Note -->
  <text x="600" y="750" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" text-anchor="middle" fill="#777777">
    ※これは意識の作動を理解するための一つの構造的モデルであり、確定した理論ではありません。
  </text>
</svg>