<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#FAF8F5" />

  <!-- Typography definitions (applied via attributes) -->
  <!-- font-family: 'Hiragino Sans', 'Noto Sans JP', 'Inter', 'Helvetica Neue', sans-serif -->
  <!-- text color: #333333 -->
  <!-- survival color: #D95F4A -->
  <!-- trust color: #4A9D9A -->

  <!-- Main Title -->
  <text x="600" y="80" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="42" font-weight="600" text-anchor="middle" fill="#333333">
    生存-信頼軸の概要
  </text>
  <text x="600" y="115" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="18" text-anchor="middle" fill="#666666">
    Overview of the Survival-Trust Axis
  </text>

  <!-- Axis System -->
  <g transform="translate(400, 450)">
    <!-- Trust Axis (Vertical) -->
    <line x1="0" y1="-300" x2="0" y2="300" stroke="#4A9D9A" stroke-width="2.5" />
    <path d="M 0 -300 l -6 12 h 12 z" fill="#4A9D9A" /> <!-- Arrowhead -->
    <text x="-30" y="-290" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="600" text-anchor="end" fill="#4A9D9A">関係・つながり</text>
    <text x="-30" y="-265" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14" text-anchor="end" fill="#4A9D9A">Connection</text>

    <!-- Survival Axis (Horizontal) -->
    <line x1="-350" y1="0" x2="350" y2="0" stroke="#D95F4A" stroke-width="2.5" />
    <path d="M 350 0 l -12 -6 v 12 z" fill="#D95F4A" /> <!-- Arrowhead -->
    <text x="340" y="30" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="600" text-anchor="end" fill="#D95F4A">防衛・保全</text>
    <text x="340" y="55" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14" text-anchor="end" fill="#D95F4A">Defense</text>
  </g>

  <!-- Axis Descriptions -->
  <!-- Trust Axis Description -->
  <g transform="translate(50, 450) rotate(-90)">
    <text x="0" y="0" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" font-weight="600" text-anchor="middle" fill="#4A9D9A">
      信頼軸 (Trust Axis)
    </text>
    <text x="0" y="25" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" text-anchor="middle" fill="#555555">
      関係の維持、つながりの継続、修復可能性に関わる向き
    </text>
  </g>

  <!-- Survival Axis Description -->
  <g transform="translate(400, 740)">
    <text x="0" y="0" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" font-weight="600" text-anchor="middle" fill="#D95F4A">
      生存軸 (Survival Axis)
    </text>
    <text x="0" y="25" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" text-anchor="middle" fill="#555555">
      危険の回避、安全の確保、防衛、資源や立場の保全に関わる向き
    </text>
  </g>

  <!-- Findings Panel -->
  <g transform="translate(820, 180)">
    <rect x="0" y="0" width="340" height="440" rx="8" ry="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <text x="170" y="45" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="600" text-anchor="middle" fill="#333333">
      現在の知見
    </text>
    <text x="170" y="70" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14" text-anchor="middle" fill="#666666">
      Current Findings
    </text>

    <!-- Finding 1: Developmental Basis -->
    <g transform="translate(30, 120)">
      <circle cx="0" cy="8" r="4" fill="#4A9D9A"/>
      <text x="20" y="0" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" font-weight="600" fill="#333333">
        発達的基盤
      </text>
      <text x="20" y="25" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#555555">
        <tspan x="20" dy="0">愛着や安全基地が信頼軸の</tspan>
        <tspan x="20" dy="1.4em">基盤を形成する。</tspan>
      </text>
    </g>

    <!-- Finding 2: Internalized Resources -->
    <g transform="translate(30, 205)">
      <circle cx="0" cy="8" r="4" fill="#4A9D9A"/>
      <text x="20" y="0" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" font-weight="600" fill="#333333">
        内在化された関係資源
      </text>
      <text x="20" y="25" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#555555">
        <tspan x="20" dy="0">経験を通じて内在化された関係性が</tspan>
        <tspan x="20" dy="1.4em">信頼の安定を支える。</tspan>
      </text>
    </g>

    <!-- Finding 3: Repairability -->
    <g transform="translate(30, 290)">
      <circle cx="0" cy="8" r="4" fill="#4A9D9A"/>
      <text x="20" y="0" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" font-weight="600" fill="#333333">
        修復可能性の観測
      </text>
      <text x="20" y="25" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#555555">
        <tspan x="20" dy="0">関係の修復可能性が、信頼を観測</tspan>
        <tspan x="20" dy="1.4em">する上での有力な候補となる。</tspan>
      </text>
    </g>

    <!-- Finding 4: Unsettled Term -->
    <g transform="translate(30, 375)">
      <circle cx="0" cy="8" r="4" fill="#888888"/>
      <text x="20" y="0" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" font-weight="600" fill="#333333">
        中心語の未確定
      </text>
      <text x="20" y="25" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#555555">
        <tspan x="20" dy="0">軸を代表する中心語（信頼、愛着、</tspan>
        <tspan x="20" dy="1.4em">間主観性など）は未だ定まっていない。</tspan>
      </text>
    </g>
  </g>
</svg>