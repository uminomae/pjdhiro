<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">

<defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#1a1a2e" />
        <stop offset="100%" stop-color="#111122" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#f0f0f0" />
    </marker>
</defs>
<rect x="0" y="0" width="1200" height="800" fill="url(#backgroundGradient)" />

<text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="32px" fill="#f0f0f0" font-weight="bold">創造の5段階モデル</text>
<text x="600" y="95" text-anchor="middle" font-family="sans-serif" font-size="18px" fill="#cccccc">構造の説明</text>

    <rect x="400.0" y="280.0" width="200" height="120" rx="10" fill="none" stroke="#8B8682" stroke-width="10" opacity="0.1" />
    <rect x="400.0" y="280.0" width="200" height="120" rx="10" fill="none" stroke="#8B8682" stroke-width="5" opacity="0.2" />
    <rect x="400.0" y="280.0" width="200" height="120" rx="10" fill="#2a2a4e" stroke="#8B8682" stroke-width="2" />
    <text x="415.0" y="310.0" font-family="sans-serif" font-size="18px" fill="#8B8682" font-weight="bold">1</text>
    <text x="500.0" y="320.0" text-anchor="middle" font-family="sans-serif" font-size="24px" fill="#f0f0f0" font-weight="bold">場</text>
    <text x="500.0" y="345.0" text-anchor="middle" font-family="sans-serif" font-size="14px" fill="#cccccc">Field</text>
    <text x="500.0" y="375.0" text-anchor="middle" font-family="sans-serif" font-size="13px" fill="#cccccc">まだ何も分かれていない海</text>
    <rect x="650.0" y="380.0" width="200" height="120" rx="10" fill="none" stroke="#5B8DB8" stroke-width="10" opacity="0.1" />
    <rect x="650.0" y="380.0" width="200" height="120" rx="10" fill="none" stroke="#5B8DB8" stroke-width="5" opacity="0.2" />
    <rect x="650.0" y="380.0" width="200" height="120" rx="10" fill="#2a2a4e" stroke="#5B8DB8" stroke-width="2" />
    <text x="665.0" y="410.0" font-family="sans-serif" font-size="18px" fill="#5B8DB8" font-weight="bold">2</text>
    <text x="750.0" y="420.0" text-anchor="middle" font-family="sans-serif" font-size="24px" fill="#f0f0f0" font-weight="bold">波</text>
    <text x="750.0" y="445.0" text-anchor="middle" font-family="sans-serif" font-size="14px" fill="#cccccc">Wave</text>
    <text x="750.0" y="475.0" text-anchor="middle" font-family="sans-serif" font-size="13px" fill="#cccccc">差異が揺れとして立ち上がる</text>
    <rect x="650.0" y="520.0" width="200" height="120" rx="10" fill="none" stroke="#D4A857" stroke-width="10" opacity="0.1" />
    <rect x="650.0" y="520.0" width="200" height="120" rx="10" fill="none" stroke="#D4A857" stroke-width="5" opacity="0.2" />
    <rect x="650.0" y="520.0" width="200" height="120" rx="10" fill="#2a2a4e" stroke="#D4A857" stroke-width="2" />
    <text x="665.0" y="550.0" font-family="sans-serif" font-size="18px" fill="#D4A857" font-weight="bold">3</text>
    <text x="750.0" y="560.0" text-anchor="middle" font-family="sans-serif" font-size="24px" fill="#f0f0f0" font-weight="bold">縁</text>
    <text x="750.0" y="585.0" text-anchor="middle" font-family="sans-serif" font-size="14px" fill="#cccccc">Relation</text>
    <text x="750.0" y="615.0" text-anchor="middle" font-family="sans-serif" font-size="13px" fill="#cccccc">関係が生まれる界面</text>
    <rect x="400.0" y="520.0" width="200" height="120" rx="10" fill="none" stroke="#C45B4D" stroke-width="10" opacity="0.1" />
    <rect x="400.0" y="520.0" width="200" height="120" rx="10" fill="none" stroke="#C45B4D" stroke-width="5" opacity="0.2" />
    <rect x="400.0" y="520.0" width="200" height="120" rx="10" fill="#2a2a4e" stroke="#C45B4D" stroke-width="2" />
    <text x="415.0" y="550.0" font-family="sans-serif" font-size="18px" fill="#C45B4D" font-weight="bold">4</text>
    <text x="500.0" y="560.0" text-anchor="middle" font-family="sans-serif" font-size="24px" fill="#f0f0f0" font-weight="bold">渦</text>
    <text x="500.0" y="585.0" text-anchor="middle" font-family="sans-serif" font-size="14px" fill="#cccccc">Vortex</text>
    <text x="500.0" y="615.0" text-anchor="middle" font-family="sans-serif" font-size="13px" fill="#cccccc">まとまりとして立ち上がる</text>
    <rect x="150.0" y="380.0" width="200" height="120" rx="10" fill="none" stroke="#5B8B6A" stroke-width="10" opacity="0.1" />
    <rect x="150.0" y="380.0" width="200" height="120" rx="10" fill="none" stroke="#5B8B6A" stroke-width="5" opacity="0.2" />
    <rect x="150.0" y="380.0" width="200" height="120" rx="10" fill="#2a2a4e" stroke="#5B8B6A" stroke-width="2" />
    <text x="165.0" y="410.0" font-family="sans-serif" font-size="18px" fill="#5B8B6A" font-weight="bold">5</text>
    <text x="250.0" y="420.0" text-anchor="middle" font-family="sans-serif" font-size="24px" fill="#f0f0f0" font-weight="bold">束</text>
    <text x="250.0" y="445.0" text-anchor="middle" font-family="sans-serif" font-size="14px" fill="#cccccc">Bundle</text>
    <text x="250.0" y="475.0" text-anchor="middle" font-family="sans-serif" font-size="13px" fill="#cccccc">構造として残り、次の場を支える</text>

    <path d="M 648.2962913128913 287.9780077884483 Q 700.0 300.0 798.2962913128913 387.9780077884483"
