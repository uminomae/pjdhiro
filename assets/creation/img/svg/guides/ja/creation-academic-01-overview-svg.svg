<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#111122"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0f0f0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="800" fill="url(#backgroundGradient)"/>

  <!-- Title and Subtitle -->
  <text x="600" y="50" font-family="sans-serif" font-size="28px" font-weight="bold" fill="#f0f0f0" text-anchor="middle">創造の5段階——先行研究との構造比較</text>
  <text x="600" y="80" font-family="sans-serif" font-size="16px" fill="#cccccc" text-anchor="middle">30領域横断的探索分析</text>

  <!-- Central Column: 5 Stages -->
  <!-- Stage 1: 場 Field -->
  <rect x="510" y="150" width="180" height="80" rx="10" fill="#2a2a4e" stroke="#8B8682" stroke-width="1"/>
  <text x="600" y="180" font-family="sans-serif" font-size="20px" font-weight="bold" fill="#8B8682" text-anchor="middle">場</text>
  <text x="600" y="205" font-family="sans-serif" font-size="14px" fill="#f0f0f0" text-anchor="middle">Field</text>

  <!-- Stage 2: 波 Wave -->
  <rect x="510" y="250" width="180" height="80" rx="10" fill="#2a2a4e" stroke="#5B8DB8" stroke-width="1"/>
  <text x="600" y="280" font-family="sans-serif" font-size="20px" font-weight="bold" fill="#5B8DB8" text-anchor="middle">波</text>
  <text x="600" y="305" font-family="sans-serif" font-size="14px" fill="#f0f0f0" text-anchor="middle">Wave</text>

  <!-- Stage 3: 縁 Relation (Highlighted) -->
  <rect x="510" y="350" width="180" height="80" rx="10" fill="#2a2a4e" stroke="#D4A857" stroke-width="2"/>
  <text x="600" y="380" font-family="sans-serif" font-size="20px" font-weight="bold" fill="#D4A857" text-anchor="middle">縁</text>
  <text x="600" y="405" font-family="sans-serif" font-size="14px" fill="#f0f0f0" text-anchor="middle">Relation</text>

  <!-- Stage 4: 渦 Vortex -->
  <rect x="510" y="450" width="180" height="80" rx="10" fill="#2a2a4e" stroke="#C45B4D" stroke-width="1"/>
  <text x="600" y="480" font-family="sans-serif" font-size="20px" font-weight="bold" fill="#C45B4D" text-anchor="middle">渦</text>
  <text x="600" y="505" font-family="sans-serif" font-size="14px" fill="#f0f0f0" text-anchor="middle">Vortex</text>

  <!-- Stage 5: 束 Bundle -->
  <rect x="510" y="550" width="180" height="80" rx="10" fill="#2a2a4e" stroke="#5B8B6A" stroke-width="1"/>
  <text x="600" y="580" font-family="sans-serif" font-size="20px" font-weight="bold" fill="#5B8B6A" text-anchor="middle">束</text>
  <text x="600" y="605" font-family="sans-serif" font-size="14px" fill="#f0f0f0" text-anchor="middle">Bundle</text>

  <!-- Arrows between stages -->
  <line x1="600" y1="230" x2="600" y2="250" stroke="#f0f0f0" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="330" x2="600" y2="350" stroke="#f0f0f0" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="430" x2="600" y2="450" stroke="#f0f0f0" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="530" x2="600" y2="550" stroke="#f0f0f0" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- Left Side: Prior Theories -->
  <!-- 場 Field theories -->
  <rect x="100" y="160" width="250" height="60" rx="10" fill="#2a2a4e"/>
  <text x="110" y="185" font-family="sans-serif" font-size="14px" fill="#f0f0f0">野中の「場(Ba)」</text>
  <text x="110" y="205" font-family="sans-serif" font-size="14px" fill="#f0f0f0">QFT真空, 仏教の空</text>
  <line x1="350" y1="190" x2="510" y2="190" stroke="#8B8682" stroke-width="1"/>

  <!-- 波 Wave theories -->
  <rect x="100" y="260" width="250" height="60" rx="10" fill="#2a2a4e"/>
  <text x="110" y="285" font-family="sans-serif" font-size="14px" fill="#f0f0f0">Guilfordの発散的思考</text>
  <text x="110" y="305" font-family="sans-serif" font-size="14px" fill="#f0f0f0">予測誤差</text>
  <line x1="350" y1="290" x2="510" y2="290" stroke="#5B8DB8" stroke-width="1"/>

  <!-- 縁 Relation theories (Highlighted) -->
  <rect x="100" y="360" width="250" height="60" rx="10" fill="#2a2a4e" stroke="#D4A857" stroke-width="2"/>
  <text x="110" y="385" font-family="sans-serif" font-size="14px" fill="#f0f0f0">Simondonのtransduction</text>
  <text x="110" y="405" font-family="sans-serif" font-size="14px" fill="#f0f0f0">散逸構造の分岐点</text>
  <line x1="350" y1="390" x2="510" y2="390" stroke="#D4A857" stroke-width="2"/>

  <!-- 渦 Vortex theories -->
  <rect x="100" y="460" width="250" height="60" rx="10" fill="#2a2a4e"/>
  <text x="110" y="485" font-family="sans-serif" font-size="14px" fill="#f0f0f0">Csikszentmihalyiのフロー</text>
  <text x="110" y="505" font-family="sans-serif" font-size="14px" fill="#f0f0f0">Wallasの照明</text>
  <line x1="350" y1="490" x2="510" y2="490" stroke="#C45B4D" stroke-width="1"/>

  <!-- 束 Bundle theories -->
  <rect x="100" y="560" width="250" height="60" rx="10" fill="#2a2a4e"/>
  <text x="110" y="590" font-family="sans-serif" font-size="14px" fill="#f0f0f0">SECIの組織横断化</text>
  <line x1="350" y1="590" x2="510" y2="590" stroke="#5B8B6A" stroke-width="1"/>

  <!-- Right Side: Key Structural Findings -->
  <!-- 縁 Relation findings (Highlighted) -->
  <rect x="850" y="350" width="250" height="80" rx="10" fill="#2a2a4e" stroke="#D4A857" stroke-width="2"/>
  <text x="1090" y="375" font-family="sans-serif" font-size="14px" fill="#f0f0f0" text-anchor="end">縁の6タイプ</text>
  <text x="1090" y="395" font-family="sans-serif" font-size="12px" fill="#cccccc" text-anchor="end">(閾値型, 競合型, 界面型,</text>
  <text x="1090" y="410" font-family="sans-serif" font-size="12px" fill="#cccccc" text-anchor="end">伝播型, 帯域型, 調停型)</text>
  <line x1="690" y1="390" x2="850" y2="390" stroke="#D4A857" stroke-width="2"/>

  <!-- General finding for the model -->
  <rect x="850" y="460" width="250" height="60" rx="10" fill="#2a2a4e"/>
  <text x="1090" y="485" font-family="sans-serif" font-size="14px" fill="#f0f0f0" text-anchor="end">「境界は線ではなく帯域」</text>
  <text x="1090" y="505" font-family="sans-serif" font-size="14px" fill="#f0f0f0" text-anchor="end">- 4領域で独立確認</text>
  <line x1="690" y1="490" x2="850" y2="490" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Bottom Note -->
  <text x="600" y="750" font-family="sans-serif" font-size="13px" fill="#888888" text-anchor="middle">探索的分析報告・仮説生成を目的とした中間報告</text>
</svg>