<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <marker id="arrowTH" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8" rx="8"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="#E0DDD8" stroke-width="1" rx="8"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" fill="#2C2C2C" font-weight="bold">T2 閾値構造と縁→渦遷移 — 横断的パターン図</text>
  <text x="400" y="68" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#666666">縁→渦遷移の条件 (11ドメインが直接主題化、10が渦不到達を記述)</text>

  <!-- Central theme: transition between En and Uzu -->
  <rect x="290" y="195" width="90" height="70" rx="10" fill="#D4A857" opacity="0.15" stroke="#D4A857" stroke-width="2"/>
  <text x="335" y="228" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#D4A857" font-weight="bold">縁</text>
  <text x="335" y="248" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#D4A857">Edge</text>

  <!-- Threshold bar -->
  <rect x="395" y="200" width="10" height="60" rx="2" fill="#C45B4D" opacity="0.5"/>
  <text x="400" y="185" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#C45B4D" font-weight="bold">閾値</text>

  <rect x="420" y="195" width="90" height="70" rx="10" fill="#C45B4D" opacity="0.15" stroke="#C45B4D" stroke-width="2"/>
  <text x="465" y="228" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#C45B4D" font-weight="bold">渦</text>
  <text x="465" y="248" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#C45B4D">Vortex</text>

  <!-- Arrow across threshold -->
  <line x1="380" y1="230" x2="415" y2="230" stroke="#C45B4D" stroke-width="2.5" marker-end="url(#arrowTH)"/>

  <!-- Convergence 1: 閾値的 (top-left) -->
  <rect x="50" y="90" width="200" height="55" rx="8" fill="#C45B4D" opacity="0.1" stroke="#C45B4D" stroke-width="1.5"/>
  <text x="150" y="112" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#C45B4D" font-weight="bold">連続的でなく閾値的 [P]</text>
  <text x="150" y="132" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">物理化学的に最も堅い知見</text>
  <line x1="250" y1="118" x2="300" y2="200" stroke="#C45B4D" stroke-width="1.5"/>

  <!-- Domain nodes for convergence 1 -->
  <circle cx="70" cy="170" r="16" fill="#C45B4D" opacity="0.15" stroke="#C45B4D" stroke-width="1"/>
  <text x="70" y="174" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="9" fill="#2C2C2C" font-weight="bold">D02</text>
  <text x="70" y="197" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">相転移</text>

  <circle cx="130" cy="170" r="16" fill="#C45B4D" opacity="0.15" stroke="#C45B4D" stroke-width="1"/>
  <text x="130" y="174" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="9" fill="#2C2C2C" font-weight="bold">D03</text>
  <text x="130" y="197" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">活性化E</text>

  <circle cx="190" cy="170" r="16" fill="#C45B4D" opacity="0.15" stroke="#C45B4D" stroke-width="1"/>
  <text x="190" y="174" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="9" fill="#2C2C2C" font-weight="bold">D05</text>
  <text x="190" y="197" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">tipping pt</text>

  <!-- Convergence 2: 不可逆 (top-right) -->
  <rect x="560" y="90" width="190" height="55" rx="8" fill="#D4A857" opacity="0.1" stroke="#D4A857" stroke-width="1.5"/>
  <text x="655" y="112" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#D4A857" font-weight="bold">遷移は不可逆的 [P]</text>
  <text x="655" y="132" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">縁に戻れない(系は循環する)</text>
  <line x1="560" y1="118" x2="510" y2="200" stroke="#D4A857" stroke-width="1.5"/>

  <circle cx="600" cy="170" r="16" fill="#D4A857" opacity="0.15" stroke="#D4A857" stroke-width="1"/>
  <text x="600" y="174" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="9" fill="#2C2C2C" font-weight="bold">D04</text>
  <text x="600" y="197" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">種分化</text>

  <circle cx="660" cy="170" r="16" fill="#D4A857" opacity="0.15" stroke="#D4A857" stroke-width="1"/>
  <text x="660" y="174" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="9" fill="#2C2C2C" font-weight="bold">D06</text>
  <text x="660" y="197" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">重力崩壊</text>

  <circle cx="720" cy="170" r="16" fill="#D4A857" opacity="0.15" stroke="#D4A857" stroke-width="1"/>
  <text x="720" y="174" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="9" fill="#2C2C2C" font-weight="bold">D29</text>
  <text x="720" y="197" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">SOC</text>

  <!-- Convergence 3: 制御可能 (bottom-left) -->
  <rect x="50" y="290" width="200" height="55" rx="8" fill="#5B8B6A" opacity="0.1" stroke="#5B8B6A" stroke-width="1.5"/>
  <text x="150" y="312" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#5B8B6A" font-weight="bold">閾値は制御可能 [M]</text>
  <text x="150" y="332" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">上げる/下げる操作が存在</text>
  <line x1="250" y1="310" x2="310" y2="260" stroke="#5B8B6A" stroke-width="1.5"/>

  <circle cx="70" cy="370" r="16" fill="#5B8B6A" opacity="0.15" stroke="#5B8B6A" stroke-width="1"/>
  <text x="70" y="374" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="9" fill="#2C2C2C" font-weight="bold">D03</text>
  <text x="70" y="397" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">触媒=閾値低下</text>

  <circle cx="150" cy="370" r="16" fill="#5B8B6A" opacity="0.15" stroke="#5B8B6A" stroke-width="1"/>
  <text x="150" y="374" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="9" fill="#2C2C2C" font-weight="bold">D27</text>
  <text x="150" y="397" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">threshold space</text>

  <circle cx="230" cy="370" r="16" fill="#5B8B6A" opacity="0.15" stroke="#5B8B6A" stroke-width="1"/>
  <text x="230" y="374" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="9" fill="#2C2C2C" font-weight="bold">D3</text>
  <text x="230" y="397" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">抱持=閾値上昇</text>

  <!-- Convergence 4: 渦不到達 (bottom-right) -->
  <rect x="560" y="290" width="190" height="55" rx="8" fill="#8B8682" opacity="0.1" stroke="#8B8682" stroke-width="1.5"/>
  <text x="655" y="312" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#8B8682" font-weight="bold">渦不到達経路 [P]</text>
  <text x="655" y="332" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">縁で止まる/場に戻る</text>
  <line x1="560" y1="310" x2="510" y2="260" stroke="#8B8682" stroke-width="1.5"/>

  <circle cx="580" cy="370" r="16" fill="#8B8682" opacity="0.15" stroke="#8B8682" stroke-width="1"/>
  <text x="580" y="374" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="9" fill="#2C2C2C" font-weight="bold">D07</text>
  <text x="580" y="397" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">安定制御</text>

  <circle cx="650" cy="370" r="16" fill="#8B8682" opacity="0.15" stroke="#8B8682" stroke-width="1"/>
  <text x="650" y="374" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="9" fill="#2C2C2C" font-weight="bold">D14</text>
  <text x="650" y="397" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">固着</text>

  <circle cx="720" cy="370" r="16" fill="#8B8682" opacity="0.15" stroke="#8B8682" stroke-width="1"/>
  <text x="720" y="374" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="9" fill="#2C2C2C" font-weight="bold">D25</text>
  <text x="720" y="397" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">schism</text>

  <!-- D3 connection highlight -->
  <rect x="285" y="290" width="230" height="40" rx="6" fill="#D4A857" opacity="0.08" stroke="#D4A857" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="315" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#D4A857">触媒=閾値低下 / D3抱持=閾値上昇 (対称性)</text>

  <!-- Summary -->
  <rect x="40" y="440" width="720" height="130" rx="8" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1"/>
  <text x="60" y="465" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#2C2C2C" font-weight="bold">収束点と保持論点</text>
  <text x="60" y="487" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#2C2C2C">1. 縁→渦遷移は連続的でなく閾値的 [P] | 2. 閾値超え遷移は不可逆的 [P]</text>
  <text x="60" y="505" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#2C2C2C">3. 閾値は制御可能な場合がある [M] | 4. 渦に至らない経路が存在する [P]</text>
  <text x="60" y="527" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#666666">分岐1: 閾値は量的か質的か (D02物理 vs D24宗教 vs D14心理)</text>
  <text x="60" y="545" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#666666">分岐2: 「帯域」と「閾値」の統合 — 帯域の中に閾値があるのか、端が閾値か</text>
  <text x="60" y="563" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#666666">分岐3: 渦は必ず創造的か — Minsky(D21)の信用崩壊は破壊的渦</text>
</svg>