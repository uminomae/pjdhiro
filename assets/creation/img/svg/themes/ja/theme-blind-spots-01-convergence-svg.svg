<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="white">盲点と反例 - 収束ネットワーク</text>

  <!-- Hub Glow -->
  <circle cx="600" cy="400" r="95" fill="#e24a4a" opacity="0.15" />

  <!-- Hub -->
  <circle cx="600" cy="400" r="80" fill="#2a2a4e" stroke="#e24a4a" stroke-width="4" />
  <text x="600" y="400" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#e24a4a">盲点と反例</text>

  <!-- Convergence Point 1: 秩序解体の理論不在 -->
  <!-- Card center: (777, 223), Rect top-left: (677, 173) -->
  <g id="convergence1">
    <rect x="677" y="173" width="200" height="100" rx="12" fill="#4a90e2" />
    <text x="777" y="195" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">秩序解体の理論不在</text>
    <text x="777" y="225" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">5段階は秩序生成に特化、</text>
    <text x="777" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">解体を記述できない</text>

    <!-- Domain circles for Convergence 1 -->
    <circle cx="890" cy="180" r="14" fill="#4a90e2" stroke="white" stroke-width="1" />
    <text x="890" y="180" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D05</text>
    <circle cx="930" cy="180" r="14" fill="#4a90e2" stroke="white" stroke-width="1" />
    <text x="930" y="180" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D09</text>
    <circle cx="890" cy="220" r="14" fill="#4a90e2" stroke="white" stroke-width="1" />
    <text x="890" y="220" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D12</text>
    <circle cx="930" cy="220" r="14" fill="#4a90e2" stroke="white" stroke-width="1" />
    <text x="930" y="220" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D16</text>
    <circle cx="890" cy="260" r="14" fill="#4a90e2" stroke="white" stroke-width="1" />
    <text x="890" y="260" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D21</text>
    <circle cx="930" cy="260" r="14" fill="#4a90e2" stroke="white" stroke-width="1" />
    <text x="930" y="260" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D25</text>
    <circle cx="850" cy="150" r="14" fill="#4a90e2" stroke="white" stroke-width="1" />
    <text x="850" y="150" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D27</text>
    <circle cx="850" cy="290" r="14" fill="#4a90e2" stroke="white" stroke-width="1" />
    <text x="850" y="290" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D29</text>

    <!-- Lines from Card 1 to Domains -->
    <line x1="777" y1="223" x2="890" y2="180" stroke="#4a90e2" stroke-width="1" />
    <line x1="777" y1="223" x2="930" y2="180" stroke="#4a90e2" stroke-width="1" />
    <line x1="777" y1="223" x2="890" y2="220" stroke="#4a90e2" stroke-width="1" />
    <line x1="777" y1="223" x2="930" y2="220" stroke="#4a90e2" stroke-width="1" />
    <line x1="777" y1="223" x2="890" y2="260" stroke="#4a90e2" stroke-width="1" />
    <line x1="777" y1="223" x2="930" y2="260" stroke="#4a90e2" stroke-width="1" />
    <line x1="777" y1="223" x2="850" y2="150" stroke="#4a90e2" stroke-width="1" />
    <line x1="777" y1="223" x2="850" y2="290" stroke="#4a90e2" stroke-width="1" />
  </g>

  <!-- Convergence Point 2: 解体は逆順ではない -->
  <!-- Card center: (423, 223), Rect top-left: (323, 173) -->
  <g id="convergence2">
    <rect x="323" y="173" width="200" height="100" rx="12" fill="#50e3c2" />
    <text x="423" y="195" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">解体は逆順ではない</text>
    <text x="423" y="225" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">解体は束→渦→縁→波→場の</text>
    <text x="423" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">逆ではなく独自構造</text>

    <!-- Domain circles for Convergence 2 -->
    <circle cx="310" cy="190" r="14" fill="#50e3c2" stroke="white" stroke-width="1" />
    <text x="310" y="190" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D16</text>
    <circle cx="270" cy="220" r="14" fill="#50e3c2" stroke="white" stroke-width="1" />
    <text x="270" y="220" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D29</text>
    <circle cx="310" cy="250" r="14" fill="#50e3c2" stroke="white" stroke-width="1" />
    <text x="310" y="250" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D03</text>

    <!-- Lines from Card 2 to Domains -->
    <line x1="423" y1="223" x2="310" y2="190" stroke="#50e3c2" stroke-width="1" />
    <line x1="423" y1="223" x2="270" y2="220" stroke="#50e3c2" stroke-width="1" />
    <line x1="423" y1="223" x2="310" y2="250" stroke="#50e3c2" stroke-width="1" />
  </g>

  <!-- Convergence Point 3: 失敗モードは5段階に内在 -->
  <!-- Card center: (423, 577), Rect top-left: (323, 527) -->
  <g id="convergence3">
    <rect x="323" y="527" width="200" height="100" rx="12" fill="#b34ae2" />
    <text x="423" y="549" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">失敗モードは5段階に内在</text>
    <text x="423" y="579" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">各段階に固有の失敗がある</text>

    <!-- Domain circles for Convergence 3 -->
    <circle cx="310" cy="540" r="14" fill="#b34ae2" stroke="white" stroke-width="1" />
    <text x="310" y="540" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D01</text>
    <circle cx="270" cy="570" r="14" fill="#b34ae2" stroke="white" stroke-width="1" />
    <text x="270" y="570" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D07</text>
    <circle cx="310" cy="600" r="14" fill="#b34ae2" stroke="white" stroke-width="1" />
    <text x="310" y="600" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D14</text>
    <circle cx="270" cy="630" r="14" fill="#b34ae2" stroke="white" stroke-width="1" />
    <text x="270" y="630" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D25</text>
    <circle cx="310" cy="660" r="14" fill="#b34ae2" stroke="white" stroke-width="1" />
    <text x="310" y="660" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D28</text>

    <!-- Lines from Card 3 to Domains -->
    <line x1="423" y1="577" x2="310" y2="540" stroke="#b34ae2" stroke-width="1" />
    <line x1="423" y1="577" x2="270" y2="570" stroke="#b34ae2" stroke-width="1" />
    <line x1="423" y1="577" x2="310" y2="600" stroke="#b34ae2" stroke-width="1" />
    <line x1="423" y1="577" x2="270" y2="630" stroke="#b34ae2" stroke-width="1" />
    <line x1="423" y1="577" x2="310" y2="660" stroke="#b34ae2" stroke-width="1" />
  </g>

  <!-- Convergence Point 4: 計画的解体は生成の一部 -->
  <!-- Card center: (777, 577), Rect top-left: (677, 527) -->
  <g id="convergence4">
    <rect x="677" y="527" width="200" height="100" rx="12" fill="#D4A857" />
    <text x="777" y="549" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">計画的解体は生成の一部</text>
    <text x="777" y="579" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">解体が新しい場を作る場合がある</text>

    <!-- Domain circles for Convergence 4 -->
    <circle cx="890" cy="540" r="14" fill="#D4A857" stroke="white" stroke-width="1" />
    <text x="890" y="540" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D09</text>
    <circle cx="930" cy="570" r="14" fill="#D4A857" stroke="white" stroke-width="1" />
    <text x="930" y="570" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D30</text>
    <circle cx="890" cy="600" r="14" fill="#D4A857" stroke="white" stroke-width="1" />
    <text x="890" y="600" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="10" fill="white">D27</text>

    <!-- Lines from Card 4 to Domains -->
    <line x1="777" y1="577" x2="890" y2="540" stroke="#D4A857" stroke-width="1" />
    <line x1="777" y1="577" x2="930" y2="570" stroke="#D4A857" stroke-width="1" />
    <line x1="777" y1="577" x2="890" y2="600" stroke="#D4A857" stroke-width="1" />
  </g>

  <!-- Lines from Hub to Cards -->
  <!-- Hub center (600, 400), radius 80 -->
  <!-- Calculated start points on hub edge for each card's direction -->
  <line x1="656.56" y1="343.44" x2="777" y2="223" stroke="#e24a4a" stroke-width="2" /> <!-- To Card 1 -->
  <line x1="543.44" y1="343.44" x2="423" y2="223" stroke="#e24a4a" stroke-width="2" /> <!-- To Card 2 -->
  <line x1="543.44" y1="456.56" x2="423" y2="577" stroke="#e24a4a" stroke-width="2" /> <!-- To Card 3 -->
  <line x1="656.56" y1="456.56" x2="777" y2="577" stroke="#e24a4a" stroke-width="2" /> <!-- To Card 4 -->

  <!-- Legend -->
  <g transform="translate(1000, 700)">
    <rect x="0" y="0" width="180" height="80" rx="8" fill="#2a2a4e" stroke="#e24a4a" stroke-width="1" />
    <circle cx="20" cy="25" r="10" fill="#4a90e2" stroke="white" stroke-width="1" />
    <text x="40" y="25" dominant-baseline="middle" font-family="sans-serif" font-size="12" fill="white">ドメイン</text>
    <rect x="10" y="45" width="20" height="15" rx="4" fill="#4a90e2" />
    <text x="40" y="52" dominant-baseline="middle" font-family="sans-serif" font-size="12" fill="white">収束点</text>
  </g>
</svg>
