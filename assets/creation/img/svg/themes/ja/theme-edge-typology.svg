<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <marker id="arrowET" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8" rx="8"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="#E0DDD8" stroke-width="1" rx="8"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" fill="#2C2C2C" font-weight="bold">T1 縁の類型学と統一分類 — 横断的パターン図</text>
  <text x="400" y="68" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#666666">28/30ドメインが「縁」の多型性を主題化</text>

  <!-- Central theme node - Edge/En color -->
  <ellipse cx="400" cy="270" rx="100" ry="50" fill="#D4A857" opacity="0.15" stroke="#D4A857" stroke-width="2.5"/>
  <text x="400" y="263" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#D4A857" font-weight="bold">縁の統一分類</text>
  <text x="400" y="283" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#D4A857">帯域 / 方向選択 / 拮抗 / 実装独立</text>

  <!-- Convergence 1: 帯域 (top) -->
  <rect x="330" y="90" width="140" height="50" rx="8" fill="#D4A857" opacity="0.12" stroke="#D4A857" stroke-width="2"/>
  <text x="400" y="112" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#D4A857" font-weight="bold">帯域である</text>
  <text x="400" y="130" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">(線ではない) [P]</text>
  <line x1="400" y1="140" x2="400" y2="220" stroke="#D4A857" stroke-width="2"/>

  <!-- Supporting domains for convergence 1 -->
  <circle cx="250" cy="100" r="18" fill="#D4A857" opacity="0.2" stroke="#D4A857" stroke-width="1"/>
  <text x="250" y="104" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#2C2C2C" font-weight="bold">D27</text>
  <text x="250" y="130" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">threshold space</text>
  <line x1="268" y1="100" x2="330" y2="110" stroke="#D4A857" stroke-width="1" stroke-dasharray="4,2"/>

  <circle cx="540" cy="100" r="18" fill="#D4A857" opacity="0.2" stroke="#D4A857" stroke-width="1"/>
  <text x="540" y="104" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#2C2C2C" font-weight="bold">D25</text>
  <text x="540" y="130" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">リミナリティ</text>
  <line x1="522" y1="100" x2="470" y2="110" stroke="#D4A857" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Convergence 2: 方向選択 (left) -->
  <rect x="55" y="230" width="140" height="50" rx="8" fill="#5B8DB8" opacity="0.12" stroke="#5B8DB8" stroke-width="2"/>
  <text x="125" y="252" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#5B8DB8" font-weight="bold">方向選択の場</text>
  <text x="125" y="270" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">(帰結を決定) [P]</text>
  <line x1="195" y1="255" x2="300" y2="265" stroke="#5B8DB8" stroke-width="2"/>

  <circle cx="75" cy="175" r="18" fill="#5B8DB8" opacity="0.2" stroke="#5B8DB8" stroke-width="1"/>
  <text x="75" y="179" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#2C2C2C" font-weight="bold">D04</text>
  <text x="75" y="204" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">種分化</text>
  <line x1="90" y1="188" x2="110" y2="230" stroke="#5B8DB8" stroke-width="1" stroke-dasharray="4,2"/>

  <circle cx="155" cy="175" r="18" fill="#5B8DB8" opacity="0.2" stroke="#5B8DB8" stroke-width="1"/>
  <text x="155" y="179" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#2C2C2C" font-weight="bold">D08</text>
  <text x="155" y="204" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">STDP時間窓</text>
  <line x1="155" y1="193" x2="140" y2="230" stroke="#5B8DB8" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Convergence 3: 拮抗 (right) -->
  <rect x="610" y="230" width="140" height="50" rx="8" fill="#C45B4D" opacity="0.12" stroke="#C45B4D" stroke-width="2"/>
  <text x="680" y="252" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#C45B4D" font-weight="bold">拮抗から生まれる</text>
  <text x="680" y="270" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">(対立の接触) [P]</text>
  <line x1="610" y1="260" x2="500" y2="268" stroke="#C45B4D" stroke-width="2"/>

  <circle cx="650" cy="175" r="18" fill="#C45B4D" opacity="0.2" stroke="#C45B4D" stroke-width="1"/>
  <text x="650" y="179" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#2C2C2C" font-weight="bold">D29</text>
  <text x="650" y="204" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">7/10で拮抗</text>
  <line x1="660" y1="193" x2="670" y2="230" stroke="#C45B4D" stroke-width="1" stroke-dasharray="4,2"/>

  <circle cx="730" cy="175" r="18" fill="#C45B4D" opacity="0.2" stroke="#C45B4D" stroke-width="1"/>
  <text x="730" y="179" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#2C2C2C" font-weight="bold">D05</text>
  <text x="730" y="204" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">プレート境界</text>
  <line x1="720" y1="190" x2="700" y2="230" stroke="#C45B4D" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Convergence 4: 実装独立 (bottom) -->
  <rect x="330" y="350" width="140" height="50" rx="8" fill="#5B8B6A" opacity="0.12" stroke="#5B8B6A" stroke-width="2"/>
  <text x="400" y="372" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#5B8B6A" font-weight="bold">実装独立的</text>
  <text x="400" y="390" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">(関係による選別) [M]</text>
  <line x1="400" y1="320" x2="400" y2="350" stroke="#5B8B6A" stroke-width="2"/>

  <circle cx="280" cy="400" r="18" fill="#5B8B6A" opacity="0.2" stroke="#5B8B6A" stroke-width="1"/>
  <text x="280" y="404" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#2C2C2C" font-weight="bold">D08</text>
  <text x="280" y="430" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">4メカニズム</text>
  <line x1="298" y1="400" x2="330" y2="380" stroke="#5B8B6A" stroke-width="1" stroke-dasharray="4,2"/>

  <circle cx="520" cy="400" r="18" fill="#5B8B6A" opacity="0.2" stroke="#5B8B6A" stroke-width="1"/>
  <text x="520" y="404" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#2C2C2C" font-weight="bold">D13</text>
  <text x="520" y="430" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="9" fill="#666666">6哲学伝統</text>
  <line x1="502" y1="400" x2="470" y2="380" stroke="#5B8B6A" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Key domain highlights at bottom -->
  <rect x="40" y="460" width="720" height="110" rx="8" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1"/>
  <text x="60" y="485" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#2C2C2C" font-weight="bold">注目ドメインの縁の類型</text>

  <text x="60" y="507" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#2C2C2C">D25 人類学: 8つの顔（全領域中最高密度） | D15 美学: 8タイプ（縁のカタログ）</text>
  <text x="60" y="527" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#2C2C2C">D27 建築: 帯域設計型（縁を設計する唯一の領域） | D12 農学: 3タイプが揃う唯一の領域</text>
  <text x="60" y="547" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#2C2C2C">D28 舞台芸術: 操作的定義型（Yes and...） | D01 数学: 境界凝縮型（構成的対応最強）</text>
  <text x="60" y="562" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">最強固な横断知見: 「縁は帯域である（線ではない）」— 30領域中最も広範な支持</text>
</svg>