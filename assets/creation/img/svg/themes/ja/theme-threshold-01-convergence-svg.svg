    <text x="423.225" y="551.775" text-anchor="middle" fill="#e24a4a" font-size="14" font-weight="bold">閾値超過は不可逆的</text>
    <text x="423.225" y="581.775" text-anchor="middle" fill="white" font-size="13">4 domains</text>
    <text x="423.225" y="601.775" text-anchor="middle" fill="#cccccc" font-size="12">一度渦に入ると戻れない</text>
    <!-- Card 3 (Green/Teal) -->
