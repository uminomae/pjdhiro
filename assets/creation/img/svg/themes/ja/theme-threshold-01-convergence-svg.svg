    <text x="776.775" y="198.225" text-anchor="middle" fill="#b34ae2" font-size="14" font-weight="bold">渦に至らない経路</text>
    <text x="776.775" y="228.225" text-anchor="middle" fill="white" font-size="13">7 domains</text>
    <text x="776.775" y="248.225" text-anchor="middle" fill="#cccccc" font-size="12">縁で止まる/場に戻る</text>
  </g>

