<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- Arrowhead marker definition. Inherits stroke color from the line. -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" font-family="sans-serif" font-size="30" font-weight="bold" fill="white" text-anchor="middle">再循環メカニズム - 収束ネットワーク</text>

  <!-- Hub (Glow effect - drawn first so it's behind the main hub) -->
  <circle cx="600" cy="400" r="95" fill="#5B8B6A" fill-opacity="0.15" />
  <!-- Hub -->
  <circle cx="600" cy="400" r="80" fill="#2a2a4e" stroke="#5B8B6A" stroke-width="4" />
  <text x="600" y="400" font-family="sans-serif" font-size="22" font-weight="bold" fill="#5B8B6A" text-anchor="middle" dominant-baseline="middle">再循環</text>

  <!-- Card Data -->
  <!-- Convergence 1: 束は場の種 (Top-right) -->
  <g id="card1">
    <rect x="702" y="133" width="220" height="110" rx="12" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" />
    <text x="812" y="165" font-family="sans-serif" font-size="18" font-weight="bold" fill="#4a90e2" text-anchor="middle">束は場の種</text>
    <text x="812" y="195" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">束は終点ではなく</text>
    <text x="812" y="210" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">次のサイクルの場の種</text>
  </g>

