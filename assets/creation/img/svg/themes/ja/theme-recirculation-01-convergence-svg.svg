    <text x="388" y="619" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">束が取りこぼすから循環する</text>
  </g>

  <!-- Convergence 4: 複数の循環モード (Top-left) -->
  <g id="card4">
    <rect x="278" y="133" width="220" height="110" rx="12" fill="#2a2a4e" stroke="#b34ae2" stroke-width="2" />
    <text x="388" y="165" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b34ae2" text-anchor="middle">複数の循環モード</text>
    <text x="388" y="195" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">自然崩壊/能動更新/</text>
    <text x="388" y="210" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">劇的変換/制度的/内在的</text>
  </g>

  <!-- Lines from Cards to Hub -->
  <!-- Hub center: (600, 400), Hub radius: 80 -->
  <!-- Card 1 center: (812, 188) -> Hub edge: (656.56, 343.44) -->
  <line x1="812" y1="188" x2="656.56" y2="343.44" stroke="#4a90e2" stroke-width="3" marker-end="url(#arrowhead)" />
