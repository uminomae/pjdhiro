<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="30" font-weight="bold">縁の類型学 - 収束ネットワーク</text>

  <!-- Central Hub (Glow) -->
  <circle cx="600" cy="400" r="95" fill="#D4A857" opacity="0.15" />
  <!-- Central Hub -->
  <circle cx="600" cy="400" r="80" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" />
  <!-- Central Hub Text -->
  <text x="600" y="408" text-anchor="middle" fill="#D4A857" font-size="22" font-weight="bold">縁の類型学</text>

  <!-- Convergence Data -->
  <!-- Convergence 1: 縁は「帯域」である -->
  <!-- Card 1 (Top) -->
  <g>
    <rect x="500" y="100" width="200" height="100" rx="12" fill="#2a2a4e" />
    <text x="600" y="130" text-anchor="middle" fill="#4a90e2" font-size="16" font-weight="bold">縁は「帯域」である</text>
    <text x="600" y="155" text-anchor="middle" fill="white" font-size="13">(5 domains)</text>
    <text x="600" y="175" text-anchor="middle" fill="#cccccc" font-size="12">線ではなく幅を持つ移行領域</text>
  </g>
  <!-- Domains for Card 1 -->
  <g>
    <circle cx="530" cy="75" r="14" fill="#4a90e2" fill-opacity="0.3" stroke="#4a90e2" stroke-opacity="0.6" stroke-width="1" />
    <text x="530" y="78" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D27</text>
    <circle cx="565" cy="75" r="14" fill="#4a90e2" fill-opacity="0.3" stroke="#4a90e2" stroke-opacity="0.6" stroke-width="1" />
    <text x="565" y="78" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D25</text>
    <circle cx="600" cy="75" r="14" fill="#4a90e2" fill-opacity="0.3" stroke="#4a90e2" stroke-opacity="0.6" stroke-width="1" />
    <text x="600" y="78" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D11</text>
    <circle cx="635" cy="75" r="14" fill="#4a90e2" fill-opacity="0.3" stroke="#4a90e2" stroke-opacity="0.6" stroke-width="1" />
    <text x="635" y="78" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D12</text>
    <circle cx="670" cy="75" r="14" fill="#4a90e2" fill-opacity="0.3" stroke="#4a90e2" stroke-opacity="0.6" stroke-width="1" />
    <text x="670" y="78" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D29</text>
  </g>
  <!-- Line from Hub to Card 1 -->
  <line x1="600" y1="400" x2="600" y2="150" stroke="#4a90e2" stroke-width="4" opacity="0.3" />
  <line x1="600" y1="400" x2="600" y2="150" stroke="#4a90e2" stroke-width="2" />

  <!-- Convergence 2: 縁は「方向選択の場」 -->
  <!-- Card 2 (Top-Right) -->
  <g>
    <rect x="737.75" y="272.75" width="200" height="100" rx="12" fill="#2a2a4e" />
    <text x="837.75" y="302.75" text-anchor="middle" fill="#e24a4a" font-size="16" font-weight="bold">縁は「方向選択の場」</text>
    <text x="837.75" y="327.75" text-anchor="middle" fill="white" font-size="13">(4 domains)</text>
    <text x="837.75" y="347.75" text-anchor="middle" fill="#cccccc" font-size="12">帰結の方向が選ばれる場所</text>
  </g>
  <!-- Domains for Card 2 -->
  <g>
    <circle cx="962.75" cy="270.25" r="14" fill="#e24a4a" fill-opacity="0.3" stroke="#e24a4a" stroke-opacity="0.6" stroke-width="1" />
    <text x="962.75" y="273.25" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D25</text>
    <circle cx="962.75" cy="305.25" r="14" fill="#e24a4a" fill-opacity="0.3" stroke="#e24a4a" stroke-opacity="0.6" stroke-width="1" />
    <text x="962.75" y="308.25" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D04</text>
    <circle cx="962.75" cy="340.25" r="14" fill="#e24a4a" fill-opacity="0.3" stroke="#e24a4a" stroke-opacity="0.6" stroke-width="1" />
    <text x="962.75" y="343.25" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D08</text>
    <circle cx="962.75" cy="375.25" r="14" fill="#e24a4a" fill-opacity="0.3" stroke="#e24a4a" stroke-opacity="0.6" stroke-width="1" />
    <text x="962.75" y="378.25" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D03</text>
  </g>
  <!-- Line from Hub to Card 2 -->
  <line x1="600" y1="400" x2="837.75" y2="322.75" stroke="#e24a4a" stroke-width="4" opacity="0.3" />
  <line x1="600" y1="400" x2="837.75" y2="322.75" stroke="#e24a4a" stroke-width="2" />

  <!-- Convergence 3: 縁は「拮抗から生まれる」 -->
  <!-- Card 3 (Bottom-Right) -->
  <g>
    <rect x="647" y="552.25" width="200" height="100" rx="12" fill="#2a2a4e" />
    <text x="747" y="582.25" text-anchor="middle" fill="#50e3c2" font-size="16" font-weight="bold">縁は「拮抗から生まれる」</text>
    <text x="747" y="607.25" text-anchor="middle" fill="white" font-size="13">(4 domains)</text>
    <text x="747" y="627.25" text-anchor="middle" fill="#cccccc" font-size="12">対立する力の接触から発生</text>
  </g>
  <!-- Domains for Card 3 -->
  <g>
    <circle cx="872" cy="549.75" r="14" fill="#50e3c2" fill-opacity="0.3" stroke="#50e3c2" stroke-opacity="0.6" stroke-width="1" />
    <text x="872" y="552.75" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D29</text>
    <circle cx="872" cy="584.75" r="14" fill="#50e3c2" fill-opacity="0.3" stroke="#50e3c2" stroke-opacity="0.6" stroke-width="1" />
    <text x="872" y="587.75" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D05</text>
    <circle cx="872" cy="619.75" r="14" fill="#50e3c2" fill-opacity="0.3" stroke="#50e3c2" stroke-opacity="0.6" stroke-width="1" />
    <text x="872" y="622.75" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D03</text>
    <circle cx="872" cy="654.75" r="14" fill="#50e3c2" fill-opacity="0.3" stroke="#50e3c2" stroke-opacity="0.6" stroke-width="1" />
    <text x="872" y="657.75" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D15</text>
  </g>
  <!-- Line from Hub to Card 3 -->
  <line x1="600" y1="400" x2="747" y2="602.25" stroke="#50e3c2" stroke-width="4" opacity="0.3" />
  <line x1="600" y1="400" x2="747" y2="602.25" stroke="#50e3c2" stroke-width="2" />

  <!-- Convergence 4: 縁は実装独立的 -->
  <!-- Card 4 (Bottom-Left) -->
  <g>
    <rect x="353" y="552.25" width="200" height="100" rx="12" fill="#2a2a4e" />
    <text x="453" y="582.25" text-anchor="middle" fill="#b34ae2" font-size="16" font-weight="bold">縁は実装独立的</text>
    <text x="453" y="607.25" text-anchor="middle" fill="white" font-size="13">(3 domains)</text>
    <text x="453" y="627.25" text-anchor="middle" fill="#cccccc" font-size="12">異なるメカニズムで同一構造</text>
  </g>
  <!-- Domains for Card 4 -->
  <g>
    <circle cx="328" cy="567.25" r="14" fill="#b34ae2" fill-opacity="0.3" stroke="#b34ae2" stroke-opacity="0.6" stroke-width="1" />
    <text x="328" y="570.25" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D08</text>
    <circle cx="328" cy="602.25" r="14" fill="#b34ae2" fill-opacity="0.3" stroke="#b34ae2" stroke-opacity="0.6" stroke-width="1" />
    <text x="328" y="605.25" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D29</text>
    <circle cx="328" cy="637.25" r="14" fill="#b34ae2" fill-opacity="0.3" stroke="#b34ae2" stroke-opacity="0.6" stroke-width="1" />
    <text x="328" y="640.25" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D13</text>
  </g>
  <!-- Line from Hub to Card 4 -->
  <line x1="600" y1="400" x2="453" y2="602.25" stroke="#b34ae2" stroke-width="4" opacity="0.3" />
  <line x1="600" y1="400" x2="453" y2="602.25" stroke="#b34ae2" stroke-width="2" />

  <!-- Convergence 5: 結合と解除の二方向性 -->
  <!-- Card 5 (Top-Left) -->
  <g>
    <rect x="262.25" y="272.75" width="200" height="100" rx="12" fill="#2a2a4e" />
    <text x="362.25" y="302.75" text-anchor="middle" fill="#D4A857" font-size="16" font-weight="bold">結合と解除の二方向性</text>
    <text x="362.25" y="327.75" text-anchor="middle" fill="white" font-size="13">(2 domains)</text>
    <text x="362.25" y="347.75" text-anchor="middle" fill="#cccccc" font-size="12">結ぶだけでなく解く方向にも作動</text>
  </g>
  <!-- Domains for Card 5 -->
  <g>
    <circle cx="237.25" cy="305.25" r="14" fill="#D4A857" fill-opacity="0.3" stroke="#D4A857" stroke-opacity="0.6" stroke-width="1" />
    <text x="237.25" y="308.25" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D14</text>
    <circle cx="237.25" cy="340.25" r="14" fill="#D4A857" fill-opacity="0.3" stroke="#D4A857" stroke-opacity="0.6" stroke-width="1" />
    <text x="237.25" y="343.25" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D15</text>
  </g>
  <!-- Line from Hub to Card 5 -->
  <line x1="600" y1="400" x2="362.25" y2="322.75" stroke="#D4A857" stroke-width="4" opacity="0.3" />
  <line x1="600" y1="400" x2="362.25" y2="322.75" stroke="#D4A857" stroke-width="2" />

</svg>
