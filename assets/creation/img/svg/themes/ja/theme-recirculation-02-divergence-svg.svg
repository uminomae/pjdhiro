<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="80" font-family="sans-serif" font-size="30" font-weight="bold" fill="white" text-anchor="middle">
    再循環 - 未解決の緊張構造
  </text>

  <!-- Divergence 1: 循環は普遍的 vs 条件的 -->
  <g>
    <!-- Main Divergence Title -->
    <text x="600" y="160" font-family="sans-serif" font-size="24" fill="white" text-anchor="middle">
      循環は普遍的 vs 条件的
    </text>
    <!-- Tension Bars (representing the two opposing viewpoints) -->
    <rect x="150" y="200" width="440" height="20" fill="#4a90e2" />
    <rect x="610" y="200" width="440" height="20" fill="#e24a4a" />
    <!-- Tension Separator -->
    <rect x="599" y="190" width="2" height="40" fill="white" />
    <!-- Viewpoint A: 普遍的必然 -->
    <text x="150" y="240" font-family="sans-serif" font-size="18" fill="#4a90e2">
      普遍的必然
    </text>
    <text x="150" y="270" font-family="sans-serif" font-size="14" fill="#4a90e2">
      D29, D13, D30
    </text>
    <!-- Viewpoint B: 条件次第で停止 -->
    <text x="1050" y="240" font-family="sans-serif" font-size="18" fill="#e24a4a" text-anchor="end">
      条件次第で停止
    </text>
    <text x="1050" y="270" font-family="sans-serif" font-size="14" fill="#e24a4a" text-anchor="end">
      D06, D07, D22
    </text>
  </g>

  <!-- Divergence 2: 連続的循環 vs 断続的循環 -->
  <g>
    <!-- Main Divergence Title -->
    <text x="600" y="360" font-family="sans-serif" font-size="24" fill="white" text-anchor="middle">
      連続的循環 vs 断続的循環
    </text>
    <!-- Tension Bars -->
    <rect x="150" y="400" width="440" height="20" fill="#50e3c2" />
    <rect x="610" y="400" width="440" height="20" fill="#b34ae2" />
    <!-- Tension Separator -->
    <rect x="599" y="390" width="2" height="40" fill="white" />
    <!-- Viewpoint A: 漸進的連続 -->
    <text x="150" y="440" font-family="sans-serif" font-size="18" fill="#50e3c2">
      漸進的連続
    </text>
    <text x="150" y="470" font-family="sans-serif" font-size="14" fill="#50e3c2">
      D30, D26, D29
    </text>
    <!-- Viewpoint B: 質的断裂を含む -->
    <text x="1050" y="440" font-family="sans-serif" font-size="18" fill="#b34ae2" text-anchor="end">
      質的断裂を含む
    </text>
    <text x="1050" y="470" font-family="sans-serif" font-size="14" fill="#b34ae2" text-anchor="end">
      D04, D05, D16, D21
    </text>
  </g>

  <!-- Divergence 3: 場への復帰 vs 場の生成 -->
  <g>
    <!-- Main Divergence Title -->
    <text x="600" y="560" font-family="sans-serif" font-size="24" fill="white" text-anchor="middle">
      場への復帰 vs 場の生成
    </text>
    <!-- Tension Bars -->
    <rect x="150" y="600" width="440" height="20" fill="#D4A857" />
    <rect x="610" y="600" width="440" height="20" fill="#5B8DB8" />
    <!-- Tension Separator -->
    <rect x="599" y="590" width="2" height="40" fill="white" />
    <!-- Viewpoint A: 既知の場への帰還 -->
    <text x="150" y="640" font-family="sans-serif" font-size="18" fill="#D4A857">
      既知の場への帰還
    </text>
    <text x="150" y="670" font-family="sans-serif" font-size="14" fill="#D4A857">
      D24, D28
    </text>
    <!-- Viewpoint B: 未知の場の生成 -->
    <text x="1050" y="640" font-family="sans-serif" font-size="18" fill="#5B8DB8" text-anchor="end">
      未知の場の生成
    </text>
    <text x="1050" y="670" font-family="sans-serif" font-size="14" fill="#5B8DB8" text-anchor="end">
      D05, D04, D13
    </text>
  </g>

</svg>
