<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowD15" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
</defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8" rx="8"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#E0DDD8" stroke-width="1" rx="6"/>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24px" fill="#2C2C2C" font-weight="bold">D15 美学 — 5段階モデルとの構造対応図</text>

  <!-- Stage boxes -->
  <rect x="45" y="100" width="120" height="70" rx="10" fill="#8B8682"/>
  <text x="105" y="128" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">場（Field）</text>
  <text x="105" y="148" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#FAFAF8">美的可能性の開け</text>

  <rect x="195" y="100" width="120" height="70" rx="10" fill="#5B8DB8"/>
  <text x="255" y="128" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">波（Wave）</text>
  <text x="255" y="148" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#FAFAF8">緊張と対立の発生</text>

  <rect x="345" y="100" width="120" height="70" rx="10" fill="#D4A857"/>
  <text x="405" y="128" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">縁（Edge）</text>
  <text x="405" y="148" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#FAFAF8">対立の共存・接合</text>

  <rect x="495" y="100" width="120" height="70" rx="10" fill="#C45B4D"/>
  <text x="555" y="128" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">渦（Vortex）</text>
  <text x="555" y="148" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#FAFAF8">形態の自発的成立</text>

  <rect x="645" y="100" width="120" height="70" rx="10" fill="#5B8B6A"/>
  <text x="705" y="128" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">束（Bundle）</text>
  <text x="705" y="148" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#FAFAF8">閉じない完結</text>

  <!-- Arrows -->
  <line x1="165" y1="135" x2="193" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD15)"/>
  <line x1="315" y1="135" x2="343" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD15)"/>
  <line x1="465" y1="135" x2="493" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD15)"/>
  <line x1="615" y1="135" x2="643" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD15)"/>

  <!-- Concepts -->
  <!-- Field -->
  <line x1="105" y1="170" x2="105" y2="195" stroke="#8B8682" stroke-width="2"/>
  <rect x="40" y="195" width="130" height="90" rx="6" fill="none" stroke="#8B8682" stroke-width="1.5"/>
  <text x="105" y="215" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">規定可能性（Schiller）</text>
  <text x="105" y="235" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">可能性の場（Eco）</text>
  <text x="105" y="255" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">生きものと環境の関係</text>

  <!-- Wave -->
  <line x1="255" y1="170" x2="255" y2="195" stroke="#5B8DB8" stroke-width="2"/>
  <rect x="190" y="195" width="130" height="90" rx="6" fill="none" stroke="#5B8DB8" stroke-width="1.5"/>
  <text x="255" y="215" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">感性/形式衝動の対立</text>
  <text x="255" y="235" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">好奇心と恐れ（Meltzer）</text>
  <text x="255" y="255" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">多義性・不確定性</text>

  <!-- Edge -->
  <line x1="405" y1="170" x2="405" y2="195" stroke="#D4A857" stroke-width="2"/>
  <rect x="340" y="195" width="130" height="90" rx="6" fill="none" stroke="#D4A857" stroke-width="1.5"/>
  <text x="405" y="215" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">遊戯衝動（Schiller）</text>
  <text x="405" y="235" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">裂け目 Riss（Heidegger）</text>
  <text x="405" y="255" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">行為と受苦（Dewey）</text>

  <!-- Vortex -->
  <line x1="555" y1="170" x2="555" y2="195" stroke="#C45B4D" stroke-width="2"/>
  <rect x="490" y="195" width="130" height="90" rx="6" fill="none" stroke="#C45B4D" stroke-width="1.5"/>
  <text x="555" y="215" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">生きた形態（Schiller）</text>
  <text x="555" y="235" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">真理の生起（Heidegger）</text>
  <text x="555" y="255" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">PS→D統合（Meltzer）</text>

  <!-- Bundle -->
  <line x1="705" y1="170" x2="705" y2="195" stroke="#5B8B6A" stroke-width="2"/>
  <rect x="640" y="195" width="130" height="90" rx="6" fill="none" stroke="#5B8B6A" stroke-width="1.5"/>
  <text x="705" y="215" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">形態 Gestalt</text>
  <text x="705" y="235" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">開かれた構造（Eco）</text>
  <text x="705" y="255" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">美的教育の完成</text>

  <!-- Correspondence legend -->
  <text x="400" y="325" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#2C2C2C" font-weight="bold">対応の強さ（理論別）</text>

  <line x1="60" y1="348" x2="100" y2="348" stroke="#2C2C2C" stroke-width="2"/>
  <text x="108" y="352"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">強い対応</text>
  <line x1="240" y1="348" x2="280" y2="348" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="288" y="352"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">部分的対応</text>
  <line x1="440" y1="348" x2="480" y2="348" stroke="#D0D0D0" stroke-width="2" stroke-dasharray="2,3"/>
  <text x="488" y="352"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">条件付き対応</text>

  <!-- Theory rows -->
  <rect x="45" y="370" width="710" height="185" rx="6" fill="none" stroke="#E0DDD8" stroke-width="1"/>

  <text x="60" y="395"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C" font-weight="bold">強い対応:</text>
  <line x1="60" y1="405" x2="740" y2="405" stroke="#2C2C2C" stroke-width="2"/>
  <text x="60" y="420"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">Meltzer美的葛藤、日本美学（世阿弥・宣長・久松）、Dewey美的経験、Schiller美的教育、Eco開かれた作品</text>

  <text x="60" y="445"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C" font-weight="bold">部分的対応:</text>
  <line x1="60" y1="455" x2="740" y2="455" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="60" y="470"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">Kant判断力批判、Heidegger芸術作品の根源、Adorno美の理論</text>

  <text x="60" y="495"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C" font-weight="bold">条件付き:</text>
  <line x1="60" y1="505" x2="740" y2="505" stroke="#D0D0D0" stroke-width="2" stroke-dasharray="2,3"/>
  <text x="60" y="520"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">Benjamin複製技術時代の芸術作品、Ranciere感性的なものの分配</text>

  <!-- Overall summary -->
  <text x="400" y="545" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">特徴: 「縁」が8つの型で多様に記述。「束」は閉じない完結（謎性格/開かれた構造）として独自。</text>
</svg>
