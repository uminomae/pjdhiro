<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowD07" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
    <filter id="shadowD07" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="#E0DDD8" stroke-width="1" rx="4"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" font-weight="bold" fill="#2C2C2C">工学 - 5段階モデルとの構造対応図</text>
  <text x="400" y="76" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#666666">D07: 誤差駆動フィードバックが全領域に共通する構造パターン</text>

  <!-- Stage boxes -->
  <!-- 1. Field -->
  <rect x="40" y="110" width="120" height="70" rx="8" fill="#8B8682" filter="url(#shadowD07)" opacity="0.9"/>
  <text x="100" y="140" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">場</text>
  <text x="100" y="162" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#FAFAF8">Field</text>

  <!-- 2. Wave -->
  <rect x="190" y="110" width="120" height="70" rx="8" fill="#5B8DB8" filter="url(#shadowD07)" opacity="0.9"/>
  <text x="250" y="140" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">波</text>
  <text x="250" y="162" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#FAFAF8">Wave</text>

  <!-- 3. Edge -->
  <rect x="340" y="110" width="120" height="70" rx="8" fill="#D4A857" filter="url(#shadowD07)" opacity="0.9"/>
  <text x="400" y="140" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">縁</text>
  <text x="400" y="162" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#FAFAF8">Edge</text>

  <!-- 4. Vortex -->
  <rect x="490" y="110" width="120" height="70" rx="8" fill="#C45B4D" filter="url(#shadowD07)" opacity="0.9"/>
  <text x="550" y="140" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">渦</text>
  <text x="550" y="162" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#FAFAF8">Vortex</text>

  <!-- 5. Bundle -->
  <rect x="640" y="110" width="120" height="70" rx="8" fill="#5B8B6A" filter="url(#shadowD07)" opacity="0.9"/>
  <text x="700" y="140" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">束</text>
  <text x="700" y="162" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#FAFAF8">Bundle</text>

  <!-- Arrows between stages -->
  <line x1="160" y1="145" x2="188" y2="145" stroke="#666666" stroke-width="2" marker-end="url(#arrowD07)"/>
  <line x1="310" y1="145" x2="338" y2="145" stroke="#666666" stroke-width="2" marker-end="url(#arrowD07)"/>
  <line x1="460" y1="145" x2="488" y2="145" stroke="#666666" stroke-width="2" marker-end="url(#arrowD07)"/>
  <line x1="610" y1="145" x2="638" y2="145" stroke="#666666" stroke-width="2" marker-end="url(#arrowD07)"/>

  <!-- Concept labels under each stage -->
  <!-- Field concepts -->
  <line x1="100" y1="180" x2="100" y2="200" stroke="#8B8682" stroke-width="2"/>
  <text x="100" y="218" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">設計空間</text>
  <text x="100" y="238" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">制御対象モデル</text>
  <text x="100" y="258" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">ネットワーク状態</text>

  <!-- Wave concepts -->
  <line x1="250" y1="180" x2="250" y2="200" stroke="#5B8DB8" stroke-width="2"/>
  <text x="250" y="218" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">誤差信号 e(t)</text>
  <text x="250" y="238" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">損失関数</text>
  <text x="250" y="258" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">TD誤差 / パケット損失</text>

  <!-- Edge concepts -->
  <line x1="400" y1="180" x2="400" y2="200" stroke="#D4A857" stroke-width="2"/>
  <text x="400" y="218" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">センサ-制御器界面</text>
  <text x="400" y="238" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">探索-活用の分岐</text>
  <text x="400" y="258" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">損失地形の不確定性</text>

  <!-- Vortex concepts -->
  <line x1="550" y1="180" x2="550" y2="200" stroke="#C45B4D" stroke-width="2"/>
  <text x="550" y="218" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">PID制御ループ</text>
  <text x="550" y="238" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">SGD反復更新</text>
  <text x="550" y="258" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">AIMD鋸歯状波</text>

  <!-- Bundle concepts -->
  <line x1="700" y1="180" x2="700" y2="200" stroke="#5B8B6A" stroke-width="2"/>
  <text x="700" y="218" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">安定性条件</text>
  <text x="700" y="238" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Shannon容量</text>
  <text x="700" y="258" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">公平帯域分配</text>

  <!-- Correspondence strength indicators -->
  <text x="400" y="310" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="bold" fill="#2C2C2C">代表理論の対応強度</text>

  <!-- Row 1: Feedback control - strong -->
  <rect x="60" y="325" width="680" height="32" rx="4" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1"/>
  <text x="75" y="346" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">フィードバック制御系</text>
  <line x1="280" y1="341" x2="720" y2="341" stroke="#2C2C2C" stroke-width="2"/>
  <text x="735" y="346" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">強</text>

  <!-- Row 2: Deep learning - strong -->
  <rect x="60" y="362" width="680" height="32" rx="4" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1"/>
  <text x="75" y="383" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">深層学習（誤差逆伝播）</text>
  <line x1="280" y1="378" x2="720" y2="378" stroke="#2C2C2C" stroke-width="2"/>
  <text x="735" y="383" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">強</text>

  <!-- Row 3: RL - strong -->
  <rect x="60" y="399" width="680" height="32" rx="4" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1"/>
  <text x="75" y="420" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">強化学習</text>
  <line x1="280" y1="415" x2="720" y2="415" stroke="#2C2C2C" stroke-width="2"/>
  <text x="735" y="420" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">強</text>

  <!-- Row 4: TCP - partial -->
  <rect x="60" y="436" width="680" height="32" rx="4" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1"/>
  <text x="75" y="457" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">TCP輻輳制御（AIMD）</text>
  <line x1="280" y1="452" x2="720" y2="452" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="735" y="457" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">有力</text>

  <!-- Row 5: Information theory - conditional -->
  <rect x="60" y="473" width="680" height="32" rx="4" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1"/>
  <text x="75" y="494" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">情報理論（Shannon容量）</text>
  <line x1="280" y1="489" x2="720" y2="489" stroke="#D0D0D0" stroke-width="2" stroke-dasharray="2,4"/>
  <text x="735" y="494" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">条件付</text>

  <!-- Legend -->
  <line x1="60" y1="530" x2="100" y2="530" stroke="#2C2C2C" stroke-width="2"/>
  <text x="108" y="534" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">強い対応</text>
  <line x1="200" y1="530" x2="240" y2="530" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="248" y="534" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">部分的対応</text>
  <line x1="360" y1="530" x2="400" y2="530" stroke="#D0D0D0" stroke-width="2" stroke-dasharray="2,4"/>
  <text x="408" y="534" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">条件付き対応</text>

  <!-- Summary -->
  <rect x="40" y="550" width="720" height="40" rx="6" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1"/>
  <text x="400" y="570" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">全体評価: 誤差の精密な定量化、フィードバックループの自己維持性、束の定量的保証が特徴</text>
  <text x="400" y="585" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">留保: 設計者バイアス -- 5段階が設計原理として意図的に組み込まれた可能性</text>
</svg>