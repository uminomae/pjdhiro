<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead21" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
</defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8" rx="0"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#E0DDD8" stroke-width="1" rx="8"/>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24px" fill="#2C2C2C" font-weight="600">経済学 (D21) — 5段階モデルとの構造対応図</text>

  <!-- Stage boxes -->
  <!-- 場 Field -->
  <rect x="48" y="95" width="120" height="65" rx="8" fill="#8B8682"/>
  <text x="108" y="122" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="600">場（Field）</text>
  <text x="108" y="140" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">未分化の初期条件</text>

  <!-- Arrow 場→波 -->
  <line x1="168" y1="127" x2="192" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead21)"/>

  <!-- 波 Wave -->
  <rect x="196" y="95" width="120" height="65" rx="8" fill="#5B8DB8"/>
  <text x="256" y="122" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="600">波（Wave）</text>
  <text x="256" y="140" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">発散・揺らぎ</text>

  <!-- Arrow 波→縁 -->
  <line x1="316" y1="127" x2="340" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead21)"/>

  <!-- 縁 Edge -->
  <rect x="344" y="95" width="120" height="65" rx="8" fill="#D4A857"/>
  <text x="404" y="122" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="600">縁（Edge）</text>
  <text x="404" y="140" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">分岐・判断の臨界</text>

  <!-- Arrow 縁→渦 -->
  <line x1="464" y1="127" x2="488" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead21)"/>

  <!-- 渦 Vortex -->
  <rect x="492" y="95" width="120" height="65" rx="8" fill="#C45B4D"/>
  <text x="552" y="122" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="600">渦（Vortex）</text>
  <text x="552" y="140" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">自己強化ダイナミクス</text>

  <!-- Arrow 渦→束 -->
  <line x1="612" y1="127" x2="636" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead21)"/>

  <!-- 束 Bundle -->
  <rect x="640" y="95" width="120" height="65" rx="8" fill="#5B8B6A"/>
  <text x="700" y="122" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="600">束（Bundle）</text>
  <text x="700" y="140" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">持続的構造</text>

  <!-- Concepts under each stage -->
  <!-- 場 concepts (strong = solid 2px) -->
  <line x1="108" y1="160" x2="108" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="108" y="200" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">複数均衡の潜在空間</text>
  <text x="108" y="218" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Arthur)</text>
  <text x="108" y="240" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">円環的流れ・定常状態</text>
  <text x="108" y="258" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Schumpeter)</text>
  <text x="108" y="280" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">根本的不確実性</text>
  <text x="108" y="298" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Keynes)</text>

  <!-- 波 concepts (strong = solid 2px) -->
  <line x1="256" y1="160" x2="256" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="256" y="200" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">小さな揺らぎ・偶発的事象</text>
  <text x="256" y="218" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Arthur)</text>
  <text x="256" y="240" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">企業家の参入・新結合</text>
  <text x="256" y="258" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Schumpeter)</text>
  <text x="256" y="280" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">安定が生む楽観の拡大</text>
  <text x="256" y="298" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Minsky)</text>

  <!-- 縁 concepts (strong = solid 2px) -->
  <line x1="404" y1="160" x2="404" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="404" y="200" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">ティッピングポイント</text>
  <text x="404" y="218" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Arthur)</text>
  <text x="404" y="240" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">不確実性の引受判断</text>
  <text x="404" y="258" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Knight)</text>
  <text x="404" y="280" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">ミンスキー・モーメント</text>
  <text x="404" y="298" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Minsky)</text>

  <!-- 渦 concepts (strong = solid 2px) -->
  <line x1="552" y1="160" x2="552" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="552" y="200" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">収穫逓増の自己強化</text>
  <text x="552" y="218" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Arthur)</text>
  <text x="552" y="240" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">イノベーションの群生</text>
  <text x="552" y="258" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Schumpeter)</text>
  <text x="552" y="280" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">信用収縮の連鎖</text>
  <text x="552" y="298" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Minsky)</text>

  <!-- 束 concepts (strong = solid 2px) -->
  <line x1="700" y1="160" x2="700" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="700" y="200" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">技術的ロックイン</text>
  <text x="700" y="218" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Arthur)</text>
  <text x="700" y="240" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">自生的秩序・制度</text>
  <text x="700" y="258" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Hayek)</text>
  <text x="700" y="280" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">危機後の規制・新秩序</text>
  <text x="700" y="298" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Minsky)</text>

  <!-- Strength legend -->
  <rect x="48" y="330" width="712" height="1" fill="#E0DDD8"/>
  <text x="60" y="358"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#666666">対応の強さ:</text>
  <line x1="150" y1="354" x2="180" y2="354" stroke="#2C2C2C" stroke-width="2"/>
  <text x="185" y="358"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#666666">強い対応</text>
  <line x1="260" y1="354" x2="290" y2="354" stroke="#666666" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="295" y="358"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#666666">部分的対応</text>
  <line x1="380" y1="354" x2="410" y2="354" stroke="#D0D0D0" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="415" y="358"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#666666">弱い対応</text>

  <!-- Summary -->
  <rect x="48" y="378" width="712" height="180" rx="6" fill="none" stroke="#E0DDD8" stroke-width="1"/>
  <text x="68" y="402"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#2C2C2C" font-weight="600">全体の対応評価サマリ</text>

  <text x="68" y="428"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">対応度: 全体として高い（10理論全てに強いまたは部分的な対応を確認）</text>

  <text x="68" y="454"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">確定に近い: Arthur複雑系経済学（全5段階）、Minsky金融不安定性仮説（全5段階）</text>

  <text x="68" y="478"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">特徴1: 不確実性下の分岐と自己強化ダイナミクスが中盤～後半で厚い対応を示す</text>

  <text x="68" y="502"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">特徴2: 渦の方向が二極 — 創造的自己強化(Schumpeter)と破壊的自己強化(Minsky)が同型構造</text>

  <text x="68" y="526"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">特徴3: Knightのリスク/不確実性区分が「縁」の構造を原理的に記述 — 処理可能/不能の境界</text>

  <text x="68" y="550"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">部分的対応: North制度経済学、Senケイパビリティ、Penrose企業成長（特定段階に偏重）</text>
</svg>
