<svg viewBox="0 0 1200 800" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a2e" />

    <!-- Title -->
    <text x="600" y="50" text-anchor="middle" fill="white" font-size="32" font-weight="bold">舞台芸術探究における横断的パターンの発見</text>

    <!-- Center Card (Hub) -->
    <!-- Card top-left: x=400, y=280. Center: x=600, y=400. Size: 400x240 -->
    <g id="center-hub">
        <!-- Golden glow layers -->
        <rect x="390" y="270" width="420" height="260" fill="#D4A857" opacity="0.2" rx="10" ry="10" />
        <rect x="395" y="275" width="410" height="250" fill="#D4A857" opacity="0.3" rx="10" ry="10" />
        <!-- Main card rectangle -->
        <rect x="400" y="280" width="400" height="240" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" rx="10" ry="10" />
        <!-- Content -->
        <text x="600" y="320" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">方向不問性</text>
        <text x="600" y="345" text-anchor="middle" fill="#D4A857" font-size="20" font-weight="bold">——異なる因果方向から同じ統合に至る</text>
        <text x="600" y="370" text-anchor="middle" fill="white" font-size="18">(1/10 theories)</text>
        <text x="600" y="395" text-anchor="middle" fill="white" font-size="20">"スタニスラフスキー（内面から外面へ）、Meyerhold（外面から内面へ）、</text>
        <text x="600" y="420" text-anchor="middle" fill="white" font-size="20">Grotowski（不要物の除去による本質の露出）という3つの対照的なアプローチが、</text>
        <text x="600" y="445" text-anchor="middle" fill="white" font-size="20">いずれも内外の統合としての渦に到達します"</text>
        <text x="600" y="470" text-anchor="middle" fill="#cccccc" font-size="16">Found in: <tspan fill="#D4A857" font-size="14">内面から外面へ</tspan></text>
    </g>

    <!-- Satellite Cards -->
    <!-- Satellite 1: Top-left (300, 250). Card top-left: x=150, y=160. Size: 300x180 -->
    <g id="satellite-1">
        <rect x="145" y="155" width="310" height="190" fill="#4a90e2" opacity="0.2" rx="8" ry="8" />
        <rect x="150" y="160" width="300" height="180" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" rx="8" ry="8" />
        <text x="300" y="190" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">縁の多層性</text>
        <text x="300" y="210" text-anchor="middle" fill="#4a90e2" font-size="16" font-weight="bold">——舞台芸術が示す関係の複雑な構造</text>
        <text x="300" y="235" text-anchor="middle" fill="white" font-size="14">(2/10)</text>
        <text x="300" y="260" text-anchor="middle" fill="white" font-size="16">"舞台芸術では「縁」が重要な概念であり、</text>
        <text x="300" y="280" text-anchor="middle" fill="white" font-size="16">即興演劇の「Yes, and...」やViewpointsの</text>
        <text x="300" y="300" text-anchor="middle" fill="white" font-size="16">Spatial Relationshipにその複雑な構造が見られます"</text>
        <text x="300" y="325" text-anchor="middle" fill="#cccccc" font-size="14">Found in: <tspan fill="#cccccc" font-size="12">即興演劇の「Yes, and...」, Viewpointsの Spatial Relationship</tspan></text>
    </g>

    <!-- Satellite 2: Top-right (900, 250). Card top-left: x=750, y=160. Size: 300x180 -->
    <g id="satellite-2">
        <rect x="745" y="155" width="310" height="190" fill="#e24a4a" opacity="0.2" rx="8" ry="8" />
        <rect x="750" y="160" width="300" height="180" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" rx="8" ry="8" />
        <text x="900" y="190" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">渦の一回性</text>
        <text x="900" y="210" text-anchor="middle" fill="#e24a4a" font-size="16" font-weight="bold">——出来事としての統合</text>
        <text x="900" y="235" text-anchor="middle" fill="white" font-size="14">(0/10)</text>
        <text x="900" y="260" text-anchor="middle" fill="white" font-size="16">"Grotowskiの全体行為、即興演劇の</text>
        <text x="900" y="280" text-anchor="middle" fill="white" font-size="16">グループマインド、Fischer-Lichteの出現は</text>
        <text x="900" y="300" text-anchor="middle" fill="white" font-size="16">いずれも渦を持続的状態ではなく</text>
        <text x="900" y="320" text-anchor="middle" fill="white" font-size="16">一回的出来事として記述しています"</text>
        <text x="900" y="345" text-anchor="middle" fill="#cccccc" font-size="14">Found in: <tspan fill="#cccccc" font-size="12">Grotowskiの全体行為、即興演劇のグループマインド、Fischer-Lichteの出現</tspan></text>
    </g>

    <!-- Satellite 3: Bottom-left (300, 600). Card top-left: x=150, y=510. Size: 300x180 -->
    <g id="satellite-3">
        <rect x="145" y="505" width="310" height="190" fill="#50e3c2" opacity="0.2" rx="8" ry="8" />
        <rect x="150" y="510" width="300" height="180" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" rx="8" ry="8" />
        <text x="300" y="540" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">束から場への循環</text>
        <text x="300" y="565" text-anchor="middle" fill="white" font-size="14">(1/10)</text>
        <text x="300" y="590" text-anchor="middle" fill="white" font-size="16">"世阿弥の「初心忘るべからず」は、</text>
        <text x="300" y="610" text-anchor="middle" fill="white" font-size="16">伝書体系や型の伝承を通じて、</text>
        <text x="300" y="630" text-anchor="middle" fill="white" font-size="16">個々の「束」が「場」へと循環する</text>
        <text x="300" y="650" text-anchor="middle" fill="white" font-size="16">プロセスを示唆しています"</text>
        <text x="300" y="675" text-anchor="middle" fill="#cccccc" font-size="14">Found in: <tspan fill="#cccccc" font-size="12">世阿弥の「初心忘るべからず」, 伝書体系・型の伝承</tspan></text>
    </g>

    <!-- Connecting Lines -->
    <!-- Center (600, 400) -->
    <!-- Sat1 (300, 250), Sat2 (900, 250), Sat3 (300, 600) -->
    <g id="connections">
        <!-- Center to Satellites -->
        <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
        <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="2" opacity="1" />

        <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
        <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="2" opacity="1" />

        <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />
        <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="2" opacity="1" />

        <!-- Cross-connections between satellites -->
        <line x1="300" y1="250" x2="900" y2="250" stroke="#D4A857" stroke-width="2" opacity="0.3" />
        <line x1="300" y1="250" x2="300" y2="600" stroke="#D4A857" stroke-width="2" opacity="0.3" />
        <line x1="900" y1="250" x2="300" y2="600" stroke="#D4A857" stroke-width="2" opacity="0.3" />
    </g>

    <!-- Key Finding Callout -->
    <!-- Positioned below the center card -->
    <g id="key-finding">
        <rect x="300" y="540" width="600" height="50" rx="25" ry="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
        <text x="600" y="570" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">舞台芸術で最も顕著な発見 = 方向不問性——異なる因果方向から同じ統合に至る</text>
    </g>
</svg>