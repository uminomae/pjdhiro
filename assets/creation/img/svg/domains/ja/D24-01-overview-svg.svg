<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="sans-serif">
  <defs>
    <linearGradient id="phaseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50" />
      <stop offset="100%" style="stop-color:#34495E" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F39C12" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title Section -->
  <text x="600" y="60" font-size="36" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">D24 宗教学 — 5段階モデルとの構造対応調査</text>
  <text x="600" y="95" font-size="20" fill="#cccccc" text-anchor="middle" dominant-baseline="middle">10理論の横断的分析</text>

  <!-- Left Column: Research Methodology Flow -->
  <g id="methodology-flow">
    <!-- Phase 1-2: 文献確認・理論選定 -->
    <rect x="45" y="155" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="160" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" stroke-width="1" />
    <text x="200" y="190" font-size="18" fill="white" text-anchor="middle" dominant-baseline="middle">Phase 1-2: 文献確認・理論選定</text>

    <!-- Arrow 1-2 to 3-4 -->
    <path d="M 200 220 V 260" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

    <!-- Phase 3-4: 構造対応の判定 -->
    <rect x="45" y="255" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="260" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" stroke-width="1" />
    <text x="200" y="290" font-size="18" fill="white" text-anchor="middle" dominant-baseline="middle">Phase 3-4: 構造対応の判定</text>

    <!-- Arrow 3-4 to 5 -->
    <path d="M 200 320 V 360" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

    <!-- Phase 5: 論拠監査 -->
    <rect x="45" y="355" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="360" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" stroke-width="1" />
    <text x="200" y="390" font-size="18" fill="white" text-anchor="middle" dominant-baseline="middle">Phase 5: 論拠監査</text>

    <!-- Arrow 5 to 6 -->
    <path d="M 200 420 V 460" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

    <!-- Phase 6: 構造再読（4軸再評価） -->
    <rect x="45" y="455" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="460" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" stroke-width="1" />
    <text x="200" y="490" font-size="18" fill="white" text-anchor="middle" dominant-baseline="middle">Phase 6: 構造再読（4軸再評価）</text>

    <!-- Arrow 6 to 7 -->
    <path d="M 200 520 V 560" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

    <!-- Phase 7: 横断統合 -->
    <rect x="45" y="555" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="560" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" stroke-width="1" />
    <text x="200" y="590" font-size="18" fill="white" text-anchor="middle" dominant-baseline="middle">Phase 7: 横断統合</text>
  </g>

  <!-- Right Section: Theory Correspondence Heat Map -->
  <g id="heat-map">
    <!-- Column Headers -->
    <g id="column-headers">
      <rect x="550" y="160" width="148" height="30" rx="5" fill="#8B8682" />
      <text x="550" dx="74" y="175" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">場</text>
      <rect x="550+150" y="160" width="148" height="30" rx="5" fill="#5B8DB8" />
      <text x="550+150" dx="74" y="175" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">波</text>
      <rect x="550+300" y="160" width="148" height="30" rx="5" fill="#D4A857" />
      <text x="550+300" dx="74" y="175" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">縁</text>
      <rect x="550+450" y="160" width="148" height="30" rx="5" fill="#C45B4D" />
      <text x="550+450" dx="74" y="175" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">渦</text>
      <rect x="550+600" y="160" width="148" height="30" rx="5" fill="#5B8B6A" />
      <text x="550+600" dx="74" y="175" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">束</text>
    </g>

    <!-- Theory Rows and Cells -->
    <g id="theory-grid">
      <!-- Row 0: 回心7段階モデル (strong) -->
      <text x="535" y="200 + 24" font-size="14" fill="white" text-anchor="end" dominant-baseline="middle">回心7段階モデル</text>
      <rect x="550" y="200" width="148" height="48" fill="#8B8682" opacity="1.0" />
      <rect x="550+150" y="200" width="148" height="48" fill="#5B8DB8" opacity="1.0" />
      <rect x="550+300" y="200" width="148" height="48" fill="#D4A857" opacity="1.0" />
      <rect x="550+450" y="200" width="148" height="48" fill="#C45B4D" opacity="1.0" />
      <rect x="550+600" y="200" width="148" height="48" fill="#5B8B6A" opacity="1.0" />

      <!-- Row 1: リミナリティと構造/反構造 (partial) -->
      <text x="535" y="200 + 50 + 24" font-size="14" fill="white" text-anchor="end" dominant-baseline="middle">リミナリティと構造/反構造</text>
      <rect x="550" y="200+50" width="148" height="48" fill="#8B8682" opacity="0.3" />
      <rect x="550+150" y="200+50" width="148" height="48" fill="#5B8DB8" opacity="0.7" />
      <rect x="550+300" y="200+50" width="148" height="48" fill="#D4A857" opacity="0.7" />
      <rect x="550+450" y="200+50" width="148" height="48" fill="#C45B4D" opacity="0.3" />
      <rect x="550+600" y="200+50" width="148" height="48" fill="#5B8B6A" opacity="0.3" />

      <!-- Row 2: 七つの住まい (partial) -->
      <text x="535" y="200 + 100 + 24" font-size="14" fill="white" text-anchor="end" dominant-baseline="middle">七つの住まい</text>
      <rect x="550" y="200+100" width="148" height="48" fill="#8B8682" opacity="0.7" />
      <rect x="550+150" y="200+100" width="148" height="48" fill="#5B8DB8" opacity="0.7" />
      <rect x="550+300" y="200+100" width="148" height="48" fill="#D4A857" opacity="0.7" />
      <rect x="550+450" y="200+100" width="148" height="48" fill="#C45B4D" opacity="0.7" />
      <rect x="550+600" y="200+100" width="148" height="48" fill="#5B8B6A" opacity="0.7" />

      <!-- Row 3: 十牛図 (strong) -->
      <text x="535" y="200 + 150 + 24" font-size="14" fill="white" text-anchor="end" dominant-baseline="middle">十牛図</text>
      <rect x="550" y="200+150" width="148" height="48" fill="#8B8682" opacity="1.0" />
      <rect x="550+150" y="200+150" width="148" height="48" fill="#5B8DB8" opacity="1.0" />
      <rect x="550+300" y="200+150" width="148" height="48" fill="#D4A857" opacity="1.0" />
      <rect x="550+450" y="200+150" width="148" height="48" fill="#C45B4D" opacity="1.0" />
      <rect x="550+600" y="200+150" width="148" height="48" fill="#5B8B6A" opacity="1.0" />

      <!-- Row 4: ファナー/バカー (partial) -->
      <text x="535" y="200 + 200 + 24" font-size="14" fill="white" text-anchor="end" dominant-baseline="middle">ファナー/バカー</text>
      <rect x="550" y="200+200" width="148" height="48" fill="#8B8682" opacity="0.3" />
      <rect x="550+150" y="200+200" width="148" height="48" fill="#5B8DB8" opacity="0.3" />
      <rect x="550+300" y="200+200" width="148" height="48" fill="#D4A857" opacity="0.3" />
      <rect x="550+450" y="200+200" width="148" height="48" fill="#C45B4D" opacity="0.7" />
      <rect x="550+600" y="200+200" width="148" height="48" fill="#5B8B6A" opacity="0.7" />

      <!-- Row 5: 錬金術マグヌム・オプス (conditional) -->
      <text x="535" y="200 + 250 + 24" font-size="14" fill="white" text-anchor="end" dominant-baseline="middle">錬金術マグヌム・オプス</text>
      <rect x="550" y="200+250" width="148" height="48" fill="#8B8682" opacity="0.4" />
      <rect x="550+150" y="200+250" width="148" height="48" fill="#5B8DB8" opacity="0.2" />
      <rect x="550+300" y="200+250" width="148" height="48" fill="#D4A857" opacity="0.4" />
      <rect x="550+450" y="200+250" width="148" height="48" fill="#C45B4D" opacity="0.2" />
      <rect x="550+600" y="200+250" width="148" height="48" fill="#5B8B6A" opacity="0.2" />

      <!-- Row 6: 宗教的経験の諸相 (conditional) -->
      <text x="535" y="200 + 300 + 24" font-size="14" fill="white" text-anchor="end" dominant-baseline="middle">宗教的経験の諸相</text>
      <rect x="550" y="200+300" width="148" height="48" fill="#8B8682" opacity="0.2" />
      <rect x="550+150" y="200+300" width="148" height="48" fill="#5B8DB8" opacity="0.4" />
      <rect x="550+300" y="200+300" width="148" height="48" fill="#D4A857" opacity="0.2" />
      <rect x="550+450" y="200+300" width="148" height="48" fill="#C45B4D" opacity="0.4" />
      <rect x="550+600" y="200+300" width="148" height="48" fill="#5B8B6A" opacity="0.2" />

      <!-- Row 7: 聖と俗 (partial) -->
      <text x="535" y="200 + 350 + 24" font-size="14" fill="white" text-anchor="end" dominant-baseline="middle">聖と俗</text>
      <rect x="550" y="200+350" width="148" height="48" fill="#8B8682" opacity="0.7" />
      <rect x="550+150" y="200+350" width="148" height="48" fill="#5B8DB8" opacity="0.3" />
      <rect x="550+300" y="200+350" width="148" height="48" fill="#D4A857" opacity="0.3" />
      <rect x="550+450" y="200+350" width="148" height="48" fill="#C45B4D" opacity="0.3" />
      <rect x="550+600" y="200+350" width="148" height="48" fill="#5B8B6A" opacity="0.7" />

      <!-- Row 8: マカーマート (partial) -->
      <text x="535" y="200 + 400 + 24" font-size="14" fill="white" text-anchor="end" dominant-baseline="middle">マカーマート</text>
      <rect x="550" y="200+400" width="148" height="48" fill="#8B8682" opacity="0.3" />
      <rect x="550+150" y="200+400" width="148" height="48" fill="#5B8DB8" opacity="0.3" />
      <rect x="550+300" y="200+400" width="148" height="48" fill="#D4A857" opacity="0.7" />
      <rect x="550+450" y="200+400" width="148" height="48" fill="#C45B4D" opacity="0.3" />
      <rect x="550+600" y="200+400" width="148" height="48" fill="#5B8B6A" opacity="0.3" />

      <!-- Row 9: 菩薩十地と五道 (strong) -->
      <text x="535" y="200 + 450 + 24" font-size="14" fill="white" text-anchor="end" dominant-baseline="middle">菩薩十地と五道</text>
      <rect x="550" y="200+450" width="148" height="48" fill="#8B8682" opacity="1.0" />
      <rect x="550+150" y="200+450" width="148" height="48" fill="#5B8DB8" opacity="1.0" />
      <rect x="550+300" y="200+450" width="148" height="48" fill="#D4A857" opacity="1.0" />
      <rect x="550+450" y="200+450" width="148" height="48" fill="#C45B4D" opacity="1.0" />
      <rect x="550+600" y="200+450" width="148" height="48" fill="#5B8B6A" opacity="1.0" />
    </g>
  </g>

  <!-- Bottom Bar -->
  <rect x="0" y="730" width="1200" height="50" rx="20" fill="#2C3E50" stroke="#cccccc" stroke-width="1" />
  <g id="judgment-summary">
    <rect x="140" y="730+25-7.5" width="15" height="15" fill="#27AE60" />
    <text x="160" y="730+25" font-size="18" fill="white" text-anchor="start" dominant-baseline="middle">強い対応: 3件</text>
    <rect x="590" y="730+25-7.5" width="15" height="15" fill="#F1C40F" />
    <text x="610" y="730+25" font-size="18" fill="white" text-anchor="start" dominant-baseline="middle">部分的対応: 5件</text>
    <rect x="1040" y="730+25-7.5" width="15" height="15" fill="#E67E22" />
    <text x="1060" y="730+25" font-size="18" fill="white" text-anchor="start" dominant-baseline="middle">条件付き: 2件</text>
  </g>
</svg>