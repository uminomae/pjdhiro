<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" fill="white" font-size="32" font-weight="bold">
    発達心理学探究における横断的パターンの発見
  </text>

  <!-- Connecting Lines (Glow layer) -->
  <g stroke="#D4A857" stroke-width="4" opacity="0.4">
    <line x1="600" y1="400" x2="300" y2="250" />
    <line x1="600" y1="400" x2="900" y2="250" />
    <line x1="600" y1="400" x2="300" y2="600" />
    <line x1="600" y1="400" x2="900" y2="600" />
  </g>

  <!-- Connecting Lines (Sharp layer) -->
  <g stroke="#D4A857" stroke-width="2">
    <line x1="600" y1="400" x2="300" y2="250" />
    <line x1="600" y1="400" x2="900" y2="250" />
    <line x1="600" y1="400" x2="300" y2="600" />
    <line x1="600" y1="400" x2="900" y2="600" />
  </g>

  <!-- Optional Cross-connections between satellites -->
  <g stroke="#D4A857" stroke-width="1" opacity="0.3">
    <line x1="300" y1="250" x2="900" y2="250" />
    <line x1="300" y1="600" x2="900" y2="600" />
    <line x1="300" y1="250" x2="300" y2="600" />
    <line x1="900" y1="250" x2="900" y2="600" />
    <line x1="300" y1="250" x2="900" y2="600" />
    <line x1="900" y1="250" x2="300" y2="600" />
  </g>

  <!-- Center Card (Hub) -->
  <!-- Glow effect -->
  <rect x="390" y="270" width="420" height="260" fill="#D4A857" opacity="0.2" rx="10" ry="10" />
  <rect x="395" y="275" width="410" height="250" fill="#D4A857" opacity="0.3" rx="10" ry="10" />
  <!-- Main card -->
  <rect x="400" y="280" width="400" height="240" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" rx="10" ry="10" />
  <!-- Content -->
  <text x="600" y="320" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">
    構造変容としての発達
  </text>
  <text x="600" y="350" text-anchor="middle" fill="white" font-size="18">
    (0/15 theories)
  </text>
  <text x="600" y="385" text-anchor="middle" fill="white" font-size="20">
    <tspan x="600" dy="0">"発達心理学では、発達が「知識が増えること"</tspan>
  </text>
  <text x="600" y="430" text-anchor="middle" fill="#cccccc" font-size="16">
    Found in:
  </text>
  <text x="600" y="455" text-anchor="middle" fill="#D4A857" font-size="14">
    <!-- No theories listed for this pattern -->
  </text>

  <!-- Satellite Cards -->
  <!-- Satellite 1 (Top-left) - 縁の多面的記述 -->
  <g>
    <rect x="145" y="155" width="310" height="190" fill="#4a90e2" opacity="0.2" rx="8" ry="8" />
    <rect x="150" y="160" width="300" height="180" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" rx="8" ry="8" />
    <text x="300" y="195" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">
      縁の多面的記述
    </text>
    <text x="300" y="220" text-anchor="middle" fill="white" font-size="14">
      (4/15 theories)
    </text>
    <text x="300" y="245" text-anchor="middle" fill="white" font-size="16">
      <tspan x="300" dy="0">"4つの理論（ヴィゴツキー、トマセロ、動的システムアプローチ、キーガン）が、</tspan>
      <tspan x="300" dy="20">縁に当たる局面で強い構造対応を示しました"</tspan>
    </text>
    <text x="300" y="305" text-anchor="middle" fill="#cccccc" font-size="14">
      ヴィゴツキー, トマセロ, 動的システムアプローチ, キーガン
    </text>
  </g>

  <!-- Satellite 2 (Top-right) - 生成パターンとしての5段階 -->
  <g>
    <rect x="745" y="155" width="310" height="190" fill="#e24a4a" opacity="0.2" rx="8" ry="8" />
    <rect x="750" y="160" width="300" height="180" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" rx="8" ry="8" />
    <text x="900" y="195" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">
      生成パターンとしての5段階
    </text>
    <text x="900" y="220" text-anchor="middle" fill="white" font-size="14">
      (0/15 theories)
    </text>
    <text x="900" y="245" text-anchor="middle" fill="white" font-size="16">
      <tspan x="900" dy="0">"ロシャのフラクタル注記、動的システムの可逆的相転移、</tspan>
      <tspan x="900" dy="20">フィッシャーの変動性の受容、DIDSのサイクル構造、</tspan>
      <tspan x="900" dy="20">ボウルビィの探索-帰還サイクル——これらを横断すると、</tspan>
      <tspan x="900" dy="20">5段階を「一度通過したら次へ進む発達段階"</tspan>
    </text>
    <text x="900" y="335" text-anchor="middle" fill="#cccccc" font-size="14">
      <!-- Theories are listed in description -->
    </text>
  </g>

  <!-- Satellite 3 (Bottom-left) - 移行メカニズムの二水準 -->
  <g>
    <rect x="145" y="505" width="310" height="190" fill="#50e3c2" opacity="0.2" rx="8" ry="8" />
    <rect x="150" y="510" width="300" height="180" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" rx="8" ry="8" />
    <text x="300" y="545" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">
      移行メカニズムの二水準
    </text>
    <text x="300" y="570" text-anchor="middle" fill="white" font-size="14">
      (0/15 theories)
    </text>
    <text x="300" y="600" text-anchor="middle" fill="white" font-size="16">
      <tspan x="300" dy="0">"発達心理学は5段階の移行メカニズムを</tspan>
      <tspan x="300" dy="20">二つの水準で記述しています"</tspan>
    </text>
    <text x="300" y="660" text-anchor="middle" fill="#cccccc" font-size="14">
      <!-- No theories listed -->
    </text>
  </g>

  <!-- Satellite 4 (Bottom-right) - 束の二重性 -->
  <g>
    <rect x="745" y="505" width="310" height="190" fill="#b34ae2" opacity="0.2" rx="8" ry="8" />
    <rect x="750" y="510" width="300" height="180" fill="#2a2a4e" stroke="#b34ae2" stroke-width="2" rx="8" ry="8" />
    <text x="900" y="545" text-anchor="middle" fill="#b34ae2" font-size="20" font-weight="bold">
      束の二重性
    </text>
    <text x="900" y="570" text-anchor="middle" fill="white" font-size="14">
      (0/15 theories)
    </text>
    <text x="900" y="600" text-anchor="middle" fill="white" font-size="16">
      <tspan x="900" dy="0">"キーガン・Cook-Greuterは束を個人内の統合として記述し、</tspan>
      <tspan x="900" dy="20">トマセロは束を文化的慣行として記述します"</tspan>
    </text>
    <text x="900" y="660" text-anchor="middle" fill="#cccccc" font-size="14">
      キーガン, Cook-Greuter, トマセロ
    </text>
  </g>

  <!-- Key finding callout -->
  <rect x="400" y="550" width="400" height="50" rx="25" ry="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
  <text x="600" y="580" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">
    発達心理学で最も顕著な発見 = 構造変容としての発達
  </text>

</svg>