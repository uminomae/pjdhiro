<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead22" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
</defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8" rx="0"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#E0DDD8" stroke-width="1" rx="8"/>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24px" fill="#2C2C2C" font-weight="600">経営学 (D22) — 5段階モデルとの構造対応図</text>

  <!-- Stage boxes -->
  <!-- 場 Field -->
  <rect x="48" y="95" width="120" height="65" rx="8" fill="#8B8682"/>
  <text x="108" y="122" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="600">場（Field）</text>
  <text x="108" y="140" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">未分化の初期条件</text>

  <!-- Arrow 場→波 -->
  <line x1="168" y1="127" x2="192" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead22)"/>

  <!-- 波 Wave -->
  <rect x="196" y="95" width="120" height="65" rx="8" fill="#5B8DB8"/>
  <text x="256" y="122" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="600">波（Wave）</text>
  <text x="256" y="140" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">対立・探索</text>

  <!-- Arrow 波→縁 -->
  <line x1="316" y1="127" x2="340" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead22)"/>

  <!-- 縁 Edge -->
  <rect x="344" y="95" width="120" height="65" rx="8" fill="#D4A857"/>
  <text x="404" y="122" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="600">縁（Edge）</text>
  <text x="404" y="140" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">規範・関係の編成</text>

  <!-- Arrow 縁→渦 -->
  <line x1="464" y1="127" x2="488" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead22)"/>

  <!-- 渦 Vortex -->
  <rect x="492" y="95" width="120" height="65" rx="8" fill="#C45B4D"/>
  <text x="552" y="122" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="600">渦（Vortex）</text>
  <text x="552" y="140" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">機能的統合の成立</text>

  <!-- Arrow 渦→束 -->
  <line x1="612" y1="127" x2="636" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead22)"/>

  <!-- 束 Bundle -->
  <rect x="640" y="95" width="120" height="65" rx="8" fill="#5B8B6A"/>
  <text x="700" y="122" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="600">束（Bundle）</text>
  <text x="700" y="140" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">持続的構造</text>

  <!-- Concepts under each stage -->
  <!-- 場 concepts (strong = solid 2px) -->
  <line x1="108" y1="160" x2="108" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="108" y="200" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">Forming（チーム形成期）</text>
  <text x="108" y="218" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Tuckman)</text>
  <text x="108" y="240" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">暗黙知の共有</text>
  <text x="108" y="258" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(野中・竹内 SECI)</text>
  <text x="108" y="280" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">手持ちの手段</text>
  <text x="108" y="298" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Sarasvathy)</text>

  <!-- 波 concepts (strong = solid 2px) -->
  <line x1="256" y1="160" x2="256" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="256" y="200" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">Storming（対立期）</text>
  <text x="256" y="218" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Tuckman)</text>
  <text x="256" y="240" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">破壊的信号の検知</text>
  <text x="256" y="258" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Christensen)</text>
  <text x="256" y="280" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">手がかりの抽出</text>
  <text x="256" y="298" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Weick)</text>

  <!-- 縁 concepts (strong = solid 2px) -->
  <line x1="404" y1="160" x2="404" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="404" y="200" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">Norming（規範形成期）</text>
  <text x="404" y="218" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Tuckman)</text>
  <text x="404" y="240" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">イナクトメント</text>
  <text x="404" y="258" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Weick)</text>
  <text x="404" y="280" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">概念化・正当化</text>
  <text x="404" y="298" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(野中・竹内 SECI)</text>

  <!-- 渦 concepts (strong = solid 2px) -->
  <line x1="552" y1="160" x2="552" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="552" y="200" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">Performing（遂行期）</text>
  <text x="552" y="218" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Tuckman)</text>
  <text x="552" y="240" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">新市場の形成</text>
  <text x="552" y="258" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Christensen)</text>
  <text x="552" y="280" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">原型化・プロトタイプ</text>
  <text x="552" y="298" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(野中・竹内 SECI)</text>

  <!-- 束 concepts (strong = solid 2px) -->
  <line x1="700" y1="160" x2="700" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="700" y="200" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">Adjourning（継承期）</text>
  <text x="700" y="218" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(Tuckman)</text>
  <text x="700" y="240" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">横断化・制度化</text>
  <text x="700" y="258" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(野中・竹内 SECI)</text>
  <text x="700" y="280" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">標準化・活用</text>
  <text x="700" y="298" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">(March/TPS)</text>

  <!-- Strength legend -->
  <rect x="48" y="330" width="712" height="1" fill="#E0DDD8"/>
  <text x="60" y="358"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#666666">対応の強さ:</text>
  <line x1="150" y1="354" x2="180" y2="354" stroke="#2C2C2C" stroke-width="2"/>
  <text x="185" y="358"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#666666">強い対応</text>
  <line x1="260" y1="354" x2="290" y2="354" stroke="#666666" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="295" y="358"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#666666">部分的対応</text>
  <line x1="380" y1="354" x2="410" y2="354" stroke="#D0D0D0" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="415" y="358"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#666666">弱い対応</text>

  <!-- Summary -->
  <rect x="48" y="378" width="712" height="180" rx="6" fill="none" stroke="#E0DDD8" stroke-width="1"/>
  <text x="68" y="402"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#2C2C2C" font-weight="600">全体の対応評価サマリ</text>

  <text x="68" y="428"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">対応度: 全体として高整合（Tuckmanが全5段階で最も直観的な対応を示す）</text>

  <text x="68" y="454"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">強い対応(高): Tuckman(全5段階)、野中・竹内SECI(全5段階)  中: Weick, Christensen, March</text>

  <text x="68" y="478"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">特徴1: 「縁」の記述がD22で最も強いのはWeickのイナクトメント — 環境を行為で創出する</text>

  <text x="68" y="502"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">特徴2: 個人/チーム/組織/産業の4スケールで対応を確認 — TPS/リーンが保持の制度化を実装</text>

  <text x="68" y="526"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">特徴3: D1接続(誤差の拾い上げ)はChristensenの弱信号保持、D3接続(抱持)はTPS自働化が強い</text>

  <text x="68" y="550"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">反証候補: 段階順序の入替え事例(Gersick)、SECI駆動原理の弱さ、産業スケール偏重(Christensen)</text>
</svg>
