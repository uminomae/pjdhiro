<svg viewBox="0 0 1200 800" font-family="sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="32" font-weight="bold">哲学探究における横断的パターンの発見</text>

  <!-- Connecting Lines (Glow Layer) -->
  <g stroke="#D4A857" stroke-width="4" opacity="0.4">
    <line x1="600" y1="400" x2="300" y2="250" /> <!-- Hub to TL -->
    <line x1="600" y1="400" x2="900" y2="250" /> <!-- Hub to TR -->
    <line x1="600" y1="400" x2="300" y2="600" /> <!-- Hub to BL -->
    <line x1="600" y1="400" x2="900" y2="600" /> <!-- Hub to BR -->
  </g>
  <!-- Connecting Lines (Sharp Layer) -->
  <g stroke="#D4A857" stroke-width="2" opacity="1">
    <line x1="600" y1="400" x2="300" y2="250" /> <!-- Hub to TL -->
    <line x1="600" y1="400" x2="900" y2="250" /> <!-- Hub to TR -->
    <line x1="600" y1="400" x2="300" y2="600" /> <!-- Hub to BL -->
    <line x1="600" y1="400" x2="900" y2="600" /> <!-- Hub to BR -->
  </g>

  <!-- Optional Cross-connections between satellites -->
  <g stroke="#D4A857" stroke-width="1" opacity="0.3">
    <line x1="300" y1="250" x2="900" y2="250" /> <!-- TL to TR -->
    <line x1="300" y1="250" x2="300" y2="600" /> <!-- TL to BL -->
    <line x1="900" y1="250" x2="900" y2="600" /> <!-- TR to BR -->
    <line x1="300" y1="600" x2="900" y2="600" /> <!-- BL to BR -->
    <line x1="300" y1="250" x2="900" y2="600" /> <!-- TL to BR (diagonal) -->
    <line x1="900" y1="250" x2="300" y2="600" /> <!-- TR to BL (diagonal) -->
  </g>

  <!-- Center Card (Hub) -->
  <g>
    <!-- Glow effect -->
    <rect x="380" y="260" width="440" height="280" fill="#D4A857" opacity="0.2" rx="10" ry="10" />
    <rect x="390" y="270" width="420" height="260" fill="#D4A857" opacity="0.3" rx="10" ry="10" />
    <!-- Main card -->
    <rect x="400" y="280" width="400" height="240" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" rx="10" ry="10" />
    <!-- Content -->
    <text x="600" y="320" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">パターン1: 「縁」の多面性</text>
    <text x="600" y="350" text-anchor="middle" fill="white" font-size="18">(1/11 theories)</text>
    <text x="600" y="385" text-anchor="middle" fill="white" font-size="20">"哲学は「縁"</text>
    <text x="600" y="420" text-anchor="middle" fill="#cccccc" font-size="16">Found in:</text>
    <text x="600" y="445" text-anchor="middle" fill="#D4A857" font-size="14">伝播型</text>
  </g>

  <!-- Satellite Cards -->
  <!-- Satellite 1 (Top-left) - Pattern 2 -->
  <g>
    <rect x="140" y="150" width="320" height="200" fill="#4a90e2" opacity="0.2" rx="8" ry="8" />
    <rect x="150" y="160" width="300" height="180" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" rx="8" ry="8" />
    <text x="300" y="195" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">パターン2: 束→場循環の駆動力の多様性</text>
    <text x="300" y="220" text-anchor="middle" fill="white" font-size="14">(1/11)</text>
    <text x="300" y="250" text-anchor="middle" fill="white" font-size="16">
      <tspan x="300" dy="0">"なぜ束は場に戻るのかという問いに対して、</tspan>
      <tspan x="300" dy="1.2em">哲学は5つの異なる回答を提供します"</tspan>
    </text>
    <text x="300" y="300" text-anchor="middle" fill="#cccccc" font-size="14">存在論的</text>
  </g>

  <!-- Satellite 2 (Top-right) - Pattern 3 -->
  <g>
    <rect x="740" y="150" width="320" height="200" fill="#e24a4a" opacity="0.2" rx="8" ry="8" />
    <rect x="750" y="160" width="300" height="180" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" rx="8" ry="8" />
    <text x="900" y="195" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">パターン3: 受動性→能動性の勾配</text>
    <text x="900" y="220" text-anchor="middle" fill="white" font-size="14">(2/11)</text>
    <text x="900" y="250" text-anchor="middle" fill="white" font-size="16">
      <tspan x="900" dy="0">"哲学理論群は、5段階プロセスの中で</tspan>
      <tspan x="900" dy="1.2em">受動性から能動性への勾配が存在することを示します"</tspan>
    </text>
    <text x="900" y="300" text-anchor="middle" fill="#cccccc" font-size="14">
      <tspan x="900" dy="0">フッサールの受動的総合,</tspan>
      <tspan x="900" dy="1.2em">パースの「疑いは意志で起こせない」</tspan>
    </text>
  </g>

  <!-- Satellite 3 (Bottom-left) - Pattern 4 -->
  <g>
    <rect x="140" y="500" width="320" height="200" fill="#50e3c2" opacity="0.2" rx="8" ry="8" />
    <rect x="150" y="510" width="300" height="180" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" rx="8" ry="8" />
    <text x="300" y="545" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">パターン4: 段階化への内在的抵抗</text>
    <text x="300" y="570" text-anchor="middle" fill="white" font-size="14">(0/11)</text>
    <text x="300" y="600" text-anchor="middle" fill="white" font-size="16">
      <tspan x="300" dy="0">"ドゥルーズ＝ガタリのリゾーム的思考、</tspan>
      <tspan x="300" dy="1.2em">西田の絶対矛盾的自己同一、</tspan>
      <tspan x="300" dy="1.2em">デューイの段階間融合可能性という</tspan>
      <tspan x="300" dy="1.2em">3つの異なる理論が、5段階の「段階性"</tspan>
    </text>
    <!-- Theory names omitted as per data (0/11) -->
  </g>

  <!-- Satellite 4 (Bottom-right) - Pattern 5 -->
  <g>
    <rect x="740" y="500" width="320" height="200" fill="#b34ae2" opacity="0.2" rx="8" ry="8" />
    <rect x="750" y="510" width="300" height="180" fill="#2a2a4e" stroke="#b34ae2" stroke-width="2" rx="8" ry="8" />
    <text x="900" y="545" text-anchor="middle" fill="#b34ae2" font-size="20" font-weight="bold">他領域との接続可能性</text>
    <text x="900" y="570" text-anchor="middle" fill="white" font-size="14">(1/11)</text>
    <text x="900" y="600" text-anchor="middle" fill="white" font-size="16">
      <tspan x="900" dy="0">"縁の多面性は、複雑系科学（D29）で記述される</tspan>
      <tspan x="900" dy="1.2em">「縁の4つの顔"</tspan>
    </text>
    <text x="900" y="650" text-anchor="middle" fill="#cccccc" font-size="14">D29</text>
  </g>

  <!-- Key Finding Callout -->
  <g>
    <rect x="350" y="545" width="500" height="50" rx="25" ry="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
    <text x="600" y="575" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">哲学で最も顕著な発見 = パターン1: 「縁」の多面性</text>
  </g>
</svg>