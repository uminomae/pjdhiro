<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowD05" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
    <style>
      .title { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 24px; fill: #2C2C2C; font-weight: bold; }
      .stage-label { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 14px; fill: #FAFAF8; font-weight: bold; }
      .stage-sub { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 11px; fill: #FAFAF8; }
      .concept { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 12px; fill: #2C2C2C; }
      .summary { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 13px; fill: #2C2C2C; }
      .legend { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 11px; fill: #666666; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8" rx="8"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#E0DDD8" stroke-width="1" rx="6"/>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" class="title">D05 地球科学 - 5段階モデルとの構造対応図</text>

  <!-- Stage boxes -->
  <!-- 場 (Field) -->
  <rect x="50" y="100" width="120" height="70" rx="8" fill="#8B8682"/>
  <text x="110" y="130" text-anchor="middle" class="stage-label">場</text>
  <text x="110" y="148" text-anchor="middle" class="stage-sub">Field</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="135" x2="195" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD05)"/>

  <!-- 波 (Wave) -->
  <rect x="200" y="100" width="120" height="70" rx="8" fill="#5B8DB8"/>
  <text x="260" y="130" text-anchor="middle" class="stage-label">波</text>
  <text x="260" y="148" text-anchor="middle" class="stage-sub">Wave</text>

  <!-- Arrow 2 -->
  <line x1="320" y1="135" x2="345" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD05)"/>

  <!-- 縁 (Edge) -->
  <rect x="350" y="100" width="120" height="70" rx="8" fill="#D4A857"/>
  <text x="410" y="130" text-anchor="middle" class="stage-label">縁</text>
  <text x="410" y="148" text-anchor="middle" class="stage-sub">Edge</text>

  <!-- Arrow 3 -->
  <line x1="470" y1="135" x2="495" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD05)"/>

  <!-- 渦 (Vortex) -->
  <rect x="500" y="100" width="120" height="70" rx="8" fill="#C45B4D"/>
  <text x="560" y="130" text-anchor="middle" class="stage-label">渦</text>
  <text x="560" y="148" text-anchor="middle" class="stage-sub">Vortex</text>

  <!-- Arrow 4 -->
  <line x1="620" y1="135" x2="645" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD05)"/>

  <!-- 束 (Bundle) -->
  <rect x="650" y="100" width="120" height="70" rx="8" fill="#5B8B6A"/>
  <text x="710" y="130" text-anchor="middle" class="stage-label">束</text>
  <text x="710" y="148" text-anchor="middle" class="stage-sub">Bundle</text>

  <!-- Concept columns below each stage -->
  <!-- 場 concepts -->
  <line x1="110" y1="170" x2="110" y2="185" stroke="#8B8682" stroke-width="1.5"/>
  <text x="110" y="200" text-anchor="middle" class="concept">原始惑星体の混合</text>
  <text x="110" y="218" text-anchor="middle" class="concept">テクトニック応力場</text>
  <text x="110" y="236" text-anchor="middle" class="concept">Walker循環・堆積盆</text>

  <!-- 波 concepts -->
  <line x1="260" y1="170" x2="260" y2="185" stroke="#5B8DB8" stroke-width="1.5"/>
  <text x="260" y="200" text-anchor="middle" class="concept">加熱・融解の進行</text>
  <text x="260" y="218" text-anchor="middle" class="concept">弾性ひずみの蓄積</text>
  <text x="260" y="236" text-anchor="middle" class="concept">西風バースト・海水準</text>

  <!-- 縁 concepts -->
  <line x1="410" y1="170" x2="410" y2="185" stroke="#D4A857" stroke-width="1.5"/>
  <text x="410" y="200" text-anchor="middle" class="concept">金属/ケイ酸塩分離条件</text>
  <text x="410" y="218" text-anchor="middle" class="concept">臨界応力・摩擦条件</text>
  <text x="410" y="236" text-anchor="middle" class="concept">SST-大気-海洋結合点</text>

  <!-- 渦 concepts -->
  <line x1="560" y1="170" x2="560" y2="185" stroke="#C45B4D" stroke-width="1.5"/>
  <text x="560" y="200" text-anchor="middle" class="concept">鉄沈降の相互強化</text>
  <text x="560" y="218" text-anchor="middle" class="concept">動的破壊伝播</text>
  <text x="560" y="236" text-anchor="middle" class="concept">Bjerknes正帰還増幅</text>

  <!-- 束 concepts -->
  <line x1="710" y1="170" x2="710" y2="185" stroke="#5B8B6A" stroke-width="1.5"/>
  <text x="710" y="200" text-anchor="middle" class="concept">コア・マントル成層</text>
  <text x="710" y="218" text-anchor="middle" class="concept">地震記録・地形変位</text>
  <text x="710" y="236" text-anchor="middle" class="concept">堆積シーケンス</text>

  <!-- Theory mapping section -->
  <line x1="50" y1="265" x2="750" y2="265" stroke="#E0DDD8" stroke-width="1"/>
  <text x="400" y="290" text-anchor="middle" class="summary" font-weight="bold">主要理論の対応状況</text>

  <!-- Legend -->
  <line x1="60" y1="310" x2="80" y2="310" stroke="#2C2C2C" stroke-width="2"/>
  <text x="88" y="314" class="legend">強い対応（実線）</text>
  <line x1="230" y1="310" x2="250" y2="310" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="258" y="314" class="legend">有力（破線）</text>
  <line x1="420" y1="310" x2="440" y2="310" stroke="#D0D0D0" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="448" y="314" class="legend">条件付き（点線）</text>

  <!-- Theory rows - Strong (強い構造対応: 7件) -->
  <rect x="50" y="325" width="700" height="28" rx="4" fill="#F5F4F2"/>
  <text x="60" y="344" class="concept" font-weight="bold">惑星分化</text>
  <line x1="280" y1="339" x2="740" y2="339" stroke="#2C2C2C" stroke-width="2"/>

  <rect x="50" y="357" width="700" height="28" rx="4" fill="#FAFAF8"/>
  <text x="60" y="376" class="concept" font-weight="bold">プレートテクトニクス</text>
  <line x1="280" y1="371" x2="740" y2="371" stroke="#2C2C2C" stroke-width="2"/>

  <rect x="50" y="389" width="700" height="28" rx="4" fill="#F5F4F2"/>
  <text x="60" y="408" class="concept" font-weight="bold">ENSO（Bjerknes feedback）</text>
  <line x1="280" y1="403" x2="740" y2="403" stroke="#2C2C2C" stroke-width="2"/>

  <rect x="50" y="421" width="700" height="28" rx="4" fill="#FAFAF8"/>
  <text x="60" y="440" class="concept" font-weight="bold">地震発生メカニズム</text>
  <line x1="280" y1="435" x2="740" y2="435" stroke="#2C2C2C" stroke-width="2"/>

  <rect x="50" y="453" width="700" height="28" rx="4" fill="#F5F4F2"/>
  <text x="60" y="472" class="concept" font-weight="bold">シーケンス層序学</text>
  <line x1="280" y1="467" x2="740" y2="467" stroke="#2C2C2C" stroke-width="2"/>

  <!-- Theory rows - Partial (有力: 3件) -->
  <rect x="50" y="485" width="700" height="28" rx="4" fill="#FAFAF8"/>
  <text x="60" y="504" class="concept">ミランコビッチサイクル</text>
  <line x1="280" y1="499" x2="740" y2="499" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Theory rows - Conditional (条件付き: 2件) -->
  <rect x="50" y="517" width="700" height="28" rx="4" fill="#F5F4F2"/>
  <text x="60" y="536" class="concept">風化・土壌形成</text>
  <line x1="280" y1="531" x2="560" y2="531" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="560" y1="531" x2="740" y2="531" stroke="#D0D0D0" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Summary -->
  <rect x="50" y="555" width="700" height="24" rx="4" fill="#F0EFE8"/>
  <text x="400" y="572" text-anchor="middle" class="summary">14候補中7件で強い対応 / 3件有力 / 2件条件付き / 縁=関係網の結合条件として最も明快</text>
</svg>