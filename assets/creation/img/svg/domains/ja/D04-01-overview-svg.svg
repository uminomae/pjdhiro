    <rect x="420" y="356" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="562" y="356" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="704" y="356" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="846" y="356" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="988" y="356" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 5: 発生可塑性・遺伝的収容 (strong) -->
    <text x="400" y="433" text-anchor="end" dominant-baseline="middle">発生可塑性・遺伝的収容</text>
    <rect x="420" y="408" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="562" y="408" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="704" y="408" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="846" y="408" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="988" y="408" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 6: 共進化とRed Queen仮説 (strong) -->
    <text x="400" y="485" text-anchor="end" dominant-baseline="middle">共進化とRed Queen仮説</text>
    <rect x="420" y="460" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="562" y="460" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="704" y="460" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="846" y="460" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="988" y="460" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 7: ハイブリッドゾーン (strong) -->
    <text x="400" y="537" text-anchor="end" dominant-baseline="middle">ハイブリッドゾーン</text>
    <rect x="420" y="512" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="562" y="512" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="704" y="512" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="846" y="512" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="988" y="512" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 8: 内共生 (strong) -->
    <text x="400" y="589" text-anchor="end" dominant-baseline="middle">内共生</text>
    <rect x="420" y="564" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="562" y="564" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="704" y="564" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="846" y="564" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="988" y="564" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 9: 水平遺伝子移動（HGT） (strong) -->
    <text x="400" y="641" text-anchor="end" dominant-baseline="middle">水平遺伝子移動（HGT）</text>
    <rect x="420" y="616" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="562" y="616" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="704" y="616" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="846" y="616" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="988" y="616" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 10: 適応放散 (strong) -->
    <text x="400" y="693" text-anchor="end" dominant-baseline="middle">適応放散</text>
    <rect x="420" y="668" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="562" y="668" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="704" y="668" width="140" height="50" fill="#D4A857" opacity="0.3" />
    <rect x="846" y="668" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="988" y="668" width="140" height="50" fill="#5B8B6A" opacity="0.3" />
  </g>
</g>

<!-- Bottom Bar: Judgment Summary -->
<g id="summary-bar">
  <rect x="50" y="730" width="1100" height="50" rx="20" fill="#2C3E50" stroke="#cccccc" />
  <g font-size="16" fill="white">
    <!-- Strong -->
    <rect x="250" y="745" width="20" height="20" fill="#27AE60" />
    <text x="280" y="761" dominant-baseline="middle">強い対応: 9件</text>
    <!-- Partial -->
    <rect x="550" y="745" width="20" height="20" fill="#F1C40F" />
    <text x="580" y="761" dominant-baseline="middle">部分的対応: 1件</text>
    <!-- Conditional -->
    <rect x="850" y="745" width="20" height="20" fill="#E67E22" />
    <text x="880" y="761" dominant-baseline="middle">条件付き: 0件</text>
  </g>
</g>

</svg>