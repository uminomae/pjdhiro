<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="32" font-weight="bold">地球科学探究における横断的パターンの発見</text>

  <!-- Connecting Lines (Glow) -->
  <g stroke="#D4A857" stroke-width="4" opacity="0.4">
    <line x1="600" y1="400" x2="300" y2="250" /> <!-- Center to TL -->
    <line x1="600" y1="400" x2="900" y2="250" /> <!-- Center to TR -->
    <line x1="600" y1="400" x2="300" y2="600" /> <!-- Center to BL -->
    <line x1="600" y1="400" x2="900" y2="600" /> <!-- Center to BR -->
  </g>

  <!-- Connecting Lines (Sharp) -->
  <g stroke="#D4A857" stroke-width="2" opacity="1">
    <line x1="600" y1="400" x2="300" y2="250" />
    <line x1="600" y1="400" x2="900" y2="250" />
    <line x1="600" y1="400" x2="300" y2="600" />
    <line x1="600" y1="400" x2="900" y2="600" />
  </g>

  <!-- Optional Cross-connections between satellites -->
  <g stroke="#D4A857" stroke-width="1" opacity="0.3">
    <line x1="300" y1="250" x2="900" y2="250" /> <!-- TL to TR -->
    <line x1="300" y1="250" x2="300" y2="600" /> <!-- TL to BL -->
    <line x1="900" y1="250" x2="900" y2="600" /> <!-- TR to BR -->
    <line x1="300" y1="600" x2="900" y2="600" /> <!-- BL to BR -->
    <line x1="300" y1="250" x2="900" y2="600" /> <!-- TL to BR (diagonal) -->
    <line x1="900" y1="250" x2="300" y2="600" /> <!-- TR to BL (diagonal) -->
  </g>

  <!-- Center Card (Hub) -->
  <g>
    <!-- Glow -->
    <rect x="390" y="270" width="420" height="260" fill="#D4A857" opacity="0.2" rx="10" ry="10" />
    <rect x="395" y="275" width="410" height="250" fill="#D4A857" opacity="0.3" rx="10" ry="10" />
    <!-- Main Card -->
    <rect x="400" y="280" width="400" height="240" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" rx="10" ry="10" />
    <!-- Content -->
    <text x="600" y="320" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">6.1 「不発の記録」の体系的存在</text>
    <text x="600" y="355" text-anchor="middle" fill="white" font-size="18">(1/10 theories)</text>
    <text x="600" y="395" text-anchor="middle" fill="white" font-size="20">3つの独立した物理系で「縁に到達したが超えなかった</text>
    <text x="600" y="435" text-anchor="middle" fill="#cccccc" font-size="16">Found in:</text>
    <text x="600" y="460" text-anchor="middle" fill="#D4A857" font-size="14">プレートテクトニクス</text>
  </g>

  <!-- Satellite Card 1 (Top-Left) - 6.2 -->
  <g>
    <!-- Glow -->
    <rect x="140" y="150" width="320" height="200" fill="#4a90e2" opacity="0.2" rx="8" ry="8" />
    <!-- Main Card -->
    <rect x="150" y="160" width="300" height="180" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" rx="8" ry="8" />
    <!-- Content -->
    <text x="300" y="195" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">6.2 波の振幅と束の振幅の非比例性</text>
    <text x="300" y="225" text-anchor="middle" fill="white" font-size="14">1/10</text>
    <text x="300" y="250" text-anchor="middle" fill="white" font-size="16">
      <tspan x="300" dy="0">「小さなきっかけから大きな結果が生じる」</tspan>
      <tspan x="300" dy="20">最弱の日射変化が最大の氷床変動を駆動する</tspan>
    </text>
    <text x="300" y="290" text-anchor="middle" fill="#cccccc" font-size="14">複数の事例で</text>
  </g>

  <!-- Satellite Card 2 (Top-Right) - 6.3 -->
  <g>
    <!-- Glow -->
    <rect x="740" y="150" width="320" height="200" fill="#e24a4a" opacity="0.2" rx="8" ry="8" />
    <!-- Main Card -->
    <rect x="750" y="160" width="300" height="180" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" rx="8" ry="8" />
    <!-- Content -->
    <text x="900" y="195" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">6.3 閾値型メカニズムの集中と非閾値型の存在</text>
    <text x="900" y="225" text-anchor="middle" fill="white" font-size="14">10件中5件</text>
    <text x="900" y="260" text-anchor="middle" fill="white" font-size="16">10件中5件が臨界・閾値トリガ型のメカニズムを含みます</text>
    <text x="900" y="290" text-anchor="middle" fill="#cccccc" font-size="14">結合振動型</text>
  </g>

  <!-- Satellite Card 3 (Bottom-Left) - 6.4 -->
  <g>
    <!-- Glow -->
    <rect x="140" y="500" width="320" height="200" fill="#50e3c2" opacity="0.2" rx="8" ry="8" />
    <!-- Main Card -->
    <rect x="150" y="510" width="300" height="180" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" rx="8" ry="8" />
    <!-- Content -->
    <text x="300" y="545" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">6.4 束から場への螺旋構造</text>
    <text x="300" y="575" text-anchor="middle" fill="white" font-size="14">1/10</text>
    <text x="300" y="600" text-anchor="middle" fill="white" font-size="16">
      <tspan x="300" dy="0">ウィルソンサイクルでは各サイクルで大陸配置が異なり、</tspan>
      <tspan x="300" dy="20">大量絶滅後の生態系は以前と質的に異なります</tspan>
    </text>
    <text x="300" y="640" text-anchor="middle" fill="#cccccc" font-size="14">恐竜の世界→哺乳類の世界</text>
  </g>

  <!-- Satellite Card 4 (Bottom-Right) - 6.5 -->
  <g>
    <!-- Glow -->
    <rect x="740" y="500" width="320" height="200" fill="#b34ae2" opacity="0.2" rx="8" ry="8" />
    <!-- Main Card -->
    <rect x="750" y="510" width="300" height="180" fill="#2a2a4e" stroke="#b34ae2" stroke-width="2" rx="8" ry="8" />
    <!-- Content -->
    <text x="900" y="545" text-anchor="middle" fill="#b34ae2" font-size="20" font-weight="bold">6.5 渦の質的バリエーション</text>
    <text x="900" y="575" text-anchor="middle" fill="white" font-size="14">3/10</text>
    <text x="900" y="610" text-anchor="middle" fill="white" font-size="16">地球科学領域では、渦が少なくとも4つの質で現れます</text>
    <text x="900" y="640" text-anchor="middle" fill="#cccccc" font-size="14">ENSO, 地震, 火山</text>
  </g>

  <!-- Key finding callout -->
  <g>
    <rect x="375" y="545" width="450" height="50" rx="25" ry="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
    <text x="600" y="575" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">地球科学で最も顕著な発見 = 6.1 「不発の記録」の体系的存在</text>
  </g>

</svg>