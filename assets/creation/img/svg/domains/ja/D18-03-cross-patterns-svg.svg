<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" fill="white" font-size="32" font-weight="bold">
    社会学探究における横断的パターンの発見
  </text>

  <!-- Define card dimensions and positions for easier calculation -->
  <defs>
    <!-- Center Card -->
    <rect id="centerCardRect" x="400" y="280" width="400" height="240" rx="10" />
    <!-- Satellite Card Template -->
    <rect id="satelliteCardBase" width="300" height="180" rx="10" />
  </defs>

  <!-- Connecting Lines (Glow Layer) -->
  <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <line x1="600" y1="400" x2="900" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />

  <!-- Cross-connections between satellites -->
  <line x1="300" y1="250" x2="900" y2="250" stroke="#D4A857" stroke-width="2" opacity="0.3" />
  <line x1="300" y1="250" x2="300" y2="600" stroke="#D4A857" stroke-width="2" opacity="0.3" />
  <line x1="300" y1="250" x2="900" y2="600" stroke="#D4A857" stroke-width="2" opacity="0.3" />
  <line x1="900" y1="250" x2="300" y2="600" stroke="#D4A857" stroke-width="2" opacity="0.3" />
  <line x1="900" y1="250" x2="900" y2="600" stroke="#D4A857" stroke-width="2" opacity="0.3" />
  <line x1="300" y1="600" x2="900" y2="600" stroke="#D4A857" stroke-width="2" opacity="0.3" />

  <!-- Connecting Lines (Sharp Layer) -->
  <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="2" />
  <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="2" />
  <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="2" />
  <line x1="600" y1="400" x2="900" y2="600" stroke="#D4A857" stroke-width="2" />

  <!-- Center Card (Hub) -->
  <g>
    <!-- Glow effect -->
    <rect x="390" y="270" width="420" height="260" rx="10" fill="#D4A857" opacity="0.2" />
    <rect x="395" y="275" width="410" height="250" rx="10" fill="#D4A857" opacity="0.3" />
    <!-- Main card -->
    <use href="#centerCardRect" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" />

    <text x="600" y="320" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">
      束→場循環の遍在性
    </text>
    <text x="600" y="350" text-anchor="middle" fill="white" font-size="18">
      (1/11 theories)
    </text>
    <text x="600" y="380" text-anchor="middle" fill="white" font-size="20">
      <tspan x="600" dy="0em">"11エントリ中6エントリが束→場循環を</tspan>
      <tspan x="600" dy="1.2em">明示的に記述しています"</tspan>
    </text>
    <text x="600" y="440" text-anchor="middle" fill="#cccccc" font-size="16">
      Found in:
    </text>
    <text x="600" y="465" text-anchor="middle" fill="#D4A857" font-size="14">
      社会的再生産は社会学の中心的テーマ
    </text>
  </g>

  <!-- Satellite Cards -->
  <!-- Satellite 1: Top-left (300, 250) - Blue #4a90e2 -->
  <g transform="translate(150, 160)">
    <!-- Glow effect -->
    <rect x="-5" y="-5" width="310" height="190" rx="10" fill="#4a90e2" opacity="0.2" />
    <!-- Main card -->
    <use href="#satelliteCardBase" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">
      縁の構造的多様性
    </text>
    <text x="150" y="65" text-anchor="middle" fill="white" font-size="14">
      (1/11)
    </text>
    <text x="150" y="90" text-anchor="middle" fill="white" font-size="16">
      <tspan x="150" dy="0em">"11エントリに11タイプの異なる縁の型が</tspan>
      <tspan x="150" dy="1.2em">対応し、重複がありません"</tspan>
    </text>
    <text x="150" y="140" text-anchor="middle" fill="#cccccc" font-size="14">
      ルーマン
    </text>
  </g>

  <!-- Satellite 2: Top-right (900, 250) - Red #e24a4a -->
  <g transform="translate(750, 160)">
    <!-- Glow effect -->
    <rect x="-5" y="-5" width="310" height="190" rx="10" fill="#e24a4a" opacity="0.2" />
    <!-- Main card -->
    <use href="#satelliteCardBase" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">
      スケール横断的な自己相似性
    </text>
    <text x="150" y="65" text-anchor="middle" fill="white" font-size="14">
      (1/11)
    </text>
    <text x="150" y="90" text-anchor="middle" fill="white" font-size="16">
      <tspan x="150" dy="0em">"同じ5段階パターンが、ミクロ（コリンズの対面的相互作用）、</tspan>
      <tspan x="150" dy="1.2em">メゾ（ディマジオ＆パウエルの組織フィールド、社会運動）、</tspan>
      <tspan x="150" dy="1.2em">マクロ（ギデンズの社会構造、ルーマンの世界社会）の3スケールで反復されます"</tspan>
    </text>
    <text x="150" y="160" text-anchor="middle" fill="#cccccc" font-size="14">
      コリンズの対面的相互作用
    </text>
  </g>

  <!-- Satellite 3: Bottom-left (300, 600) - Teal #50e3c2 -->
  <g transform="translate(150, 510)">
    <!-- Glow effect -->
    <rect x="-5" y="-5" width="310" height="190" rx="10" fill="#50e3c2" opacity="0.2" />
    <!-- Main card -->
    <use href="#satelliteCardBase" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">
      波の条件変数の具体化
    </text>
    <text x="150" y="65" text-anchor="middle" fill="white" font-size="14">
      (0/11)
    </text>
    <text x="150" y="90" text-anchor="middle" fill="white" font-size="16">
      <tspan x="150" dy="0em">"社会学は、5段階の「波"</tspan>
    </text>
    <text x="150" y="140" text-anchor="middle" fill="#cccccc" font-size="14">
      <!-- No theory name provided for this pattern -->
    </text>
  </g>

  <!-- Satellite 4: Bottom-right (900, 600) - Purple #b34ae2 -->
  <g transform="translate(750, 510)">
    <!-- Glow effect -->
    <rect x="-5" y="-5" width="310" height="190" rx="10" fill="#b34ae2" opacity="0.2" />
    <!-- Main card -->
    <use href="#satelliteCardBase" fill="#2a2a4e" stroke="#b34ae2" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" fill="#b34ae2" font-size="20" font-weight="bold">
      束の病理学
    </text>
    <text x="150" y="65" text-anchor="middle" fill="white" font-size="14">
      (1/11)
    </text>
    <text x="150" y="90" text-anchor="middle" fill="white" font-size="16">
      <tspan x="150" dy="0em">"デュルケームのアノミー（束の不足: 規範の弛緩）と</tspan>
      <tspan x="150" dy="1.2em">ウェーバーの鉄の檻（束の過剰: 官僚制への閉塞）は、</tspan>
      <tspan x="150" dy="1.2em">束の両極的病理を記述しています"</tspan>
    </text>
    <text x="150" y="160" text-anchor="middle" fill="#cccccc" font-size="14">
      束の不足: 規範の弛緩
    </text>
  </g>

  <!-- Key finding callout -->
  <g>
    <rect x="350" y="570" width="500" height="50" rx="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
    <text x="600" y="600" text-anchor="middle" fill="white" font-size="18" font-weight="bold">
      社会学で最も顕著な発見 = 束→場循環の遍在性
    </text>
  </g>

</svg>