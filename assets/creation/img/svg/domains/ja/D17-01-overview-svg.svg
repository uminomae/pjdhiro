      <rect x="730" y="170" width="140" height="50" fill="#D4A857" opacity="0.3" /> <!-- 縁 -->
      <rect x="872" y="170" width="140" height="50" fill="#C45B4D" opacity="0.3" /> <!-- 渦 -->
      <rect x="1014" y="170" width="140" height="50" fill="#5B8B6A" opacity="0.7" /> <!-- 束 -->

