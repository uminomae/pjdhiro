      <text x="436" y="247" font-size="14" fill="white" text-anchor="end" dominant-baseline="middle">音変化の拡散モデル</text>
      <rect x="446" y="222" width="140" height="50" fill="#8B8682" opacity="0.3" /> <!-- 場 -->
