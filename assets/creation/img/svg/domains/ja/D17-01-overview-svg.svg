      <rect x="730" y="378" width="140" height="50" fill="#D4A857" opacity="1.0" /> <!-- 縁 -->
      <rect x="872" y="378" width="140" height="50" fill="#C45B4D" opacity="1.0" /> <!-- 渦 -->
      <rect x="1014" y="378" width="140" height="50" fill="#5B8B6A" opacity="1.0" /> <!-- 束 -->

      <!-- Theory 6: 構文の創発 (strong) -->
      <text x="436" y="455" font-size="14" fill="white" text-anchor="end" dominant-baseline="middle">構文の創発</text>
      <rect x="446" y="430" width="140" height="50" fill="#8B8682" opacity="1.0" /> <!-- 場 -->
      <rect x="588" y="430" width="140" height="50" fill="#5B8DB8" opacity="1.0" /> <!-- 波 -->
      <rect x="730" y="430" width="140" height="50" fill="#D4A857" opacity="1.0" /> <!-- 縁 -->
      <rect x="872" y="430" width="140" height="50" fill="#C45B4D" opacity="1.0" /> <!-- 渦 -->
