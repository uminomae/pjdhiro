  <!-- Bottom Bar: Judgment Summary -->
  <rect x="0" y="730" width="1200" height="70" rx="20" fill="#2C3E50" stroke="#cccccc" />
  <text x="600" y="765" font-size="20" fill="white" text-anchor="middle" dominant-baseline="middle">
    <tspan fill="#27AE60">■</tspan> 強い対応: 3件 /
    <tspan fill="#F1C40F">■</tspan> 部分的対応: 5件 /
    <tspan fill="#E67E22">■</tspan> 条件付き: 2件
  </text>
