      <rect x="446" y="534" width="140" height="50" fill="#8B8682" opacity="0.4" /> <!-- 場 -->
      <rect x="588" y="534" width="140" height="50" fill="#5B8DB8" opacity="0.2" /> <!-- 波 -->
      <rect x="730" y="534" width="140" height="50" fill="#D4A857" opacity="0.2" /> <!-- 縁 -->
