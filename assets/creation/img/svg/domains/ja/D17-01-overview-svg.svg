      <rect x="446" y="586" width="140" height="50" fill="#8B8682" opacity="0.3" /> <!-- 場 -->
      <rect x="588" y="586" width="140" height="50" fill="#5B8DB8" opacity="0.3" /> <!-- 波 -->
      <rect x="730" y="586" width="140" height="50" fill="#D4A857" opacity="0.7" /> <!-- 縁 -->
      <rect x="872" y="586" width="140" height="50" fill="#C45B4D" opacity="0.7" /> <!-- 渦 -->
      <rect x="1014" y="586" width="140" height="50" fill="#5B8B6A" opacity="0.3" /> <!-- 束 -->

      <!-- Theory 10: 反復的学習モデル (strong) -->
      <text x="436" y="663" font-size="14" fill="white" text-anchor="end" dominant-baseline="middle">反復的学習モデル</text>
      <rect x="446" y="638" width="140" height="50" fill="#8B8682" opacity="1.0" /> <!-- 場 -->
      <rect x="588" y="638" width="140" height="50" fill="#5B8DB8" opacity="1.0" /> <!-- 波 -->
      <rect x="730" y="638" width="140" height="50" fill="#D4A857" opacity="1.0" /> <!-- 縁 -->
      <rect x="872" y="638" width="140" height="50" fill="#C45B4D" opacity="1.0" /> <!-- 渦 -->
      <rect x="1014" y="638" width="140" height="50" fill="#5B8B6A" opacity="1.0" /> <!-- 束 -->
