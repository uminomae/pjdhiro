<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowD09" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
    <filter id="shadowD09" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="#E0DDD8" stroke-width="1" rx="4"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" font-weight="bold" fill="#2C2C2C">生命科学 - 5段階モデルとの構造対応図</text>
  <text x="400" y="76" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#666666">D09: 物質・エネルギー・構造の変換として対応が現れる。大半が意識を伴わないプロセス</text>

  <!-- Stage boxes -->
  <!-- 1. Field -->
  <rect x="40" y="110" width="120" height="70" rx="8" fill="#8B8682" filter="url(#shadowD09)" opacity="0.9"/>
  <text x="100" y="140" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">場</text>
  <text x="100" y="162" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#FAFAF8">Field</text>

  <!-- 2. Wave -->
  <rect x="190" y="110" width="120" height="70" rx="8" fill="#5B8DB8" filter="url(#shadowD09)" opacity="0.9"/>
  <text x="250" y="140" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">波</text>
  <text x="250" y="162" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#FAFAF8">Wave</text>

  <!-- 3. Edge -->
  <rect x="340" y="110" width="120" height="70" rx="8" fill="#D4A857" filter="url(#shadowD09)" opacity="0.9"/>
  <text x="400" y="140" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">縁</text>
  <text x="400" y="162" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#FAFAF8">Edge</text>

  <!-- 4. Vortex -->
  <rect x="490" y="110" width="120" height="70" rx="8" fill="#C45B4D" filter="url(#shadowD09)" opacity="0.9"/>
  <text x="550" y="140" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">渦</text>
  <text x="550" y="162" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#FAFAF8">Vortex</text>

  <!-- 5. Bundle -->
  <rect x="640" y="110" width="120" height="70" rx="8" fill="#5B8B6A" filter="url(#shadowD09)" opacity="0.9"/>
  <text x="700" y="140" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">束</text>
  <text x="700" y="162" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#FAFAF8">Bundle</text>

