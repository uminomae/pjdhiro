      <rect x="400" y="190 + 52*4" width="140" height="50" rx="3" fill="#8B8682" opacity="0.7" />
      <rect x="550" y="190 + 52*4" width="140" height="50" rx="3" fill="#5B8DB8" opacity="0.3" />
      <rect x="700" y="190 + 52*4" width="140" height="50" rx="3" fill="#D4A857" opacity="0.7" />
      <rect x="850" y="190 + 52*4" width="140" height="50" rx="3" fill="#C45B4D" opacity="0.3" />
      <rect x="1000" y="190 + 52*4" width="140" height="50" rx="3" fill="#5B8B6A" opacity="0.7" />

      <!-- Row 6: 圧縮センシング | partial | 場,縁 -->
      <text x="390" y="220 + 52*5" text-anchor="end" fill="white" font-size="14">圧縮センシング</text>
      <rect x="400" y="190 + 52*5" width="140" height="50" rx="3" fill="#8B8682" opacity="0.7" />
      <rect x="550" y="190 + 52*5" width="140" height="50" rx="3" fill="#5B8DB8" opacity="0.3" />
      <rect x="700" y="190 + 52*5" width="140" height="50" rx="3" fill="#D4A857" opacity="0.7" />
      <rect x="850" y="190 + 52*5" width="140" height="50" rx="3" fill="#C45B4D" opacity="0.3" />
      <rect x="1000" y="190 + 52*5" width="140" height="50" rx="3" fill="#5B8B6A" opacity="0.3" />

      <!-- Row 7: 強化学習 | strong | 場,波,縁,渦,束 -->
      <text x="390" y="220 + 52*6" text-anchor="end" fill="white" font-size="14">強化学習</text>
      <rect x="400" y="190 + 52*6" width="140" height="50" rx="3" fill="#8B8682" opacity="1" />
      <rect x="550" y="190 + 52*6" width="140" height="50" rx="3" fill="#5B8DB8" opacity="1" />
      <rect x="700" y="190 + 52*6" width="140" height="50" rx="3" fill="#D4A857" opacity="1" />
      <rect x="850" y="190 + 52*6" width="140" height="50" rx="3" fill="#C45B4D" opacity="1" />
      <rect x="1000" y="190 + 52*6" width="140" height="50" rx="3" fill="#5B8B6A" opacity="1" />

      <!-- Row 8: 進化的計算（遺伝的アルゴリズム） | partial | 波,渦 -->
      <text x="390" y="220 + 52*7" text-anchor="end" fill="white" font-size="14">進化的計算（遺伝的アルゴリズム）</text>
      <rect x="400" y="190 + 52*7" width="140" height="50" rx="3" fill="#8B8682" opacity="0.3" />
      <rect x="550" y="190 + 52*7" width="140" height="50" rx="3" fill="#5B8DB8" opacity="0.7" />
      <rect x="700" y="190 + 52*7" width="140" height="50" rx="3" fill="#D4A857" opacity="0.3" />
      <rect x="850" y="190 + 52*7" width="140" height="50" rx="3" fill="#C45B4D" opacity="0.7" />
      <rect x="1000" y="190 + 52*7" width="140" height="50" rx="3" fill="#5B8B6A" opacity="0.3" />

      <!-- Row 9: ソフトウェアリファクタリング | conditional | 波 -->
      <text x="390" y="220 + 52*8" text-anchor="end" fill="white" font-size="14">ソフトウェアリファクタリング</text>
      <rect x="400" y="190 + 52*8" width="140" height="50" rx="3" fill="#8B8682" opacity="0.2" />
      <rect x="550" y="190 + 52*8" width="140" height="50" rx="3" fill="#5B8DB8" opacity="0.4" />
      <rect x="700" y="190 + 52*8" width="140" height="50" rx="3" fill="#D4A857" opacity="0.2" />
      <rect x="850" y="190 + 52*8" width="140" height="50" rx="3" fill="#C45B4D" opacity="0.2" />
      <rect x="1000" y="190 + 52*8" width="140" height="50" rx="3" fill="#5B8B6A" opacity="0.2" />

      <!-- Row 10: 暗号プロトコルと鍵交換 | partial | 場,束 -->
      <text x="390" y="220 + 52*9" text-anchor="end" fill="white" font-size="14">暗号プロトコルと鍵交換</text>
      <rect x="400" y="190 + 52*9" width="140" height="50" rx="3" fill="#8B8682" opacity="0.7" />
      <rect x="550" y="190 + 52*9" width="140" height="50" rx="3" fill="#5B8DB8" opacity="0.3" />
      <rect x="700" y="190 + 52*9" width="140" height="50" rx="3" fill="#D4A857" opacity="0.3" />
      <rect x="850" y="190 + 52*9" width="140" height="50" rx="3" fill="#C45B4D" opacity="0.3" />
      <rect x="1000" y="190 + 52*9" width="140" height="50" rx="3" fill="#5B8B6A" opacity="0.7" />
    </g>
  </g>

  <!-- Bottom Bar: Judgment Summary -->
  <rect x="50" y="730" width="1100" height="50" rx="20" fill="#2C3E50" stroke="#cccccc" />
  <text x="600" y="759" text-anchor="middle" fill="white" font-size="18">
    <tspan fill="#27AE60">■</tspan> 強い対応: 3件 /
    <tspan fill="#F1C40F">■</tspan> 部分的対応: 6件 /
    <tspan fill="#E67E22">■</tspan> 条件付き: 1件
  </text>
</svg>