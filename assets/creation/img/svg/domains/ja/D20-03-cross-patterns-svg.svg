<svg viewBox="0 0 1200 800" font-family="sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="32" font-weight="bold">
    法学・政治学探究における横断的パターンの発見
  </text>

  <!-- Connecting Lines (Glow Layer) -->
  <path d="M 600 400 L 300 250 M 600 400 L 900 250 M 600 400 L 300 600"
        stroke="#D4A857" stroke-width="4" opacity="0.4" fill="none" />
  <!-- Cross-connections (Fainter) -->
  <path d="M 300 250 L 900 250 M 300 250 L 300 600 M 900 250 L 300 600"
        stroke="#D4A857" stroke-width="2" opacity="0.3" fill="none" />

  <!-- Connecting Lines (Sharp Layer) -->
  <path d="M 600 400 L 300 250 M 600 400 L 900 250 M 600 400 L 300 600"
        stroke="#D4A857" stroke-width="2" fill="none" />

  <!-- Center Card (Hub) - Glow -->
  <rect x="390" y="270" width="420" height="260" fill="#D4A857" opacity="0.2" />
  <rect x="395" y="275" width="410" height="250" fill="#D4A857" opacity="0.3" />
  <!-- Center Card (Hub) - Main -->
  <rect x="400" y="280" width="400" height="240" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" />
  <!-- Center Card Text -->
  <text x="600" y="320" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">
    パターン1: 縁の多層性
  </text>
  <text x="600" y="350" text-anchor="middle" fill="white" font-size="18">
    (0/10 theories)
  </text>
  <text x="600" y="385" text-anchor="middle" fill="white" font-size="20">
    "法学・政治学は「縁"
  </text>
  <text x="600" y="440" text-anchor="middle" fill="#cccccc" font-size="16">
    Found in:
  </text>
  <text x="600" y="465" text-anchor="middle" fill="#D4A857" font-size="14">
    <!-- No theories provided for Pattern 1 -->
  </text>

  <!-- Satellite 1 (Top-left) - パターン2: 場の設計可能性 -->
  <!-- Glow -->
  <rect x="140" y="150" width="320" height="200" fill="#4a90e2" opacity="0.2" />
  <!-- Main Card -->
  <rect x="150" y="160" width="300" height="180" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" />
  <!-- Text -->
  <text x="300" y="190" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">
    パターン2: 場の設計可能性
  </text>
  <text x="300" y="220" text-anchor="middle" fill="white" font-size="14">
    0/10
  </text>
  <text x="300" y="255" text-anchor="middle" fill="white" font-size="16">
    <tspan x="300">複数の理論が「場は自然に存在するだけでなく、</tspan>
    <tspan x="300" dy="25">意図的に創出・設計される</tspan>
  </text>
  <text x="300" y="310" text-anchor="middle" fill="#cccccc" font-size="14">
    <!-- No theories provided for Pattern 2 -->
  </text>

  <!-- Satellite 2 (Top-right) - パターン3: 権力の横断的作用 -->
  <!-- Glow -->
  <rect x="740" y="150" width="320" height="200" fill="#e24a4a" opacity="0.2" />
  <!-- Main Card -->
  <rect x="750" y="160" width="300" height="180" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" />
  <!-- Text -->
  <text x="900" y="190" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">
    パターン3: 権力の横断的作用
  </text>
  <text x="900" y="220" text-anchor="middle" fill="white" font-size="14">
    1/10
  </text>
  <text x="900" y="255" text-anchor="middle" fill="white" font-size="16">
    "法学・政治学に固有の特徴として、「権力"
  </text>
  <text x="900" y="310" text-anchor="middle" fill="#cccccc" font-size="14">
    Sieyes
  </text>

  <!-- Satellite 3 (Bottom-left) - パターン4: 5段階の「位相」としての読み -->
  <!-- Glow -->
  <rect x="140" y="500" width="320" height="200" fill="#50e3c2" opacity="0.2" />
  <!-- Main Card -->
  <rect x="150" y="510" width="300" height="180" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" />
  <!-- Text -->
  <text x="300" y="540" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">
    パターン4: 5段階の「位相」としての読み
  </text>
  <text x="300" y="570" text-anchor="middle" fill="white" font-size="14">
    0/10
  </text>
  <text x="300" y="605" text-anchor="middle" fill="white" font-size="16">
    "法学・政治学の複数の理論が、5段階を時間的順序ではなく「位相"
  </text>
  <text x="300" y="660" text-anchor="middle" fill="#cccccc" font-size="14">
    <!-- No theories provided for Pattern 4 -->
  </text>

  <!-- Key finding callout -->
  <rect x="360" y="545" width="480" height="50" rx="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
  <text x="600" y="575" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">
    法学・政治学で最も顕著な発見 = パターン1: 縁の多層性
  </text>

</svg>