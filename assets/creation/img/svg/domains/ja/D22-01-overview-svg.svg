    <rect x="630" y="526" width="120" height="40" fill="#5B8DB8" fill-opacity="1.0" rx="3" />
    <rect x="760" y="526" width="120" height="40" fill="#D4A857" fill-opacity="1.0" rx="3" />
    <rect x="890" y="526" width="120" height="40" fill="#C45B4D" fill-opacity="0.3" rx="3" />
