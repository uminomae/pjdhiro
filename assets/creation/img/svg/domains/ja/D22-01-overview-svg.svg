  <rect x="50" y="260" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" />
  <text x="200" y="295" text-anchor="middle" fill="white" font-size="18">Phase 3-4: 構造対応の判定</text>
  <line x1="200" y1="320" x2="200" y2="360" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

  <!-- Phase 5 -->
  <rect x="45" y="355" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
  <rect x="50" y="360" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" />
  <text x="200" y="395" text-anchor="middle" fill="white" font-size="18">Phase 5: 論拠監査</text>
  <line x1="200" y1="420" x2="200" y2="460" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

  <!-- Phase 6 -->
  <rect x="45" y="455" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
  <rect x="50" y="460" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" />
  <text x="200" y="495" text-anchor="middle" fill="white" font-size="18">Phase 6: 構造再読（4軸再評価）</text>
  <line x1="200" y1="520" x2="200" y2="560" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

  <!-- Phase 7 -->
