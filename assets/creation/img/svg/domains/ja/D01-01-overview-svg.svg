<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50" />
      <stop offset="100%" style="stop-color:#34495E" />
    </linearGradient>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F39C12" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title Section -->
  <text x="600" y="60" font-size="36" font-weight="bold" fill="white" text-anchor="middle">D01 数学 — 5段階モデルとの構造対応調査</text>
  <text x="600" y="95" font-size="20" fill="#cccccc" text-anchor="middle">11理論の横断的分析</text>

  <!-- Left Column: Research Methodology Flow -->
  <g id="research-flow">
    <!-- Phase 1 -->
    <rect x="45" y="155" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="160" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" />
    <text x="200" y="195" font-size="18" fill="white" text-anchor="middle" dominant-baseline="middle">Phase 1-2: 文献確認・理論選定</text>
    
    <!-- Arrow 1 -->
    <line x1="200" y1="225" x2="200" y2="255" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

    <!-- Phase 2 -->
    <rect x="45" y="255" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="260" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" />
    <text x="200" y="295" font-size="18" fill="white" text-anchor="middle" dominant-baseline="middle">Phase 3-4: 構造対応の判定</text>

    <!-- Arrow 2 -->
    <line x1="200" y1="325" x2="200" y2="355" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

    <!-- Phase 3 -->
    <rect x="45" y="355" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="360" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" />
    <text x="200" y="395" font-size="18" fill="white" text-anchor="middle" dominant-baseline="middle">Phase 5: 論拠監査</text>

    <!-- Arrow 3 -->
    <line x1="200" y1="425" x2="200" y2="455" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

    <!-- Phase 4 -->
    <rect x="45" y="455" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="460" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" />
    <text x="200" y="495" font-size="18" fill="white" text-anchor="middle" dominant-baseline="middle">Phase 6: 構造再読（4軸再評価）</text>

    <!-- Arrow 4 -->
    <line x1="200" y1="525" x2="200" y2="555" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

    <!-- Phase 5 -->
    <rect x="45" y="555" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="560" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" />
    <text x="200" y="595" font-size="18" fill="white" text-anchor="middle" dominant-baseline="middle">Phase 7: 横断統合</text>
  </g>

  <!-- Right Section: Theory Correspondence Heat Map -->
  <g id="heatmap">
    <!-- Column Headers -->
    <g id="headers" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">
      <rect x="590" y="160" width="110" height="30" rx="8" fill="#8B8682" />
      <text x="645" y="175">場</text>
      <rect x="702" y="160" width="110" height="30" rx="8" fill="#5B8DB8" />
      <text x="757" y="175">波</text>
      <rect x="814" y="160" width="110" height="30" rx="8" fill="#D4A857" />
      <text x="869" y="175">縁</text>
      <rect x="926" y="160" width="110" height="30" rx="8" fill="#C45B4D" />
      <text x="981" y="175">渦</text>
      <rect x="1038" y="160" width="110" height="30" rx="8" fill="#5B8B6A" />
      <text x="1093" y="175">束</text>
    </g>

    <!-- Grid Rows -->
    <g id="grid-content" font-size="14" fill="white" text-anchor="end" dominant-baseline="middle">
      <!-- Theory 1: スピノルと720度回転 (partial) -->
      <text x="570" y="225">スピノルと720度回転</text>
      <rect x="590" y="200" width="110" height="50" fill="#8B8682" opacity="0.7" />
      <rect x="702" y="200" width="110" height="50" fill="#5B8DB8" opacity="0.3" />
      <rect x="814" y="200" width="110" height="50" fill="#D4A857" opacity="0.3" />
      <rect x="926" y="200" width="110" height="50" fill="#C45B4D" opacity="0.3" />
      <rect x="1038" y="200" width="110" height="50" fill="#5B8B6A" opacity="0.7" />
      <!-- Theory 2: Julia集合と境界上の動態 (strong) -->
      <text x="570" y="277">Julia集合と境界上の動態</text>
      <rect x="590" y="252" width="110" height="50" fill="#8B8682" opacity="0.3" />
      <rect x="702" y="252" width="110" height="50" fill="#5B8DB8" opacity="0.3" />
      <rect x="814" y="252" width="110" height="50" fill="#D4A857" opacity="1" />
      <rect x="926" y="252" width="110" height="50" fill="#C45B4D" opacity="0.3" />
      <rect x="1038" y="252" width="110" height="50" fill="#5B8B6A" opacity="0.3" />
      <!-- Theory 3: 層とCechコホモロジーによる束の構成 (strong) -->
      <text x="570" y="329">層とCechコホモロジーによる束の構成</text>
      <rect x="590" y="304" width="110" height="50" fill="#8B8682" opacity="1" />
      <rect x="702" y="304" width="110" height="50" fill="#5B8DB8" opacity="1" />
      <rect x="814" y="304" width="110" height="50" fill="#D4A857" opacity="1" />
      <rect x="926" y="304" width="110" height="50" fill="#C45B4D" opacity="1" />
      <rect x="1038" y="304" width="110" height="50" fill="#5B8B6A" opacity="1" />
      <!-- Theory 4: Milnorファイブレーション (strong) -->
      <text x="570" y="381">Milnorファイブレーション</text>
      <rect x="590" y="356" width="110" height="50" fill="#8B8682" opacity="0.3" />
      <rect x="702" y="356" width="110" height="50" fill="#5B8DB8" opacity="0.3" />
      <rect x="814" y="356" width="110" height="50" fill="#D4A857" opacity="1" />
      <rect x="926" y="356" width="110" height="50" fill="#C45B4D" opacity="1" />
      <rect x="1038" y="356" width="110" height="50" fill="#5B8B6A" opacity="1" />
      <!-- Theory 5: 高次圏 (conditional) -->
      <text x="570" y="433">高次圏</text>
      <rect x="590" y="408" width="110" height="50" fill="#8B8682" opacity="0.4" />
      <rect x="702" y="408" width="110" height="50" fill="#5B8DB8" opacity="0.4" />
      <rect x="814" y="408" width="110" height="50" fill="#D4A857" opacity="0.2" />
      <rect x="926" y="408" width="110" height="50" fill="#C45B4D" opacity="0.2" />
      <rect x="1038" y="408" width="110" height="50" fill="#5B8B6A" opacity="0.2" />
      <!-- Theory 6: ガロア理論 (conditional) -->
      <text x="570" y="485">ガロア理論</text>
      <rect x="590" y="460" width="110" height="50" fill="#8B8682" opacity="0.4" />
      <rect x="702" y="460" width="110" height="50" fill="#5B8DB8" opacity="0.2" />
      <rect x="814" y="460" width="110" height="50" fill="#D4A857" opacity="0.2" />
      <rect x="926" y="460" width="110" height="50" fill="#C45B4D" opacity="0.2" />
      <rect x="1038" y="460" width="110" height="50" fill="#5B8B6A" opacity="0.4" />
      <!-- Theory 7: 分岐理論 (strong) -->
      <text x="570" y="537">分岐理論</text>
      <rect x="590" y="512" width="110" height="50" fill="#8B8682" opacity="0.3" />
      <rect x="702" y="512" width="110" height="50" fill="#5B8DB8" opacity="0.3" />
      <rect x="814" y="512" width="110" height="50" fill="#D4A857" opacity="1" />
      <rect x="926" y="512" width="110" height="50" fill="#C45B4D" opacity="0.3" />
      <rect x="1038" y="512" width="110" height="50" fill="#5B8B6A" opacity="0.3" />
      <!-- Theory 8: パーシステントホモロジー (partial) -->
      <text x="570" y="589">パーシステントホモロジー</text>
      <rect x="590" y="564" width="110" height="50" fill="#8B8682" opacity="0.7" />
      <rect x="702" y="564" width="110" height="50" fill="#5B8DB8" opacity="0.7" />
      <rect x="814" y="564" width="110" height="50" fill="#D4A857" opacity="0.3" />
      <rect x="926" y="564" width="110" height="50" fill="#C45B4D" opacity="0.3" />
      <rect x="1038" y="564" width="110" height="50" fill="#5B8B6A" opacity="0.3" />
      <!-- Theory 9: 特異摂動と境界層 (strong) -->
      <text x="570" y="641">特異摂動と境界層</text>
      <rect x="590" y="616" width="110" height="50" fill="#8B8682" opacity="0.3" />
      <rect x="702" y="616" width="110" height="50" fill="#5B8DB8" opacity="0.3" />
      <rect x="814" y="616" width="110" height="50" fill="#D4A857" opacity="1" />
      <rect x="926" y="616" width="110" height="50" fill="#C45B4D" opacity="0.3" />
      <rect x="1038" y="616" width="110" height="50" fill="#5B8B6A" opacity="1" />
      <!-- Theory 10: ホッジ理論 (conditional) -->
      <text x="570" y="693">ホッジ理論</text>
      <rect x="590" y="668" width="110" height="50" fill="#8B8682" opacity="0.4" />
      <rect x="702" y="668" width="110" height="50" fill="#5B8DB8" opacity="0.2" />
      <rect x="814" y="668" width="110" height="50" fill="#D4A857" opacity="0.2" />
      <rect x="926" y="668" width="110" height="50" fill="#C45B4D" opacity="0.2" />
      <rect x="1038" y="668" width="110" height="50" fill="#5B8B6A" opacity="0.2" />
      <!-- Theory 11: Morse理論 (strong) -->
      <text x="570" y="745">Morse理論</text>
      <rect x="590" y="720" width="110" height="50" fill="#8B8682" opacity="0.3" />
      <rect x="702" y="720" width="110" height="50" fill="#5B8DB8" opacity="0.3" />
      <rect x="814" y="720" width="110" height="50" fill="#D4A857" opacity="1" />
      <rect x="926" y="720" width="110" height="50" fill="#C45B4D" opacity="1" />
      <rect x="1038" y="720" width="110" height="50" fill="#5B8B6A" opacity="1" />
    </g>
  </g>

  <!-- Bottom Bar: Judgment Summary -->
  <g id="summary-bar">
    <rect x="50" y="730" width="1100" height="50" rx="20" fill="#2C3E50" stroke="#cccccc" />
    <g font-size="16" fill="white" text-anchor="start" dominant-baseline="middle">
      <!-- 強い対応 -->
      <rect x="325" y="746" width="18" height="18" fill="#27AE60" rx="3" />
      <text x="350" y="755">強い対応: 6件</text>
      <!-- 部分的対応 -->
      <rect x="525" y="746" width="18" height="18" fill="#F1C40F" rx="3" />
      <text x="550" y="755">部分的対応: 2件</text>
      <!-- 条件付き -->
      <rect x="725" y="746" width="18" height="18" fill="#E67E22" rx="3" />
      <text x="750" y="755">条件付き: 3件</text>
    </g>
  </g>
</svg>