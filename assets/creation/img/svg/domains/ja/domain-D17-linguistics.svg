<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead17" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
    <style>
      .title { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 24px; fill: #2C2C2C; font-weight: 600; }
      .stage-label { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 14px; fill: #FAFAF8; font-weight: 600; }
      .stage-sub { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 11px; fill: #FAFAF8; }
      .concept { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 12px; fill: #2C2C2C; }
      .summary-title { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 14px; fill: #2C2C2C; font-weight: 600; }
      .summary { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 12px; fill: #666666; }
      .strength-label { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 11px; fill: #666666; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8" rx="0"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#E0DDD8" stroke-width="1" rx="8"/>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" class="title">言語学 (D17) — 5段階モデルとの構造対応図</text>

  <!-- Stage boxes -->
  <!-- 場 Field -->
  <rect x="48" y="95" width="120" height="65" rx="8" fill="#8B8682"/>
  <text x="108" y="122" text-anchor="middle" class="stage-label">場（Field）</text>
  <text x="108" y="140" text-anchor="middle" class="stage-sub">未分化の初期条件</text>

  <!-- Arrow 場→波 -->
  <line x1="168" y1="127" x2="192" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead17)"/>

  <!-- 波 Wave -->
  <rect x="196" y="95" width="120" height="65" rx="8" fill="#5B8DB8"/>
  <text x="256" y="122" text-anchor="middle" class="stage-label">波（Wave）</text>
  <text x="256" y="140" text-anchor="middle" class="stage-sub">発散・競合</text>

  <!-- Arrow 波→縁 -->
  <line x1="316" y1="127" x2="340" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead17)"/>

  <!-- 縁 Edge -->
  <rect x="344" y="95" width="120" height="65" rx="8" fill="#D4A857"/>
  <text x="404" y="122" text-anchor="middle" class="stage-label">縁（Edge）</text>
  <text x="404" y="140" text-anchor="middle" class="stage-sub">緊張・関係の編成</text>

  <!-- Arrow 縁→渦 -->
  <line x1="464" y1="127" x2="488" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead17)"/>

  <!-- 渦 Vortex -->
  <rect x="492" y="95" width="120" height="65" rx="8" fill="#C45B4D"/>
  <text x="552" y="122" text-anchor="middle" class="stage-label">渦（Vortex）</text>
  <text x="552" y="140" text-anchor="middle" class="stage-sub">秩序の自発的成立</text>

  <!-- Arrow 渦→束 -->
  <line x1="612" y1="127" x2="636" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead17)"/>

  <!-- 束 Bundle -->
  <rect x="640" y="95" width="120" height="65" rx="8" fill="#5B8B6A"/>
  <text x="700" y="122" text-anchor="middle" class="stage-label">束（Bundle）</text>
  <text x="700" y="140" text-anchor="middle" class="stage-sub">持続的構造</text>

  <!-- Concepts under each stage -->
  <!-- 場 concepts (strong = solid 2px) -->
  <line x1="108" y1="160" x2="108" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="108" y="200" text-anchor="middle" class="concept">語彙の多義性</text>
  <text x="108" y="218" text-anchor="middle" class="concept">(文法化)</text>
  <text x="108" y="240" text-anchor="middle" class="concept">使用事例の蓄積</text>
  <text x="108" y="258" text-anchor="middle" class="concept">(用法基盤モデル)</text>
  <text x="108" y="280" text-anchor="middle" class="concept">ランダム初期状態</text>
  <text x="108" y="298" text-anchor="middle" class="concept">(反復的学習)</text>

  <!-- 波 concepts (strong = solid 2px) -->
  <line x1="256" y1="160" x2="256" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="256" y="200" text-anchor="middle" class="concept">語用論的推論</text>
  <text x="256" y="218" text-anchor="middle" class="concept">(文法化)</text>
  <text x="256" y="240" text-anchor="middle" class="concept">発音変異の増幅</text>
  <text x="256" y="258" text-anchor="middle" class="concept">(Labov)</text>
  <text x="256" y="280" text-anchor="middle" class="concept">世代間の変異</text>
  <text x="256" y="298" text-anchor="middle" class="concept">(反復的学習)</text>

  <!-- 縁 concepts (strong = solid 2px) -->
  <line x1="404" y1="160" x2="404" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="404" y="200" text-anchor="middle" class="concept">機能分化・装置割当</text>
  <text x="404" y="218" text-anchor="middle" class="concept">(ニカラグア手話)</text>
  <text x="404" y="240" text-anchor="middle" class="concept">制約ランキング</text>
  <text x="404" y="258" text-anchor="middle" class="concept">(最適性理論)</text>
  <text x="404" y="280" text-anchor="middle" class="concept">伝達ボトルネック</text>
  <text x="404" y="298" text-anchor="middle" class="concept">(反復的学習)</text>

  <!-- 渦 concepts (strong = solid 2px) -->
  <line x1="552" y1="160" x2="552" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="552" y="200" text-anchor="middle" class="concept">文法体系の成立</text>
  <text x="552" y="218" text-anchor="middle" class="concept">(ニカラグア手話)</text>
  <text x="552" y="240" text-anchor="middle" class="concept">組合せ構造の創発</text>
  <text x="552" y="258" text-anchor="middle" class="concept">(反復的学習)</text>
  <text x="552" y="280" text-anchor="middle" class="concept">構文の成立</text>
  <text x="552" y="298" text-anchor="middle" class="concept">(用法基盤モデル)</text>

  <!-- 束 concepts (strong = solid 2px) -->
  <line x1="700" y1="160" x2="700" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="700" y="200" text-anchor="middle" class="concept">文法体系への定着</text>
  <text x="700" y="218" text-anchor="middle" class="concept">(文法化)</text>
  <text x="700" y="240" text-anchor="middle" class="concept">音韻体系の定着</text>
  <text x="700" y="258" text-anchor="middle" class="concept">(最適性理論)</text>
  <text x="700" y="280" text-anchor="middle" class="concept">構文ネットワーク</text>
  <text x="700" y="298" text-anchor="middle" class="concept">(用法基盤モデル)</text>

  <!-- Strength legend -->
  <rect x="48" y="330" width="712" height="1" fill="#E0DDD8"/>
  <text x="60" y="358" class="strength-label">対応の強さ:</text>
  <line x1="150" y1="354" x2="180" y2="354" stroke="#2C2C2C" stroke-width="2"/>
  <text x="185" y="358" class="strength-label">強い対応</text>
  <line x1="260" y1="354" x2="290" y2="354" stroke="#666666" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="295" y="358" class="strength-label">部分的対応</text>
  <line x1="380" y1="354" x2="410" y2="354" stroke="#D0D0D0" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="415" y="358" class="strength-label">弱い対応</text>

  <!-- Summary -->
  <rect x="48" y="378" width="712" height="180" rx="6" fill="none" stroke="#E0DDD8" stroke-width="1"/>
  <text x="68" y="402" class="summary-title">全体の対応評価サマリ</text>

  <text x="68" y="428" class="summary">対応度: 全体として強い（10理論中6理論が強い対応）</text>

  <text x="68" y="454" class="summary">強い対応: 文法化、音変化の拡散、ニカラグア手話、構文の創発、最適性理論、反復的学習モデル</text>

  <text x="68" y="478" class="summary">特徴1: 「意図なき創造」— 話者の明示的意図なしに文法構造が自発的に創発（渦の具体化）</text>

  <text x="68" y="502" class="summary">特徴2: 多スケール同型性 — 個人獲得・共同体変化・歴史変遷で同型の5段階が反復</text>

  <text x="68" y="526" class="summary">特徴3: 「縁」の多様な実装 — 社会ネットワーク伝播、制約間競合、伝達ボトルネック等</text>

  <text x="68" y="550" class="summary">特徴4: ニカラグア手話は5段階全プロセスを実時間で観察できる最も直接的な事例</text>
</svg>