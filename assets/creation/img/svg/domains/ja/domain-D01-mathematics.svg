  <line x1="280" y1="339" x2="740" y2="339" stroke="#2C2C2C" stroke-width="2"/>

  <rect x="50" y="357" width="700" height="28" rx="4" fill="#FAFAF8"/>
  <text x="60" y="376"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C" font-weight="bold">Milnorファイブレーション</text>
  <line x1="280" y1="371" x2="740" y2="371" stroke="#2C2C2C" stroke-width="2"/>

  <rect x="50" y="389" width="700" height="28" rx="4" fill="#F5F4F2"/>
  <text x="60" y="408"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C" font-weight="bold">分岐理論</text>
  <line x1="280" y1="403" x2="740" y2="403" stroke="#2C2C2C" stroke-width="2"/>

  <rect x="50" y="421" width="700" height="28" rx="4" fill="#FAFAF8"/>
  <text x="60" y="440"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C" font-weight="bold">Morse理論</text>
  <line x1="280" y1="435" x2="740" y2="435" stroke="#2C2C2C" stroke-width="2"/>

  <rect x="50" y="453" width="700" height="28" rx="4" fill="#F5F4F2"/>
  <text x="60" y="472"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C" font-weight="bold">特異摂動と境界層</text>
  <line x1="280" y1="467" x2="740" y2="467" stroke="#2C2C2C" stroke-width="2"/>

  <!-- Theory rows - Partial -->
  <rect x="50" y="485" width="700" height="28" rx="4" fill="#FAFAF8"/>
  <text x="60" y="504"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">高次圏</text>
  <line x1="280" y1="499" x2="740" y2="499" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="6,3"/>

  <rect x="50" y="517" width="700" height="28" rx="4" fill="#F5F4F2"/>
  <text x="60" y="536"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">ガロア理論</text>
  <line x1="280" y1="531" x2="560" y2="531" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="560" y1="531" x2="740" y2="531" stroke="#D0D0D0" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Summary -->
  <rect x="50" y="555" width="700" height="24" rx="4" fill="#F0EFE8"/>
  <text x="400" y="572" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13px" fill="#2C2C2C">11理論中7理論で強い構造対応 / 4理論で部分的対応（縁-渦の精密さが分岐点）</text>
