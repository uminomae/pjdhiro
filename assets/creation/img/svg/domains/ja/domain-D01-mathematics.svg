<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowD01" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
</defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8" rx="8"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#E0DDD8" stroke-width="1" rx="6"/>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24px" fill="#2C2C2C" font-weight="bold">D01 数学 - 5段階モデルとの構造対応図</text>

  <!-- Stage boxes -->
  <!-- 場 (Field) -->
  <rect x="50" y="100" width="120" height="70" rx="8" fill="#8B8682"/>
  <text x="110" y="130" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">場</text>
  <text x="110" y="148" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">Field</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="135" x2="195" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD01)"/>

  <!-- 波 (Wave) -->
  <rect x="200" y="100" width="120" height="70" rx="8" fill="#5B8DB8"/>
  <text x="260" y="130" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">波</text>
  <text x="260" y="148" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">Wave</text>

  <!-- Arrow 2 -->
  <line x1="320" y1="135" x2="345" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD01)"/>

