  <text x="410" y="148" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">Edge</text>

  <!-- Arrow 3 -->
  <line x1="470" y1="135" x2="495" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD01)"/>

