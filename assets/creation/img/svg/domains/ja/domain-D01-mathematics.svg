  <text x="710" y="236" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">ハンドル分解</text>

  <!-- Theory mapping section -->
  <line x1="50" y1="265" x2="750" y2="265" stroke="#E0DDD8" stroke-width="1"/>
  <text x="400" y="290" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13px" fill="#2C2C2C" font-weight="bold">主要理論の対応状況</text>

