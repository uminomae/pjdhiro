  <line x1="60" y1="310" x2="80" y2="310" stroke="#2C2C2C" stroke-width="2"/>
  <text x="88" y="314"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#666666">強い対応（実線）</text>
