  </g>

  <!-- Bottom Bar -->
  <rect x="0" y="730" width="1200" height="70" rx="20" fill="#2C3E50" stroke="#cccccc" />
  <text x="600" y="765" text-anchor="middle" fill="white" font-size="20">
    <tspan fill="#27AE60">■</tspan> 強い対応: 3件 /
    <tspan fill="#F1C40F">■</tspan> 部分的対応: 6件 /
