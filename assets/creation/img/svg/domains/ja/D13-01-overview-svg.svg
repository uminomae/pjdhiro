      <rect x="0" y="0" width="148.4" height="50" fill="#8B8682" opacity="1.0" />
      <rect x="150.4" y="0" width="148.4" height="50" fill="#5B8DB8" opacity="1.0" />
      <rect x="300.8" y="0" width="148.4" height="50" fill="#D4A857" opacity="1.0" />
      <rect x="451.2" y="0" width="148.4" height="50" fill="#C45B4D" opacity="1.0" />
      <rect x="601.6" y="0" width="148.4" height="50" fill="#5B8B6A" opacity="1.0" />
    </g>

    <!-- Row 9: 否定弁証法 - partial (no stages match) -->
    <g transform="translate(0, 468)">
      <text x="-10" y="25" text-anchor="end" fill="white" font-size="14">否定弁証法</text>
      <rect x="0" y="0" width="148.4" height="50" fill="#8B8682" opacity="0.3" />
      <rect x="150.4" y="0" width="148.4" height="50" fill="#5B8DB8" opacity="0.3" />
      <rect x="300.8" y="0" width="148.4" height="50" fill="#D4A857" opacity="0.3" />
      <rect x="451.2" y="0" width="148.4" height="50" fill="#C45B4D" opacity="0.3" />
      <rect x="601.6" y="0" width="148.4" height="50" fill="#5B8B6A" opacity="0.3" />
    </g>

    <!-- Row 10: 場所の論理 - partial -->
    <g transform="translate(0, 520)">
