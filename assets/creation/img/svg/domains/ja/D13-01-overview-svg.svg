      <rect x="0" y="0" width="148.4" height="50" fill="#8B8682" opacity="0.4" />
      <rect x="150.4" y="0" width="148.4" height="50" fill="#5B8DB8" opacity="0.2" />
      <rect x="300.8" y="0" width="148.4" height="50" fill="#D4A857" opacity="0.2" />
      <rect x="451.2" y="0" width="148.4" height="50" fill="#C45B4D" opacity="0.2" />
      <rect x="601.6" y="0" width="148.4" height="50" fill="#5B8B6A" opacity="0.2" />
