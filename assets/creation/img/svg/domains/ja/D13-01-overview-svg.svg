      <rect x="0" y="0" width="148.4" height="50" fill="#8B8682" opacity="0.7" />
      <rect x="150.4" y="0" width="148.4" height="50" fill="#5B8DB8" opacity="0.3" />
      <rect x="300.8" y="0" width="148.4" height="50" fill="#D4A857" opacity="0.7" />
