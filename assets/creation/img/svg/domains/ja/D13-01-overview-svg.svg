  <g transform="translate(400, 130)">
    <rect x="0" y="0" width="148.4" height="30" rx="5" fill="#8B8682" />
    <text x="74.2" y="20" text-anchor="middle" fill="white" font-size="16" font-weight="bold">場</text>
