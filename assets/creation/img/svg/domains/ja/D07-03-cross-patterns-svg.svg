<svg viewBox="0 0 1200 800" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="32" font-weight="bold">
    工学・情報科学探究における横断的パターンの発見
  </text>

  <!-- Connecting Lines (Glow) -->
  <g stroke="#D4A857" stroke-width="4" opacity="0.4">
    <line x1="600" y1="400" x2="300" y2="250" />
    <line x1="600" y1="400" x2="900" y2="250" />
    <line x1="600" y1="400" x2="300" y2="600" />
    <line x1="600" y1="400" x2="900" y2="600" />
  </g>

  <!-- Connecting Lines (Sharp) -->
  <g stroke="#D4A857" stroke-width="2" opacity="1">
    <line x1="600" y1="400" x2="300" y2="250" />
    <line x1="600" y1="400" x2="900" y2="250" />
    <line x1="600" y1="400" x2="300" y2="600" />
    <line x1="600" y1="400" x2="900" y2="600" />
  </g>

  <!-- Optional Cross-connections between satellites -->
  <g stroke="#D4A857" stroke-width="1" opacity="0.3">
    <line x1="300" y1="250" x2="900" y2="250" />
    <line x1="300" y1="250" x2="300" y2="600" />
    <line x1="900" y1="250" x2="900" y2="600" />
    <line x1="300" y1="600" x2="900" y2="600" />
    <line x1="300" y1="250" x2="900" y2="600" />
    <line x1="900" y1="250" x2="300" y2="600" />
  </g>

  <!-- Center Card (Hub) -->
  <g>
    <!-- Glow layers -->
    <rect x="390" y="270" width="420" height="260" rx="10" ry="10" fill="#D4A857" opacity="0.2" />
    <rect x="395" y="275" width="410" height="250" rx="10" ry="10" fill="#D4A857" opacity="0.3" />
    <!-- Main card -->
    <rect x="400" y="280" width="400" height="240" rx="10" ry="10" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" />
    <!-- Content -->
    <text x="600" y="320" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">
      パターン1: フィードバック循環の普遍性と変種
    </text>
    <text x="600" y="355" text-anchor="middle" fill="white" font-size="18">
      (10件中6件 theories)
    </text>
    <text x="600" y="390" text-anchor="middle" fill="white" font-size="20">
      <tspan x="600" dy="0">"10件中6件がフィードバック循環型の構造を含みます"</tspan>
    </text>
    <!-- "Found in:" section omitted as no specific theories are provided in the data for this pattern -->
  </g>

  <!-- Satellite Cards -->
  <!-- Pattern 2: Top-left (300, 250) - Blue -->
  <g>
    <rect x="140" y="150" width="320" height="200" rx="8" ry="8" fill="#4a90e2" opacity="0.2" />
    <rect x="150" y="160" width="300" height="180" rx="8" ry="8" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" />
    <text x="300" y="190" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">
      パターン2: 場の構造化度と渦の必要性のトレードオフ
    </text>
    <text x="300" y="215" text-anchor="middle" fill="white" font-size="14">
      1/10
    </text>
    <text x="300" y="245" text-anchor="middle" fill="white" font-size="16">
      <tspan x="300" dy="0">"複数のエントリが「場の構造化度"</tspan>
    </text>
    <text x="300" y="275" text-anchor="middle" fill="#cccccc" font-size="14">
      探索・反復・試行錯誤
    </text>
  </g>

  <!-- Pattern 3: Top-right (900, 250) - Red -->
  <g>
    <rect x="740" y="150" width="320" height="200" rx="8" ry="8" fill="#e24a4a" opacity="0.2" />
    <rect x="750" y="160" width="300" height="180" rx="8" ry="8" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" />
    <text x="900" y="190" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">
      パターン3: 設計された5段階と自然に生じる5段階
    </text>
    <text x="900" y="215" text-anchor="middle" fill="white" font-size="14">
      1/10
    </text>
    <text x="900" y="245" text-anchor="middle" fill="white" font-size="16">
      <tspan x="900" dy="0">"工学・情報科学は「設計者の意図が介在する創造"</tspan>
    </text>
    <text x="900" y="275" text-anchor="middle" fill="#cccccc" font-size="14">
      GAは自然選択の工学的再実装
    </text>
  </g>

  <!-- Pattern 4: Bottom-left (300, 600) - Teal -->
  <g>
    <rect x="140" y="500" width="320" height="200" rx="8" ry="8" fill="#50e3c2" opacity="0.2" />
    <rect x="150" y="510" width="300" height="180" rx="8" ry="8" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" />
    <text x="300" y="540" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">
      パターン4: 束の分類学
    </text>
    <text x="300" y="565" text-anchor="middle" fill="white" font-size="14">
      3/10
    </text>
    <text x="300" y="595" text-anchor="middle" fill="white" font-size="16">
      <tspan x="300" dy="0">"各エントリが示す「束"</tspan>
    </text>
    <text x="300" y="625" text-anchor="middle" fill="#cccccc" font-size="14">
      安定点への到達: フィードバック制御, 深層学習, 強化学習
    </text>
  </g>

  <!-- Pattern 5: Bottom-right (900, 600) - Purple -->
  <g>
    <rect x="740" y="500" width="320" height="200" rx="8" ry="8" fill="#b34ae2" opacity="0.2" />
    <rect x="750" y="510" width="300" height="180" rx="8" ry="8" fill="#2a2a4e" stroke="#b34ae2" stroke-width="2" />
    <text x="900" y="540" text-anchor="middle" fill="#b34ae2" font-size="20" font-weight="bold">
      パターン5: 5段階の入れ子構造
    </text>
    <text x="900" y="565" text-anchor="middle" fill="white" font-size="14">
      1/10
    </text>
    <text x="900" y="595" text-anchor="middle" fill="white" font-size="16">
      <tspan x="900" dy="0">"TCP輻輳制御は、各送信者の局所的5段階（AIMDループ）が</tspan>
      <tspan x="900" dy="20">集合的に大域的束（公平帯域分配）を生む構造を持ちます"</tspan>
    </text>
    <text x="900" y="645" text-anchor="middle" fill="#cccccc" font-size="14">
      AIMDループ
    </text>
  </g>

  <!-- Key Finding Callout -->
  <g>
    <rect x="250" y="720" width="700" height="50" rx="25" ry="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
    <text x="600" y="750" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">
      工学・情報科学で最も顕著な発見 = パターン1: フィードバック循環の普遍性と変種
    </text>
  </g>
</svg>