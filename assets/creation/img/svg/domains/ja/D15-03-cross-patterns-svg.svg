<svg viewBox="0 0 1200 800" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="32" font-weight="bold">
    美学における5段階モデルの構造対応に関する調査報告探究における横断的パターンの発見
  </text>

  <!-- Connecting Lines (Glow Layer) -->
  <g stroke="#D4A857" stroke-width="4" opacity="0.4">
    <line x1="600" y1="400" x2="300" y2="250" /> <!-- Center to Sat1 -->
    <line x1="600" y1="400" x2="900" y2="250" /> <!-- Center to Sat2 -->
    <line x1="600" y1="400" x2="300" y2="600" /> <!-- Center to Sat3 -->
    <line x1="600" y1="400" x2="900" y2="600" /> <!-- Center to Sat4 -->
  </g>
  <!-- Connecting Lines (Sharp Layer) -->
  <g stroke="#D4A857" stroke-width="2" opacity="1">
    <line x1="600" y1="400" x2="300" y2="250" />
    <line x1="600" y1="400" x2="900" y2="250" />
    <line x1="600" y1="400" x2="300" y2="600" />
    <line x1="600" y1="400" x2="900" y2="600" />
  </g>

  <!-- Optional Cross-connections between satellites -->
  <g stroke="#D4A857" stroke-width="1" opacity="0.3">
    <line x1="300" y1="250" x2="900" y2="250" /> <!-- Sat1 to Sat2 -->
    <line x1="300" y1="250" x2="300" y2="600" /> <!-- Sat1 to Sat3 -->
    <line x1="900" y1="250" x2="900" y2="600" /> <!-- Sat2 to Sat4 -->
    <line x1="300" y1="600" x2="900" y2="600" /> <!-- Sat3 to Sat4 -->
    <line x1="300" y1="250" x2="900" y2="600" /> <!-- Sat1 to Sat4 (diagonal) -->
    <line x1="900" y1="250" x2="300" y2="600" /> <!-- Sat2 to Sat3 (diagonal) -->
  </g>

  <!-- Center Card (Hub) -->
  <g>
    <!-- Glow effect -->
    <rect x="395" y="275" width="410" height="250" fill="#D4A857" opacity="0.2" rx="10" ry="10" />
    <rect x="390" y="270" width="420" height="260" fill="#D4A857" opacity="0.1" rx="10" ry="10" />
    <!-- Main card -->
    <rect x="400" y="280" width="400" height="240" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" rx="10" ry="10" />
    <!-- Content -->
    <text x="600" y="315" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">
      6.1 処理の保留が美を生む
    </text>
    <text x="600" y="345" text-anchor="middle" fill="white" font-size="18">
      (1/10 theories)
    </text>
    <text x="600" y="375" text-anchor="middle" fill="white" font-size="20">
      <tspan x="600" dy="0">「4つの理論伝統にわたり、</tspan>
      <tspan x="600" dy="1.2em">「処理を保留すること」が美を生む」</tspan>
    </text>
    <text x="600" y="425" text-anchor="middle" fill="#cccccc" font-size="16">
      Found in:
    </text>
    <text x="600" y="445" text-anchor="middle" fill="#D4A857" font-size="14">
      他者の内的世界の不可知性への耐性
    </text>
  </g>

  <!-- Satellite Card 1 (Top-left) - 6.2 縁の型の多様性 -->
  <g>
    <rect x="145" y="155" width="310" height="190" fill="#4a90e2" opacity="0.2" rx="8" ry="8" />
    <rect x="150" y="160" width="300" height="180" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" rx="8" ry="8" />
    <text x="300" y="195" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">
      6.2 縁の型の多様性
    </text>
    <text x="300" y="220" text-anchor="middle" fill="white" font-size="14">
      1/10
    </text>
    <text x="300" y="245" text-anchor="middle" fill="white" font-size="16">
      <tspan x="300" dy="0">「本調査の全10理論で縁への対応が</tspan>
      <tspan x="300" dy="1.2em">確認された唯一の領域」</tspan>
    </text>
    <text x="300" y="295" text-anchor="middle" fill="#cccccc" font-size="14">
      秘する・忍ぶ
    </text>
  </g>

  <!-- Satellite Card 2 (Top-right) - 6.3 「開かれた束」——美的完結は閉じない -->
  <g>
    <rect x="745" y="155" width="310" height="190" fill="#e24a4a" opacity="0.2" rx="8" ry="8" />
    <rect x="750" y="160" width="300" height="180" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" rx="8" ry="8" />
    <text x="900" y="195" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">
      6.3 「開かれた束」——美的完結は閉じない
    </text>
    <text x="900" y="220" text-anchor="middle" fill="white" font-size="14">
      1/10
    </text>
    <text x="900" y="245" text-anchor="middle" fill="white" font-size="16">
      <tspan x="900" dy="0">「Deweyのconsummationは「充足」だが</tspan>
      <tspan x="900" dy="1.2em">「終了」ではない」</tspan>
    </text>
    <text x="900" y="295" text-anchor="middle" fill="#cccccc" font-size="14">
      consummationは「充足」だが「終了」ではない
    </text>
  </g>

  <!-- Satellite Card 3 (Bottom-left) - 6.4 場の積極的再定義 -->
  <g>
    <rect x="145" y="505" width="310" height="190" fill="#50e3c2" opacity="0.2" rx="8" ry="8" />
    <rect x="150" y="510" width="300" height="180" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" rx="8" ry="8" />
    <text x="300" y="545" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">
      6.4 場の積極的再定義
    </text>
    <text x="300" y="570" text-anchor="middle" fill="white" font-size="14">
      1/10
    </text>
    <text x="300" y="595" text-anchor="middle" fill="white" font-size="16">
      <tspan x="300" dy="0">「4つの理論が収斂し、場を「空虚だが</tspan>
      <tspan x="300" dy="1.2em">可能性に満ちた状態」と再定義」</tspan>
    </text>
    <text x="300" y="645" text-anchor="middle" fill="#cccccc" font-size="14">
      規定可能性：何も決定されていないが全ての決定が可能な状態
    </text>
  </g>

  <!-- Satellite Card 4 (Bottom-right) - 6.5 渦の弱さ——美学領域の特徴 -->
  <g>
    <rect x="745" y="505" width="310" height="190" fill="#b34ae2" opacity="0.2" rx="8" ry="8" />
    <rect x="750" y="510" width="300" height="180" fill="#2a2a4e" stroke="#b34ae2" stroke-width="2" rx="8" ry="8" />
    <text x="900" y="545" text-anchor="middle" fill="#b34ae2" font-size="20" font-weight="bold">
      6.5 渦の弱さ——美学領域の特徴
    </text>
    <text x="900" y="570" text-anchor="middle" fill="white" font-size="14">
      1/10
    </text>
    <text x="900" y="595" text-anchor="middle" fill="white" font-size="16">
      <tspan x="900" dy="0">「本調査の5段階のうち渦の対応が</tspan>
      <tspan x="900" dy="1.2em">最も弱い領域」</tspan>
    </text>
    <text x="900" y="645" text-anchor="middle" fill="#cccccc" font-size="14">
      抵抗の転化
    </text>
  </g>

  <!-- Key finding callout -->
  <g>
    <rect x="250" y="720" width="700" height="50" rx="25" ry="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
    <text x="600" y="750" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">
      美学における5段階モデルの構造対応に関する調査報告で最も顕著な発見 = 6.1 処理の保留が美を生む
    </text>
  </g>
</svg>