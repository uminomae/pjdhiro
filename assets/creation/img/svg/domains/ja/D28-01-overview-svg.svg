  <rect x="50" y="560" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" stroke-width="1" />
  <text x="200" y="597" fill="white" font-size="18" text-anchor="middle">Phase 7: 横断統合</text>

  <!-- Arrowhead definition -->
