<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="32" font-weight="bold">薬学探究における横断的パターンの発見</text>

  <!-- Connecting Lines (Glow Layer) -->
  <!-- Hub (600, 400) to S1 (300, 250) -->
  <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <!-- Hub (600, 400) to S2 (900, 250) -->
  <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <!-- Hub (600, 400) to S3 (300, 600) -->
  <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />

  <!-- Connecting Lines (Sharp Layer) -->
  <!-- Hub (600, 400) to S1 (300, 250) -->
  <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="2" />
  <!-- Hub (600, 400) to S2 (900, 250) -->
  <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="2" />
  <!-- Hub (600, 400) to S3 (300, 600) -->
  <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="2" />

  <!-- Center Card (Hub) -->
  <!-- Glow layers -->
  <rect x="395" y="275" width="410" height="250" rx="10" fill="#D4A857" opacity="0.2" />
  <rect x="397.5" y="277.5" width="405" height="245" rx="10" fill="#D4A857" opacity="0.3" />
  <!-- Main card -->
  <rect x="400" y="280" width="400" height="240" rx="10" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" />
  <!-- Text content -->
  <text x="600" y="310" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">縁の制御可能性スペクトラム</text>
  <text x="600" y="345" text-anchor="middle" fill="white" font-size="18">(0/10 theories)</text>
  <text x="600" y="380" text-anchor="middle" fill="white" font-size="20">
    <tspan x="600" dy="0">薬学の最も顕著な構造的特徴は、</tspan>
    <tspan x="600" dy="25">一領域内で「縁」の制御可能性がスペクトラムを形成している点である。</tspan>
  </text>

  <!-- Satellite Card 1 (Top-left) -->
  <!-- Glow layer -->
  <rect x="145" y="155" width="310" height="190" rx="8" fill="#4a90e2" opacity="0.2" />
  <!-- Main card -->
  <rect x="150" y="160" width="300" height="180" rx="8" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" />
  <!-- Text content -->
  <text x="300" y="190" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">プロセスの制度化</text>
  <text x="300" y="215" text-anchor="middle" fill="white" font-size="14">1/10</text>
  <text x="300" y="245" text-anchor="middle" fill="white" font-size="16">
    <tspan x="300" dy="0">薬学のもう一つの特徴は、</tspan>
    <tspan x="300" dy="20">「5段階の構造を制度的な語彙で記述している」点である。</tspan>
  </text>
  <text x="300" y="290" text-anchor="middle" fill="#cccccc" font-size="14">ISO規格</text>

  <!-- Satellite Card 2 (Top-right) -->
  <!-- Glow layer -->
  <rect x="745" y="155" width="310" height="190" rx="8" fill="#e24a4a" opacity="0.2" />
  <!-- Main card -->
  <rect x="750" y="160" width="300" height="180" rx="8" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" />
  <!-- Text content -->
  <text x="900" y="190" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">束→場循環の追跡可能性</text>
  <text x="900" y="215" text-anchor="middle" fill="white" font-size="14">1/10</text>
  <text x="900" y="245" text-anchor="middle" fill="white" font-size="16">
    <tspan x="900" dy="0">薬学では、5段階が</tspan>
    <tspan x="900" dy="20">「一回で完結する直線」として追跡可能である。</tspan>
  </text>
  <text x="900" y="290" text-anchor="middle" fill="#cccccc" font-size="14">束</text>

  <!-- Satellite Card 3 (Bottom-left) -->
  <!-- Glow layer -->
  <rect x="145" y="505" width="310" height="190" rx="8" fill="#50e3c2" opacity="0.2" />
  <!-- Main card -->
  <rect x="150" y="510" width="300" height="180" rx="8" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" />
  <!-- Text content -->
  <text x="300" y="540" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">場の個別性</text>
  <text x="300" y="565" text-anchor="middle" fill="white" font-size="14">1/10</text>
  <text x="300" y="595" text-anchor="middle" fill="white" font-size="16">
    <tspan x="300" dy="0">PK/PD（5.2）とファーマコゲノミクス（5.8）が示す</tspan>
    <tspan x="300" dy="20">「CYP多型による場の個別性」が顕著である。</tspan>
  </text>
  <text x="300" y="640" text-anchor="middle" fill="#cccccc" font-size="14">5.2</text>

  <!-- Key finding callout -->
  <rect x="350" y="545" width="500" height="50" rx="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
  <text x="600" y="575" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">薬学で最も顕著な発見 = 縁の制御可能性スペクトラム</text>

</svg>