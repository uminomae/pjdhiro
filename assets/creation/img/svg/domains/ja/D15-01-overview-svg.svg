<svg viewBox="0 0 1200 800" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <defs>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50" />
      <stop offset="100%" style="stop-color:#34495E" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F39C12" />
    </marker>
  </defs>

  <!-- Title Section -->
  <text x="600" y="60" fill="white" font-size="36" font-weight="bold" text-anchor="middle">D15 美学における5段階モデルの構造対応に関する調査報告 — 5段階モデルとの構造対応調査</text>
  <text x="600" y="95" fill="#cccccc" font-size="20" text-anchor="middle">10理論の横断的分析</text>

  <!-- Left Column: Research Methodology Flow -->
  <g class="methodology-flow">
    <!-- Phase 1-2 -->
    <rect x="45" y="155" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="160" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" stroke-width="1" />
    <text x="200" y="197" fill="white" font-size="18" text-anchor="middle">Phase 1-2: 文献確認・理論選定</text>
    <line x1="200" y1="220" x2="200" y2="240" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

    <!-- Phase 3-4 -->
    <rect x="45" y="255" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="260" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" stroke-width="1" />
    <text x="200" y="297" fill="white" font-size="18" text-anchor="middle">Phase 3-4: 構造対応の判定</text>
    <line x1="200" y1="320" x2="200" y2="340" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

    <!-- Phase 5 -->
    <rect x="45" y="355" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="360" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" stroke-width="1" />
    <text x="200" y="397" fill="white" font-size="18" text-anchor="middle">Phase 5: 論拠監査</text>
    <line x1="200" y1="420" x2="200" y2="440" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

    <!-- Phase 6 -->
    <rect x="45" y="455" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="460" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" stroke-width="1" />
    <text x="200" y="497" fill="white" font-size="18" text-anchor="middle">Phase 6: 構造再読（4軸再評価）</text>
    <line x1="200" y1="520" x2="200" y2="540" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

    <!-- Phase 7 -->
    <rect x="45" y="555" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="560" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" stroke-width="1" />
    <text x="200" y="597" fill="white" font-size="18" text-anchor="middle">Phase 7: 横断統合</text>
  </g>

  <!-- Right Section: Theory Correspondence Heat Map -->
  <g class="heat-map">
    <!-- Column Headers -->
    <rect x="450" y="150" width="140" height="30" rx="5" fill="#8B8682" />
    <text x="520" y="171" fill="white" font-size="16" font-weight="bold" text-anchor="middle">場</text>
    <rect x="592" y="150" width="140" height="30" rx="5" fill="#5B8DB8" />
    <text x="662" y="171" fill="white" font-size="16" font-weight="bold" text-anchor="middle">波</text>
    <rect x="734" y="150" width="140" height="30" rx="5" fill="#D4A857" />
    <text x="804" y="171" fill="white" font-size="16" font-weight="bold" text-anchor="middle">縁</text>
    <rect x="876" y="150" width="140" height="30" rx="5" fill="#C45B4D" />
    <text x="946" y="171" fill="white" font-size="16" font-weight="bold" text-anchor="middle">渦</text>
    <rect x="1018" y="150" width="140" height="30" rx="5" fill="#5B8B6A" />
    <text x="1088" y="171" fill="white" font-size="16" font-weight="bold" text-anchor="middle">束</text>

    <!-- Theory Rows and Cells -->
    <!-- Row 1: 美的葛藤 | partial | 波,縁 -->
    <text x="440" y="205" fill="white" font-size="14" text-anchor="end">美的葛藤</text>
    <rect x="450" y="182" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="592" y="182" width="140" height="50" fill="#5B8DB8" opacity="0.7" />
    <rect x="734" y="182" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="876" y="182" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1018" y="182" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 2: 日本美学（侘び寂び・秘すれば花等） | partial | 縁 -->
    <text x="440" y="255" fill="white" font-size="14" text-anchor="end">日本美学（侘び寂び・秘すれば花等）</text>
    <rect x="450" y="232" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="592" y="232" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="734" y="232" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="876" y="232" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1018" y="232" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 3: 判断力批判 | partial | 波,縁,渦 -->
    <text x="440" y="305" fill="white" font-size="14" text-anchor="end">判断力批判</text>
    <rect x="450" y="282" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="592" y="282" width="140" height="50" fill="#5B8DB8" opacity="0.7" />
    <rect x="734" y="282" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="876" y="282" width="140" height="50" fill="#C45B4D" opacity="0.7" />
    <rect x="1018" y="282" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 4: 芸術作品の根源 | partial | 場,縁 -->
    <text x="440" y="355" fill="white" font-size="14" text-anchor="end">芸術作品の根源</text>
    <rect x="450" y="332" width="140" height="50" fill="#8B8682" opacity="0.7" />
    <rect x="592" y="332" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="734" y="332" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="876" y="332" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1018" y="332" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 5: Art as Experience | strong | 場,波,縁,束 -->
    <text x="440" y="405" fill="white" font-size="14" text-anchor="end">Art as Experience</text>
    <rect x="450" y="382" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="592" y="382" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="734" y="382" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="876" y="382" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1018" y="382" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 6: 複製技術時代の芸術作品 | conditional | 場,波,縁 -->
    <text x="440" y="455" fill="white" font-size="14" text-anchor="end">複製技術時代の芸術作品</text>
    <rect x="450" y="432" width="140" height="50" fill="#8B8682" opacity="0.4" />
    <rect x="592" y="432" width="140" height="50" fill="#5B8DB8" opacity="0.4" />
    <rect x="734" y="432" width="140" height="50" fill="#D4A857" opacity="0.4" />
    <rect x="876" y="432" width="140" height="50" fill="#C45B4D" opacity="0.2" />
    <rect x="1018" y="432" width="140" height="50" fill="#5B8B6A" opacity="0.2" />

    <!-- Row 7: 感性的なものの分配 | conditional | 場,縁 -->
    <text x="440" y="505" fill="white" font-size="14" text-anchor="end">感性的なものの分配</text>
    <rect x="450" y="482" width="140" height="50" fill="#8B8682" opacity="0.4" />
    <rect x="592" y="482" width="140" height="50" fill="#5B8DB8" opacity="0.2" />
    <rect x="734" y="482" width="140" height="50" fill="#D4A857" opacity="0.4" />
    <rect x="876" y="482" width="140" height="50" fill="#C45B4D" opacity="0.2" />
    <rect x="1018" y="482" width="140" height="50" fill="#5B8B6A" opacity="0.2" />

    <!-- Row 8: 美的教育書簡 | strong | 場,波,縁,束 -->
    <text x="440" y="555" fill="white" font-size="14" text-anchor="end">美的教育書簡</text>
    <rect x="450" y="532" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="592" y="532" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="734" y="532" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="876" y="532" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1018" y="532" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 9: 美の理論 | partial | 波,縁,渦 -->
    <text x="440" y="605" fill="white" font-size="14" text-anchor="end">美の理論</text>
    <rect x="450" y="582" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="592" y="582" width="140" height="50" fill="#5B8DB8" opacity="0.7" />
    <rect x="734" y="582" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="876" y="582" width="140" height="50" fill="#C45B4D" opacity="0.7" />
    <rect x="1018" y="582" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 10: 開かれた作品 | strong | 場,波,縁,束 -->
    <text x="440" y="655" fill="white" font-size="14" text-anchor="end">開かれた作品</text>
    <rect x="450" y="632" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="592" y="632" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="734" y="632" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="876" y="632" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1018" y="632" width="140" height="50" fill="#5B8B6A" opacity="1.0" />
  </g>

  <!-- Bottom Bar -->
  <rect x="0" y="730" width="1200" height="70" rx="20" fill="#2C3E50" stroke="#cccccc" stroke-width="1" />
  <g class="judgment-summary">
    <rect x="310" y="755" width="15" height="15" fill="#27AE60" />
    <text x="335" y="768" fill="white" font-size="18" text-anchor="start">強い対応: 3件</text>

    <rect x="510" y="755" width="15" height="15" fill="#F1C40F" />
    <text x="535" y="768" fill="white" font-size="18" text-anchor="start">部分的対応: 5件</text>

    <rect x="710" y="755" width="15" height="15" fill="#E67E22" />
    <text x="735" y="768" fill="white" font-size="18" text-anchor="start">条件付き: 2件</text>
  </g>
</svg>