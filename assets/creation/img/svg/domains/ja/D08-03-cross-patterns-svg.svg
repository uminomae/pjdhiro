<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="32" font-weight="bold">神経科学探究における横断的パターンの発見</text>

  <!-- Connecting Lines (Bottom Layer - Glow) -->
  <path d="M 600 400 L 300 250" stroke="#D4A857" stroke-width="4" opacity="0.4" fill="none" />
  <path d="M 600 400 L 900 250" stroke="#D4A857" stroke-width="4" opacity="0.4" fill="none" />
  <path d="M 600 400 L 300 600" stroke="#D4A857" stroke-width="4" opacity="0.4" fill="none" />
  <!-- Cross-connections between satellites (opacity 0.3) -->
  <path d="M 300 250 L 900 250" stroke="#D4A857" stroke-width="2" opacity="0.3" fill="none" />
  <path d="M 300 250 L 300 600" stroke="#D4A857" stroke-width="2" opacity="0.3" fill="none" />
  <path d="M 900 250 L 300 600" stroke="#D4A857" stroke-width="2" opacity="0.3" fill="none" />

  <!-- Connecting Lines (Top Layer - Sharp) -->
  <path d="M 600 400 L 300 250" stroke="#D4A857" stroke-width="2" opacity="1" fill="none" />
  <path d="M 600 400 L 900 250" stroke="#D4A857" stroke-width="2" opacity="1" fill="none" />
  <path d="M 600 400 L 300 600" stroke="#D4A857" stroke-width="2" opacity="1" fill="none" />

  <!-- Center Card (Hub) - 6.1 「縁」の多重実装 -->
  <!-- Glow effect -->
  <rect x="380" y="260" width="440" height="280" fill="#D4A857" opacity="0.2" rx="10" ry="10" />
  <rect x="390" y="270" width="420" height="260" fill="#D4A857" opacity="0.3" rx="10" ry="10" />
  <!-- Main card -->
  <rect x="400" y="280" width="400" height="240" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" rx="10" ry="10" />
  <!-- Text content -->
  <text x="600" y="330" text-anchor="middle">
    <tspan fill="#D4A857" font-size="28" font-weight="bold">6.1 「縁」の多重実装</tspan>
    <tspan x="600" dy="35" fill="white" font-size="18">(4件 theories)</tspan>
    <tspan x="600" dy="30" fill="white" font-size="20">"本調査で最も顕著な知見は、「縁"</tspan>
    <tspan x="600" dy="30" fill="#cccccc" font-size="16">Found in:</tspan>
  </text>

  <!-- Satellite Card 1 (Top-left) - 6.2 スケール横断性 -->
  <g transform="translate(150, 160)"> <!-- Card top-left is (150, 160) for center (300, 250) -->
    <!-- Glow effect -->
    <rect x="-10" y="-10" width="320" height="200" fill="#4a90e2" opacity="0.2" rx="8" ry="8" />
    <!-- Main card -->
    <rect width="300" height="180" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" rx="8" ry="8" />
    <!-- Text content -->
    <text x="150" y="60" text-anchor="middle">
      <tspan fill="#4a90e2" font-size="20" font-weight="bold">6.2 スケール横断性</tspan>
      <tspan x="150" dy="25" fill="white" font-size="14">0/11</tspan>
      <tspan x="150" dy="25" fill="white" font-size="16">"神経科学の特徴として、同じ「差異の検出</tspan>
      <tspan x="150" dy="20" fill="white" font-size="16">→関係形成→構造変化"</tspan>
    </text>
  </g>

  <!-- Satellite Card 2 (Top-right) - 6.3 場の条件としての動的均衡 -->
  <g transform="translate(750, 160)"> <!-- Card top-left is (750, 160) for center (900, 250) -->
    <!-- Glow effect -->
    <rect x="-10" y="-10" width="320" height="200" fill="#e24a4a" opacity="0.2" rx="8" ry="8" />
    <!-- Main card -->
    <rect width="300" height="180" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" rx="8" ry="8" />
    <!-- Text content -->
    <text x="150" y="60" text-anchor="middle">
      <tspan fill="#e24a4a" font-size="20" font-weight="bold">6.3 場の条件としての動的均衡</tspan>
      <tspan x="150" dy="25" fill="white" font-size="14">1/11</tspan>
      <tspan x="150" dy="25" fill="white" font-size="16">"神経雪崩（5.11）とポリヴェーガル理論（5.7）は、</tspan>
      <tspan x="150" dy="20" fill="white" font-size="16">異なるスケールで同じ「場の条件"</tspan>
      <tspan x="150" dy="25" fill="#cccccc" font-size="14">Theory: 5.11</tspan>
    </text>
  </g>

  <!-- Satellite Card 3 (Bottom-left) - 6.4 計算論と身体性の架橋 -->
  <g transform="translate(150, 510)"> <!-- Card top-left is (150, 510) for center (300, 600) -->
    <!-- Glow effect -->
    <rect x="-10" y="-10" width="320" height="200" fill="#50e3c2" opacity="0.2" rx="8" ry="8" />
    <!-- Main card -->
    <rect width="300" height="180" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" rx="8" ry="8" />
    <!-- Text content -->
    <text x="150" y="57" text-anchor="middle">
      <tspan fill="#50e3c2" font-size="20" font-weight="bold">6.4 計算論と身体性の架橋</tspan>
      <tspan x="150" dy="25" fill="white" font-size="14">1/11</tspan>
      <tspan x="150" dy="25" fill="white" font-size="16">"自由エネルギー原理（5.1）とエナクティヴィズム（5.8）は、</tspan>
      <tspan x="150" dy="20" fill="white" font-size="16">Allen &amp; Friston（2018）を通じて理論的に接続されています"</tspan>
      <tspan x="150" dy="25" fill="#cccccc" font-size="14">Theory: Allen &amp; Friston (2018)</tspan>
    </text>
  </g>

  <!-- Key finding callout -->
  <rect x="325" y="545" width="550" height="50" rx="25" ry="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
  <text x="600" y="570" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold" alignment-baseline="middle">神経科学で最も顕著な発見 = 6.1 「縁」の多重実装</text>

</svg>