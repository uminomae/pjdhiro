<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" fill="white" font-size="32" font-weight="bold">化学探究における横断的パターンの発見</text>

  <!-- Connections -->
  <g id="connections">
    <!-- Faint cross-connections -->
    <line x1="300" y1="250" x2="900" y2="250" stroke="#D4A857" stroke-width="1" opacity="0.3" />
    <line x1="900" y1="250" x2="900" y2="600" stroke="#D4A857" stroke-width="1" opacity="0.3" />
    <line x1="900" y1="600" x2="300" y2="600" stroke="#D4A857" stroke-width="1" opacity="0.3" />
    <line x1="300" y1="600" x2="300" y2="250" stroke="#D4A857" stroke-width="1" opacity="0.3" />

    <!-- Hub-to-Satellite Glow Lines -->
    <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
    <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
    <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />
    <line x1="600" y1="400" x2="900" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />
    
    <!-- Hub-to-Satellite Main Lines -->
    <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="2" />
    <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="2" />
    <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="2" />
    <line x1="600" y1="400" x2="900" y2="600" stroke="#D4A857" stroke-width="2" />
  </g>

  <!-- Center Card (Hub) -->
  <g id="center-card">
    <!-- Glow Effect -->
    <rect x="390" y="270" width="420" height="260" rx="20" fill="#D4A857" opacity="0.2" />
    <rect x="395" y="275" width="410" height="250" rx="18" fill="#D4A857" opacity="0.3" />
    <!-- Main Card -->
    <rect x="400" y="280" width="400" height="240" rx="15" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" />
    <!-- Content -->
    <text x="600" y="320" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">パターン1: 拮抗が縁を生む</text>
    <text x="600" y="345" text-anchor="middle" fill="white" font-size="18">(5件 theories)</text>
    <text x="420" y="380" fill="white" font-size="20">
      <tspan x="420">5段階との対応が強いとされた5件のすべてにおいて、</tspan>
      <tspan x="420" dy="1.2em">縁は二つの力の拮抗として記述されます</tspan>
    </text>
    <text x="420" y="450" fill="#cccccc" font-size="16">Found in:</text>
    <text x="420" y="470" fill="#D4A857" font-size="14">
      <tspan x="420">結晶核生成, ミクロ相分離, BZ反応,</tspan>
      <tspan x="420" dy="1.4em">チューリングパターン, ゾル-ゲル転移</tspan>
    </text>
  </g>

  <!-- Satellite Cards -->
  <g id="satellites">
    <!-- Top-Left: パターン2 -->
    <g id="satellite-1">
      <rect x="140" y="150" width="320" height="200" rx="15" fill="#4a90e2" opacity="0.2" />
      <rect x="150" y="160" width="300" height="180" rx="10" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" />
      <text x="300" y="190" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">パターン2: 制約が創造を可能にする</text>
      <text x="300" y="210" text-anchor="middle" fill="white" font-size="14">1/10</text>
      <text x="165" y="240" fill="white" font-size="16">
        <tspan x="165">複数の事例で、「制約がなければ</tspan>
        <tspan x="165" dy="1.2em">秩序は生まれない」</tspan>
      </text>
      <text x="165" y="300" fill="#cccccc" font-size="14">分離して終わり</text>
    </g>

    <!-- Top-Right: パターン3 -->
    <g id="satellite-2">
      <rect x="740" y="150" width="320" height="200" rx="15" fill="#e24a4a" opacity="0.2" />
      <rect x="750" y="160" width="300" height="180" rx="10" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" />
      <text x="900" y="190" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">パターン3: 局所からグローバルへの質的転換</text>
      <text x="900" y="210" text-anchor="middle" fill="white" font-size="14">1/10</text>
      <text x="765" y="240" fill="white" font-size="16">
        <tspan x="765">局所的変化の蓄積がある閾値で</tspan>
        <tspan x="765" dy="1.2em">グローバルな質的変化に転じる</tspan>
      </text>
      <text x="765" y="300" fill="#cccccc" font-size="14">臨界核サイズ以上で成長開始</text>
    </g>

    <!-- Bottom-Left: パターン4 -->
    <g id="satellite-3">
      <rect x="140" y="500" width="320" height="200" rx="15" fill="#50e3c2" opacity="0.2" />
      <rect x="150" y="510" width="300" height="180" rx="10" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" />
      <text x="300" y="540" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">パターン4: 同一の数学的構造のスケール横断</text>
      <text x="300" y="560" text-anchor="middle" fill="white" font-size="14">1/10</text>
      <text x="165" y="590" fill="white" font-size="16">
        <tspan x="165">同一の数学的構造が分子スケールから</tspan>
        <tspan x="165" dy="1.2em">生態系スケールまで横断する</tspan>
      </text>
      <text x="165" y="650" fill="#cccccc" font-size="14">Hopf分岐</text>
    </g>

    <!-- Bottom-Right: 5段階の対応 -->
    <g id="satellite-4">
      <rect x="740" y="500" width="320" height="200" rx="15" fill="#b34ae2" opacity="0.2" />
      <rect x="750" y="510" width="300" height="180" rx="10" fill="#2a2a4e" stroke="#b34ae2" stroke-width="2" />
      <text x="900" y="540" text-anchor="middle" fill="#b34ae2" font-size="20" font-weight="bold">5段階の対応が特に強い段階と弱い段階</text>
      <text x="900" y="560" text-anchor="middle" fill="white" font-size="14">10件中5件</text>
      <text x="765" y="590" fill="white" font-size="16">
        <tspan x="765">化学領域では、縁の対応が</tspan>
        <tspan x="765" dy="1.2em">最も強く現れました</tspan>
      </text>
      <text x="765" y="650" fill="#cccccc" font-size="14">臨界核, 界面, 分岐点, パーコレーション閾値</text>
    </g>
  </g>

  <!-- Key Finding Callout -->
  <g id="key-finding">
    <rect x="350" y="650" width="500" height="50" rx="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
    <text x="600" y="675" text-anchor="middle" dominant-baseline="middle" fill="#1a1a2e" font-size="18" font-weight="bold">
      化学で最も顕著な発見 = パターン1: 拮抗が縁を生む
    </text>
  </g>

</svg>