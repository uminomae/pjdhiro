<svg viewBox="0 0 1200 800" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="32" font-weight="bold">天文学・宇宙物理学探究における横断的パターンの発見</text>

  <!-- Connecting Lines (Center to Satellites) -->
  <!-- Center card center: (600, 400) -->
  <!-- Satellite 1 center: (300, 250) -->
  <!-- Satellite 2 center: (900, 250) -->
  <!-- Satellite 3 center: (300, 600) -->

  <!-- Glow lines -->
  <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  
  <!-- Sharp lines -->
  <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="2" />
  <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="2" />
  <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="2" />

  <!-- Optional cross-connections between satellites -->
  <line x1="300" y1="250" x2="900" y2="250" stroke="#D4A857" stroke-width="2" opacity="0.3" /> <!-- S1 to S2 -->
  <line x1="300" y1="250" x2="300" y2="600" stroke="#D4A857" stroke-width="2" opacity="0.3" /> <!-- S1 to S3 -->
  <line x1="900" y1="250" x2="300" y2="600" stroke="#D4A857" stroke-width="2" opacity="0.3" /> <!-- S2 to S3 -->


  <!-- Satellite Card 1 (Top-left) -->
  <g>
    <!-- Glow -->
    <rect x="150" y="160" width="300" height="180" fill="#4a90e2" opacity="0.2" />
    <!-- Main card -->
    <rect x="150" y="160" width="300" height="180" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" />
    <!-- Text content -->
    <text x="300" text-anchor="middle">
      <tspan x="300" y="195" fill="#4a90e2" font-size="20" font-weight="bold">縁の物理的多様性</tspan>
      <tspan x="300" y="220" fill="white" font-size="14">10件</tspan>
      <tspan x="300" y="250" fill="white" font-size="16">"本領域の10件は、「縁"</tspan>
      <tspan x="300" y="280" fill="#cccccc" font-size="14">Found in: 衝撃波面</tspan>
    </text>
  </g>

  <!-- Satellite Card 2 (Top-right) -->
  <g>
    <!-- Glow -->
    <rect x="750" y="160" width="300" height="180" fill="#e24a4a" opacity="0.2" />
    <!-- Main card -->
    <rect x="750" y="160" width="300" height="180" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" />
    <!-- Text content -->
    <text x="900" text-anchor="middle">
      <tspan x="900" y="195" fill="#e24a4a" font-size="20" font-weight="bold">螺旋的回帰の多様性</tspan>
      <tspan x="900" y="220" fill="white" font-size="14">1/10</tspan>
      <tspan x="900" y="250" fill="white" font-size="16">"5段階の「束→場'回帰"</tspan>
      <tspan x="900" y="280" fill="#cccccc" font-size="14">Found in: 水素から重元素豊富ガスへ</tspan>
    </text>
  </g>

  <!-- Satellite Card 3 (Bottom-left) -->
  <g>
    <!-- Glow -->
    <rect x="150" y="510" width="300" height="180" fill="#50e3c2" opacity="0.2" />
    <!-- Main card -->
    <rect x="150" y="510" width="300" height="180" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" />
    <!-- Text content -->
    <text x="300" text-anchor="middle">
      <tspan x="300" y="545" fill="#50e3c2" font-size="20" font-weight="bold">渦の「目的なき自己組織化」</tspan>
      <tspan x="300" y="570" fill="white" font-size="14">10件</tspan>
      <tspan x="300" y="600" fill="white" font-size="16">"本領域の10件はすべて意識主体なしに</tspan>
      <tspan x="300" y="620" fill="white" font-size="16">5段階が実現する事例であり、渦の段階に「設計意図"</tspan>
      <!-- No "Found in:" for this satellite as per data -->
    </text>
  </g>

  <!-- Center Card (Hub) -->
  <g>
    <!-- Golden glow effect -->
    <rect x="400" y="280" width="400" height="240" fill="#D4A857" opacity="0.2" />
    <rect x="400" y="280" width="400" height="240" fill="#D4A857" opacity="0.3" />
    <!-- Main card -->
    <rect x="400" y="280" width="400" height="240" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" />
    <!-- Text content -->
    <text x="600" text-anchor="middle">
      <tspan x="600" y="320" fill="#D4A857" font-size="28" font-weight="bold">閾値トリガの普遍性</tspan>
      <tspan x="600" y="350" fill="white" font-size="18">(10件 theories)</tspan>
      <tspan x="600" y="390" fill="white" font-size="20">"10件のうち4件（星形成のJeans質量、銀河形成のPress-Schechter閾値、惑星系形成のToomre Q、</tspan>
      <tspan x="600" y="415" fill="white" font-size="20">大規模構造の密度揺らぎ閾値）が、独立した閾値メカニズムを持っています"</tspan>
      <tspan x="600" y="450" fill="#cccccc" font-size="16">Found in:</tspan>
      <tspan x="600" y="470" fill="#D4A857" font-size="14">星形成のJeans質量, 銀河形成のPress-Schechter閾値,</tspan>
      <tspan x="600" y="488" fill="#D4A857" font-size="14">惑星系形成のToomre Q, 大規模構造の密度揺らぎ閾値</tspan>
    </text>
  </g>

  <!-- Key finding callout -->
  <g>
    <!-- Pill-shaped highlight -->
    <rect x="325" y="665" width="550" height="50" rx="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
    <!-- Text -->
    <text x="600" y="695" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">天文学・宇宙物理学で最も顕著な発見 = 閾値トリガの普遍性</text>
  </g>

</svg>