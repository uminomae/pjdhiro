    <rect x="705" y="346" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="855" y="346" width="140" height="50" fill="#C45B4D" opacity="0.7" />
    <rect x="1005" y="346" width="140" height="50" fill="#5B8B6A" opacity="0.7" />

