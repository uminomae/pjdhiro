    <text x="390" y="323" text-anchor="end" fill="white" font-size="14">リミナリティとコミュニタス</text>
    <rect x="405" y="294" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="555" y="294" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="705" y="294" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="855" y="294" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1005" y="294" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

