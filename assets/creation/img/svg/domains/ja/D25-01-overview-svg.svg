    <rect x="405" y="398" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="555" y="398" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="705" y="398" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="855" y="398" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1005" y="398" width="140" height="50" fill="#5B8B6A" opacity="0.7" />

    <!-- Theory 6: 贈与論 | partial | 場,波,縁,渦,束 -->
    <text x="390" y="479" text-anchor="end" fill="white" font-size="14">贈与論</text>
    <rect x="405" y="450" width="140" height="50" fill="#8B8682" opacity="0.7" />
    <rect x="555" y="450" width="140" height="50" fill="#5B8DB8" opacity="0.7" />
    <rect x="705" y="450" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="855" y="450" width="140" height="50" fill="#C45B4D" opacity="0.7" />
    <rect x="1005" y="450" width="140" height="50" fill="#5B8B6A" opacity="0.7" />

    <!-- Theory 7: 操作連鎖 | partial | 場 -->
    <text x="390" y="531" text-anchor="end" fill="white" font-size="14">操作連鎖</text>
    <rect x="405" y="502" width="140" height="50" fill="#8B8682" opacity="0.7" />
    <rect x="555" y="502" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="705" y="502" width="140" height="50" fill="#D4A857" opacity="0.3" />
    <rect x="855" y="502" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1005" y="502" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Theory 8: 象徴境界と社会境界 | partial | 波,縁,渦,束 -->
    <text x="390" y="583" text-anchor="end" fill="white" font-size="14">象徴境界と社会境界</text>
    <rect x="405" y="554" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="555" y="554" width="140" height="50" fill="#5B8DB8" opacity="0.7" />
    <rect x="705" y="554" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="855" y="554" width="140" height="50" fill="#C45B4D" opacity="0.7" />
    <rect x="1005" y="554" width="140" height="50" fill="#5B8B6A" opacity="0.7" />

    <!-- Theory 9: コンタクト・ゾーン | conditional | 縁 -->
    <text x="390" y="635" text-anchor="end" fill="white" font-size="14">コンタクト・ゾーン</text>
    <rect x="405" y="606" width="140" height="50" fill="#8B8682" opacity="0.2" />
    <rect x="555" y="606" width="140" height="50" fill="#5B8DB8" opacity="0.2" />
    <rect x="705" y="606" width="140" height="50" fill="#D4A857" opacity="0.4" />
    <rect x="855" y="606" width="140" height="50" fill="#C45B4D" opacity="0.2" />
    <rect x="1005" y="606" width="140" height="50" fill="#5B8B6A" opacity="0.2" />

    <!-- Theory 10: 構造化理論/実践感覚 | partial | 場,縁,束 -->
    <text x="390" y="687" text-anchor="end" fill="white" font-size="14">構造化理論/実践感覚</text>
    <rect x="405" y="658" width="140" height="50" fill="#8B8682" opacity="0.7" />
    <rect x="555" y="658" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="705" y="658" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="855" y="658" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1005" y="658" width="140" height="50" fill="#5B8B6A" opacity="0.7" />
  </g>

  <!-- Bottom Bar -->
  <rect x="50" y="730" width="1100" height="50" rx="20" fill="#2C3E50" stroke="#cccccc" stroke-width="1" />
  <g text-anchor="middle" fill="white" font-size="18">
    <text x="450" y="761">
      <tspan fill="#27AE60">■</tspan> 強い対応: 3件
    </text>
    <text x="600" y="761">
      <tspan fill="#F1C40F">■</tspan> 部分的対応: 6件
    </text>
    <text x="750" y="761">
      <tspan fill="#E67E22">■</tspan> 条件付き: 1件
    </text>
  </g>
</svg>