    <rect x="0" y="156" width="140" height="50" fill="#8B8682" opacity="0.7" />
    <rect x="142" y="156" width="140" height="50" fill="#5B8DB8" opacity="0.7" />
    <rect x="284" y="156" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="426" y="156" width="140" height="50" fill="#C45B4D" opacity="0.7" />
    <rect x="568" y="156" width="140" height="50" fill="#5B8B6A" opacity="0.7" />

    <!-- Row 4: 臨界現象 (strong) -->
    <text x="-10" y="30 + 208" font-size="14" fill="white" text-anchor="end">臨界現象</text>
    <rect x="0" y="208" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="142" y="208" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="284" y="208" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="426" y="208" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="568" y="208" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

