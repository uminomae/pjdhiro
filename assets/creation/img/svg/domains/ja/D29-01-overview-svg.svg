    <text x="-10" y="30 + 260" font-size="14" fill="white" text-anchor="end">パーコレーション</text>
    <rect x="0" y="260" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="142" y="260" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="284" y="260" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="426" y="260" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="568" y="260" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 6: オートポイエーシス (partial) -->
    <text x="-10" y="30 + 312" font-size="14" fill="white" text-anchor="end">オートポイエーシス</text>
    <rect x="0" y="312" width="140" height="50" fill="#8B8682" opacity="0.7" />
    <rect x="142" y="312" width="140" height="50" fill="#5B8DB8" opacity="0.7" />
    <rect x="284" y="312" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="426" y="312" width="140" height="50" fill="#C45B4D" opacity="0.7" />
    <rect x="568" y="312" width="140" height="50" fill="#5B8B6A" opacity="0.7" />

    <!-- Row 7: 反応拡散 (partial) -->
    <text x="-10" y="30 + 364" font-size="14" fill="white" text-anchor="end">反応拡散</text>
    <rect x="0" y="364" width="140" height="50" fill="#8B8682" opacity="0.7" />
    <rect x="142" y="364" width="140" height="50" fill="#5B8DB8" opacity="0.7" />
    <rect x="284" y="364" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="426" y="364" width="140" height="50" fill="#C45B4D" opacity="0.7" />
    <rect x="568" y="364" width="140" height="50" fill="#5B8B6A" opacity="0.7" />

    <!-- Row 8: カオスの縁 (conditional) -->
    <text x="-10" y="30 + 416" font-size="14" fill="white" text-anchor="end">カオスの縁</text>
    <rect x="0" y="416" width="140" height="50" fill="#8B8682" opacity="0.2" />
    <rect x="142" y="416" width="140" height="50" fill="#5B8DB8" opacity="0.2" />
    <rect x="284" y="416" width="140" height="50" fill="#D4A857" opacity="0.4" />
    <rect x="426" y="416" width="140" height="50" fill="#C45B4D" opacity="0.2" />
    <rect x="568" y="416" width="140" height="50" fill="#5B8B6A" opacity="0.2" />

    <!-- Row 9: ネットワーク科学 (partial) -->
    <text x="-10" y="30 + 468" font-size="14" fill="white" text-anchor="end">ネットワーク科学</text>
    <rect x="0" y="468" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="142" y="468" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="284" y="468" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="426" y="468" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="568" y="468" width="140" height="50" fill="#5B8B6A" opacity="0.7" />
  </g>

  <!-- Bottom Bar: Judgment Summary -->
  <rect x="50" y="730" width="1100" height="50" rx="20" fill="#2C3E50" stroke="#cccccc" stroke-width="1" />
  <text x="100" y="760" font-size="18" fill="white">
    <tspan>■</tspan>
    <tspan fill="#27AE60" dx="5">強い対応: 5件</tspan>
    <tspan dx="30">■</tspan>
    <tspan fill="#F1C40F" dx="5">部分的対応: 4件</tspan>
    <tspan dx="30">■</tspan>
    <tspan fill="#E67E22" dx="5">条件付き: 1件</tspan>
  </text>
</svg>