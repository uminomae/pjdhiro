    <rect x="0" y="0" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="142" y="0" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="284" y="0" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="426" y="0" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="568" y="0" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 1: 自己組織化臨界（SOC） (strong) -->
    <text x="-10" y="30 + 52" font-size="14" fill="white" text-anchor="end">自己組織化臨界（SOC）</text>
    <rect x="0" y="52" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="142" y="52" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="284" y="52" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="426" y="52" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="568" y="52" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

