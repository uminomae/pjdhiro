<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="32" font-weight="bold">
    文学・文芸学探究における横断的パターンの発見
  </text>

  <!-- Connecting Lines (Glow Layer) -->
  <!-- Center (600, 400) to TL (300, 250) -->
  <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <!-- Center (600, 400) to TR (900, 250) -->
  <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <!-- Center (600, 400) to BL (300, 600) -->
  <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />

  <!-- Optional Cross-connections between satellites (subtle opacity) -->
  <!-- TL (300, 250) to TR (900, 250) -->
  <line x1="300" y1="250" x2="900" y2="250" stroke="#D4A857" stroke-width="2" opacity="0.05" />
  <!-- TL (300, 250) to BL (300, 600) -->
  <line x1="300" y1="250" x2="300" y2="600" stroke="#D4A857" stroke-width="2" opacity="0.05" />
  <!-- TR (900, 250) to BL (300, 600) -->
  <line x1="900" y1="250" x2="300" y2="600" stroke="#D4A857" stroke-width="2" opacity="0.05" />

  <!-- Center Card (Hub) - Glow Layer 1 -->
  <rect x="390" y="270" width="420" height="260" rx="10" ry="10" fill="#D4A857" opacity="0.2" />
  <!-- Center Card (Hub) - Glow Layer 2 -->
  <rect x="395" y="275" width="410" height="250" rx="10" ry="10" fill="#D4A857" opacity="0.3" />
  <!-- Center Card (Hub) - Main -->
  <rect x="400" y="280" width="400" height="240" rx="10" ry="10" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" />
  <!-- Center Card Content -->
  <text x="600" y="320" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">
    循環駆動——束→場回帰の反復
  </text>
  <text x="600" y="350" text-anchor="middle" fill="white" font-size="18">
    (1/10 theories)
  </text>
  <text x="600" y="380" text-anchor="middle" fill="white" font-size="20">
    "最も顕著な横断パターンです"
  </text>
  <text x="600" y="430" text-anchor="middle" fill="#cccccc" font-size="16">
    Found in:
  </text>
  <text x="600" y="455" text-anchor="middle" fill="#D4A857" font-size="14">
    場→波→縁→渦→束
  </text>

  <!-- Satellite Card 1 (Top-left) - 多層同型性 -->
  <!-- Glow Layer -->
  <rect x="140" y="150" width="320" height="200" rx="8" ry="8" fill="#4a90e2" opacity="0.2" />
  <!-- Main Card -->
  <rect x="150" y="160" width="300" height="180" rx="8" ry="8" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" />
  <!-- Content -->
  <text x="300" y="195" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">
    多層同型性——異なるスケールでの反復
  </text>
  <text x="300" y="220" text-anchor="middle" fill="white" font-size="14">
    (1/10 theories)
  </text>
  <text x="300" y="245" text-anchor="middle" fill="white" font-size="16">
    異なるスケールで構造的に類似したプロセスを記述
  </text>
  <text x="300" y="280" text-anchor="middle" fill="#cccccc" font-size="14">
    Shklovsky：個人の知覚回復
  </text>

  <!-- Satellite Card 2 (Top-right) - 逸脱-規範の弁証法 -->
  <!-- Glow Layer -->
  <rect x="740" y="150" width="320" height="200" rx="8" ry="8" fill="#e24a4a" opacity="0.2" />
  <!-- Main Card -->
  <rect x="750" y="160" width="300" height="180" rx="8" ry="8" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" />
  <!-- Content -->
  <text x="900" y="195" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">
    逸脱-規範の弁証法
  </text>
  <text x="900" y="220" text-anchor="middle" fill="white" font-size="14">
    (1/10 theories)
  </text>
  <text x="900" y="245" text-anchor="middle" fill="white" font-size="16">
    Shklovsky, Jauss, Bloom: "逸脱が価値を生む"
  </text>
  <text x="900" y="280" text-anchor="middle" fill="#cccccc" font-size="14">
    差異の立ち上がり
  </text>

  <!-- Satellite Card 3 (Bottom-left) - プロセス記述型と分析枠組み型の区別 -->
  <!-- Glow Layer -->
  <rect x="140" y="500" width="320" height="200" rx="8" ry="8" fill="#50e3c2" opacity="0.2" />
  <!-- Main Card -->
  <rect x="150" y="510" width="300" height="180" rx="8" ry="8" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" />
  <!-- Content -->
  <text x="300" y="545" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">
    プロセス記述型と分析枠組み型の区別
  </text>
  <text x="300" y="570" text-anchor="middle" fill="white" font-size="14">
    (5/10 theories)
  </text>
  <text x="300" y="595" text-anchor="middle" fill="white" font-size="16">
    本調査で明らかになった重要な区別です
  </text>
  <text x="300" y="630" text-anchor="middle" fill="#cccccc" font-size="14">
    Propp, Shklovsky, Todorov, Bourdieu, Bloom
  </text>

  <!-- Connecting Lines (Sharp Layer) -->
  <!-- Center (600, 400) to TL (300, 250) -->
  <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="2" />
  <!-- Center (600, 400) to TR (900, 250) -->
  <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="2" />
  <!-- Center (600, 400) to BL (300, 600) -->
  <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="2" />

  <!-- Key finding callout -->
  <rect x="300" y="545" width="600" height="50" rx="25" ry="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
  <text x="600" y="575" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">
    文学・文芸学で最も顕著な発見 = 循環駆動——束→場回帰の反復
  </text>
</svg>