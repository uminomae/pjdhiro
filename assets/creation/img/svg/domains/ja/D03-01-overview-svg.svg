    <rect x="1050" y="668" width="100" height="50" fill="#5B8B6A" opacity="0.7" />
  </g>
</g>

<!-- Bottom Bar: Judgment Summary -->
<g id="bottom-bar-summary">
  <rect x="50" y="730" width="1100" height="50" rx="20" fill="#2C3E50" stroke="#cccccc" />
  <g id="summary-items" transform="translate(150, 0)">
    <rect x="200" y="745" width="20" height="20" fill="#27AE60" />
    <text x="230" y="761" fill="white" font-size="16" dominant-baseline="middle">強い対応: 5件</text>
    <rect x="450" y="745" width="20" height="20" fill="#F1C40F" />
    <text x="480" y="761" fill="white" font-size="16" dominant-baseline="middle">部分的対応: 4件</text>
    <rect x="700" y="745" width="20" height="20" fill="#E67E22" />
    <text x="730" y="761" fill="white" font-size="16" dominant-baseline="middle">条件付き: 1件</text>
  </g>
</g>

</svg>