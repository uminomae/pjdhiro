<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#2C3E50"/>
    <stop offset="100%" style="stop-color:#34495E"/>
  </linearGradient>
  <marker id="arrowhead" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#F39C12"/>
  </marker>
</defs>

<!-- Background -->
<rect width="100%" height="100%" fill="#1a1a2e" />

<!-- Title Section -->
<g id="title-section">
  <text x="600" y="60" font-size="36" font-weight="bold" fill="white" text-anchor="middle">D03 化学 — 5段階モデルとの構造対応調査</text>
  <text x="600" y="95" font-size="20" fill="#cccccc" text-anchor="middle">10理論の横断的分析</text>
</g>

<!-- Left Column: Research Methodology Flow -->
<g id="left-column-flow">
  <!-- Phase 1 -->
  <rect x="45" y="155" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
  <rect x="50" y="160" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" />
  <text x="200" y="197" font-size="18" fill="white" text-anchor="middle">Phase 1-2: 文献確認・理論選定</text>
  
  <!-- Arrow 1 -->
  <line x1="200" y1="220" x2="200" y2="250" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

  <!-- Phase 2 -->
  <rect x="45" y="255" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
  <rect x="50" y="260" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" />
  <text x="200" y="297" font-size="18" fill="white" text-anchor="middle">Phase 3-4: 構造対応の判定</text>

  <!-- Arrow 2 -->
  <line x1="200" y1="320" x2="200" y2="350" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

  <!-- Phase 3 -->
  <rect x="45" y="355" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
  <rect x="50" y="360" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" />
  <text x="200" y="397" font-size="18" fill="white" text-anchor="middle">Phase 5: 論拠監査</text>

  <!-- Arrow 3 -->
  <line x1="200" y1="420" x2="200" y2="450" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

  <!-- Phase 4 -->
  <rect x="45" y="455" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
  <rect x="50" y="460" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" />
  <text x="200" y="497" font-size="18" fill="white" text-anchor="middle">Phase 6: 構造再読（4軸再評価）</text>

  <!-- Arrow 4 -->
  <line x1="200" y1="520" x2="200" y2="550" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

  <!-- Phase 5 -->
  <rect x="45" y="555" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
  <rect x="50" y="560" width="300" height="60" rx="10" fill="url(#boxGradient)" stroke="#cccccc" />
  <text x="200" y="597" font-size="18" fill="white" text-anchor="middle">Phase 7: 横断統合</text>
</g>

<!-- Right Section: Theory Correspondence Heat Map -->
<g id="right-section-heatmap">
  <!-- Column Headers -->
  <g id="column-headers">
    <rect x="630" y="160" width="100" height="30" rx="5" fill="#8B8682" />
    <text x="680" y="181" font-size="16" font-weight="bold" fill="white" text-anchor="middle">場</text>
    <rect x="735" y="160" width="100" height="30" rx="5" fill="#5B8DB8" />
    <text x="785" y="181" font-size="16" font-weight="bold" fill="white" text-anchor="middle">波</text>
    <rect x="840" y="160" width="100" height="30" rx="5" fill="#D4A857" />
    <text x="890" y="181" font-size="16" font-weight="bold" fill="white" text-anchor="middle">縁</text>
    <rect x="945" y="160" width="100" height="30" rx="5" fill="#C45B4D" />
    <text x="995" y="181" font-size="16" font-weight="bold" fill="white" text-anchor="middle">渦</text>
    <rect x="1050" y="160" width="100" height="30" rx="5" fill="#5B8B6A" />
    <text x="1100" y="181" font-size="16" font-weight="bold" fill="white" text-anchor="middle">束</text>
