<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="32" font-weight="bold">
    農学・生態学探究における横断的パターンの発見
  </text>

  <!-- Connecting Lines (Glow) -->
  <g stroke="#D4A857" stroke-width="4" opacity="0.4">
    <line x1="600" y1="400" x2="300" y2="250" />
    <line x1="600" y1="400" x2="900" y2="250" />
    <line x1="600" y1="400" x2="300" y2="600" />
  </g>
  <!-- Connecting Lines (Sharp) -->
  <g stroke="#D4A857" stroke-width="2" opacity="1">
    <line x1="600" y1="400" x2="300" y2="250" />
    <line x1="600" y1="400" x2="900" y2="250" />
    <line x1="600" y1="400" x2="300" y2="600" />
  </g>

  <!-- Cross-connections between satellites -->
  <g stroke="#D4A857" stroke-width="1" opacity="0.3">
    <line x1="300" y1="250" x2="900" y2="250" /> <!-- S1 to S2 -->
    <line x1="300" y1="250" x2="300" y2="600" /> <!-- S1 to S3 -->
    <line x1="900" y1="250" x2="300" y2="600" /> <!-- S2 to S3 -->
  </g>

  <!-- Center Card (Hub) -->
  <g>
    <!-- Glow effect -->
    <rect x="390" y="270" width="420" height="260" fill="#D4A857" opacity="0.2" rx="10" ry="10" />
    <rect x="395" y="275" width="410" height="250" fill="#D4A857" opacity="0.3" rx="10" ry="10" />
    <!-- Main card -->
    <rect x="400" y="280" width="400" height="240" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" rx="10" ry="10" />
    <!-- Text content -->
    <text x="600" text-anchor="middle">
      <tspan y="315" fill="#D4A857" font-size="28" font-weight="bold">6.1 縁の三起源</tspan>
      <tspan dy="30" fill="white" font-size="18">(3/10 theories)</tspan>
      <tspan dy="30" fill="white" font-size="20">"農学・生態学には、縁の起源が異なる</tspan>
      <tspan dy="25" fill="white" font-size="20">3つのモードが共存しています"</tspan>
      <tspan dy="25" fill="#cccccc" font-size="16">Found in:</tspan>
      <tspan dy="25" fill="#D4A857" font-size="14">レジームシフトの臨界点, パーコレーション閾値,</tspan>
      <tspan dy="20" fill="#D4A857" font-size="14">乾燥地植生の不安定化条件</tspan>
    </text>
  </g>

  <!-- Satellite Card 1 (Top-left) -->
  <g>
    <rect x="140" y="150" width="320" height="200" fill="#4a90e2" opacity="0.2" rx="8" ry="8" />
    <rect x="150" y="160" width="300" height="180" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" rx="8" ry="8" />
    <text x="300" text-anchor="middle">
      <tspan y="190" fill="#4a90e2" font-size="20" font-weight="bold">6.2 渦の方向性</tspan>
      <tspan dy="25" fill="white" font-size="14">1/10</tspan>
      <tspan dy="25" fill="white" font-size="16">"複数のエントリで、渦から束への遷移に</tspan>
      <tspan dy="20" fill="white" font-size="16">方向性があることが確認されました"</tspan>
      <tspan dy="30" fill="#cccccc" font-size="14">Found in:</tspan>
      <tspan dy="20" fill="#cccccc" font-size="14">正</tspan>
    </text>
  </g>

  <!-- Satellite Card 2 (Top-right) -->
  <g>
    <rect x="740" y="150" width="320" height="200" fill="#e24a4a" opacity="0.2" rx="8" ry="8" />
    <rect x="750" y="160" width="300" height="180" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" rx="8" ry="8" />
    <text x="900" text-anchor="middle">
      <tspan y="190" fill="#e24a4a" font-size="20" font-weight="bold">6.3 管理介入の挿入点</tspan>
      <tspan dy="25" fill="white" font-size="14">2/10</tspan>
      <tspan dy="25" fill="white" font-size="16">"農学・生態学は、管理介入が5段階の</tspan>
      <tspan dy="20" fill="white" font-size="16">どの段階に作用するかを明示できる稀有な領域です"</tspan>
      <tspan dy="30" fill="#cccccc" font-size="14">Found in:</tspan>
      <tspan dy="20" fill="#cccccc" font-size="14">施肥, 土地利用変更</tspan>
    </text>
  </g>

  <!-- Satellite Card 3 (Bottom-left) -->
  <g>
    <rect x="140" y="500" width="320" height="200" fill="#50e3c2" opacity="0.2" rx="8" ry="8" />
    <rect x="150" y="510" width="300" height="180" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" rx="8" ry="8" />
    <text x="300" text-anchor="middle">
      <tspan y="540" fill="#50e3c2" font-size="20" font-weight="bold">6.4 束から場への回帰のスペクトラム</tspan>
      <tspan dy="25" fill="white" font-size="14">10件</tspan>
      <tspan dy="25" fill="white" font-size="16">"10件のエントリ内で、「束が場に回帰する容易さ"</tspan>
      <!-- No "Found in:" or theory names for this satellite as per data -->
    </text>
  </g>

  <!-- Key finding callout -->
  <g>
    <rect x="325" y="545" width="550" height="50" rx="25" ry="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
    <text x="600" y="570" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold" alignment-baseline="middle">
      農学・生態学で最も顕著な発見 = 6.1 縁の三起源
    </text>
  </g>

</svg>