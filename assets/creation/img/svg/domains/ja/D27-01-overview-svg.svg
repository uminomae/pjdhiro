    <rect x="400" y="320" width="145" height="40" fill="#8B8682" opacity="0.3" />
    <rect x="550" y="320" width="145" height="40" fill="#5B8DB8" opacity="0.3" />
    <rect x="700" y="320" width="145" height="40" fill="#D4A857" opacity="1.0" />
    <rect x="850" y="320" width="145" height="40" fill="#C45B4D" opacity="0.3" />
    <rect x="1000" y="320" width="145" height="40" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 5: 都市の多様性条件 (strong, all stages) -->
    <text x="390" y="390" text-anchor="end" fill="white" font-size="14">都市の多様性条件</text>
    <rect x="400" y="365" width="145" height="40" fill="#8B8682" opacity="1.0" />
    <rect x="550" y="365" width="145" height="40" fill="#5B8DB8" opacity="1.0" />
    <rect x="700" y="365" width="145" height="40" fill="#D4A857" opacity="1.0" />
    <rect x="850" y="365" width="145" height="40" fill="#C45B4D" opacity="1.0" />
    <rect x="1000" y="365" width="145" height="40" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 6: 間（ma） (strong, all stages) -->
    <text x="390" y="435" text-anchor="end" fill="white" font-size="14">間（ma）</text>
    <rect x="400" y="410" width="145" height="40" fill="#8B8682" opacity="1.0" />
    <rect x="550" y="410" width="145" height="40" fill="#5B8DB8" opacity="1.0" />
    <rect x="700" y="410" width="145" height="40" fill="#D4A857" opacity="1.0" />
    <rect x="850" y="410" width="145" height="40" fill="#C45B4D" opacity="1.0" />
    <rect x="1000" y="410" width="145" height="40" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 7: 計算形態生成 (partial, all stages) -->
    <text x="390" y="480" text-anchor="end" fill="white" font-size="14">計算形態生成</text>
    <rect x="400" y="455" width="145" height="40" fill="#8B8682" opacity="0.7" />
    <rect x="550" y="455" width="145" height="40" fill="#5B8DB8" opacity="0.7" />
    <rect x="700" y="455" width="145" height="40" fill="#D4A857" opacity="0.7" />
    <rect x="850" y="455" width="145" height="40" fill="#C45B4D" opacity="0.7" />
    <rect x="1000" y="455" width="145" height="40" fill="#5B8B6A" opacity="0.7" />

    <!-- Row 8: インクリメンタル建築 (partial, all stages) -->
    <text x="390" y="525" text-anchor="end" fill="white" font-size="14">インクリメンタル建築</text>
    <rect x="400" y="500" width="145" height="40" fill="#8B8682" opacity="0.7" />
    <rect x="550" y="500" width="145" height="40" fill="#5B8DB8" opacity="0.7" />
    <rect x="700" y="500" width="145" height="40" fill="#D4A857" opacity="0.7" />
    <rect x="850" y="500" width="145" height="40" fill="#C45B4D" opacity="0.7" />
    <rect x="1000" y="500" width="145" height="40" fill="#5B8B6A" opacity="0.7" />

    <!-- Row 9: 身体感覚建築 (partial, 場) -->
    <text x="390" y="570" text-anchor="end" fill="white" font-size="14">身体感覚建築</text>
    <rect x="400" y="545" width="145" height="40" fill="#8B8682" opacity="0.7" />
    <rect x="550" y="545" width="145" height="40" fill="#5B8DB8" opacity="0.3" />
    <rect x="700" y="545" width="145" height="40" fill="#D4A857" opacity="0.3" />
    <rect x="850" y="545" width="145" height="40" fill="#C45B4D" opacity="0.3" />
    <rect x="1000" y="545" width="145" height="40" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 10: パラメトリシズム (conditional, 縁) -->
    <text x="390" y="615" text-anchor="end" fill="white" font-size="14">パラメトリシズム</text>
    <rect x="400" y="590" width="145" height="40" fill="#8B8682" opacity="0.2" />
    <rect x="550" y="590" width="145" height="40" fill="#5B8DB8" opacity="0.2" />
    <rect x="700" y="590" width="145" height="40" fill="#D4A857" opacity="0.4" />
    <rect x="850" y="590" width="145" height="40" fill="#C45B4D" opacity="0.2" />
    <rect x="1000" y="590" width="145" height="40" fill="#5B8B6A" opacity="0.2" />

    <!-- Row 11: 壁の厚み（poché） (strong, 縁) -->
    <text x="390" y="660" text-anchor="end" fill="white" font-size="14">壁の厚み（poché）</text>
    <rect x="400" y="635" width="145" height="40" fill="#8B8682" opacity="0.3" />
    <rect x="550" y="635" width="145" height="40" fill="#5B8DB8" opacity="0.3" />
    <rect x="700" y="635" width="145" height="40" fill="#D4A857" opacity="1.0" />
    <rect x="850" y="635" width="145" height="40" fill="#C45B4D" opacity="0.3" />
    <rect x="1000" y="635" width="145" height="40" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 12: 都市の認知的境界 (strong, 縁) -->
    <text x="390" y="705" text-anchor="end" fill="white" font-size="14">都市の認知的境界</text>
    <rect x="400" y="680" width="145" height="40" fill="#8B8682" opacity="0.3" />
    <rect x="550" y="680" width="145" height="40" fill="#5B8DB8" opacity="0.3" />
    <rect x="700" y="680" width="145" height="40" fill="#D4A857" opacity="1.0" />
    <rect x="850" y="680" width="145" height="40" fill="#C45B4D" opacity="0.3" />
    <rect x="1000" y="680" width="145" height="40" fill="#5B8B6A" opacity="0.3" />
  </g>

  <!-- Bottom Bar -->
  <rect x="50" y="750" width="1100" height="50" rx="20" fill="#2C3E50" stroke="#cccccc" />
  <text x="600" y="781" text-anchor="middle" fill="white" font-size="18">
    <tspan fill="#27AE60">■</tspan> 強い対応: 8件 /
    <tspan fill="#F1C40F">■</tspan> 部分的対応: 3件 /
    <tspan fill="#E67E22">■</tspan> 条件付き: 1件
  </text>
</svg>