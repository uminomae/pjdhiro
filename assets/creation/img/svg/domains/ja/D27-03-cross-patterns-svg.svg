<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="32" font-weight="bold">
    建築・デザイン学探究における横断的パターンの発見
  </text>

  <!-- Center Card (Hub) - Pattern 1 -->
  <!-- Glow effect -->
  <rect x="395" y="275" width="410" height="250" fill="#D4A857" opacity="0.2" rx="15" ry="15" />
  <rect x="390" y="270" width="420" height="260" fill="#D4A857" opacity="0.1" rx="15" ry="15" />
  <!-- Main card -->
  <rect x="400" y="280" width="400" height="240" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" rx="10" ry="10" />
  <!-- Content -->
  <text x="600" y="320" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">
    パターン1: 「境界は帯域である」の独立収束
  </text>
  <text x="600" y="350" text-anchor="middle" fill="white" font-size="18">
    (0/12 theories)
  </text>
  <text x="600" y="380" text-anchor="middle" fill="white" font-size="20">
    <tspan x="600" dy="0">"本調査で最も注目すべき発見は、理論的系譜の異なる</tspan>
    <tspan x="600" dy="25">5つのアプローチが独立に「境界は線ではなく帯域である」"</tspan>
  </text>
  <text x="600" y="435" text-anchor="middle" fill="#cccccc" font-size="16">
    Found in:
    <tspan fill="#D4A857" font-size="14" dx="5">該当なし</tspan>
  </text>

  <!-- Satellite Cards -->
  <!-- Satellite 1 (Pattern 2) - Top-left -->
  <g>
    <!-- Glow effect -->
    <rect x="145" y="155" width="310" height="190" fill="#4a90e2" opacity="0.2" rx="15" ry="15" />
    <!-- Main card -->
    <rect x="150" y="160" width="300" height="180" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" rx="10" ry="10" />
    <!-- Content -->
    <text x="300" y="190" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">
      パターン2: 生成における主体性のスペクトラム
    </text>
    <text x="300" y="215" text-anchor="middle" fill="white" font-size="14">
      (1/12 theories)
    </text>
    <text x="300" y="240" text-anchor="middle" fill="white" font-size="16">
      <tspan x="300" dy="0">"建築理論の内部で、生成における主体性の度合いが</tspan>
      <tspan x="300" dy="20">スペクトラムとして分布しています"</tspan>
    </text>
    <text x="300" y="285" text-anchor="middle" fill="#cccccc" font-size="14">
      物理法則による自己組織化
    </text>
  </g>

  <!-- Satellite 2 (Pattern 3) - Top-right -->
  <g>
    <!-- Glow effect -->
    <rect x="745" y="155" width="310" height="190" fill="#e24a4a" opacity="0.2" rx="15" ry="15" />
    <!-- Main card -->
    <rect x="750" y="160" width="300" height="180" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" rx="10" ry="10" />
    <!-- Content -->
    <text x="900" y="190" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">
      パターン3: 「縁」の多面性
    </text>
    <text x="900" y="215" text-anchor="middle" fill="white" font-size="14">
      (1/12 theories)
    </text>
    <text x="900" y="240" text-anchor="middle" fill="white" font-size="16">
      "建築理論は「縁」"
    </text>
    <text x="900" y="265" text-anchor="middle" fill="#cccccc" font-size="14">
      Alexander: centerを強める
    </text>
  </g>

  <!-- Satellite 3 (Pattern 4) - Bottom-left -->
  <g>
    <!-- Glow effect -->
    <rect x="145" y="505" width="310" height="190" fill="#50e3c2" opacity="0.2" rx="15" ry="15" />
    <!-- Main card -->
    <rect x="150" y="510" width="300" height="180" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" rx="10" ry="10" />
    <!-- Content -->
    <text x="300" y="540" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">
      パターン4: 残余の資源化
    </text>
    <text x="300" y="565" text-anchor="middle" fill="white" font-size="14">
      (1/12 theories)
    </text>
    <text x="300" y="590" text-anchor="middle" fill="white" font-size="16">
      <tspan x="300" dy="0">"複数のエントリに「残余が資源に転化する」</tspan>
      <tspan x="300" dy="20">というパターンが見られる"</tspan>
    </text>
    <text x="300" y="635" text-anchor="middle" fill="#cccccc" font-size="14">
      構造的残余
    </text>
  </g>

  <!-- Connecting Lines -->
  <!-- Center (600, 400) to Satellites -->
  <!-- Pattern 2 (300, 250) -->
  <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="2" />
  <!-- Pattern 3 (900, 250) -->
  <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="2" />
  <!-- Pattern 4 (300, 600) -->
  <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="2" />

  <!-- Optional cross-connections between satellites -->
  <!-- S2 (300, 250) to S3 (900, 250) -->
  <line x1="300" y1="250" x2="900" y2="250" stroke="#D4A857" stroke-width="2" opacity="0.3" />
  <!-- S2 (300, 250) to S4 (300, 600) -->
  <line x1="300" y1="250" x2="300" y2="600" stroke="#D4A857" stroke-width="2" opacity="0.3" />
  <!-- S3 (900, 250) to S4 (300, 600) -->
  <line x1="900" y1="250" x2="300" y2="600" stroke="#D4A857" stroke-width="2" opacity="0.3" />

  <!-- Key finding callout -->
  <rect x="250" y="545" width="700" height="50" rx="25" ry="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
  <text x="600" y="575" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">
    建築・デザイン学で最も顕著な発見 = パターン1: 「境界は帯域である」の独立収束
  </text>

</svg>