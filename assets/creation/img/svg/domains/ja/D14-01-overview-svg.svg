<svg viewBox="0 0 1200 800" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title Section -->
  <text x="600" y="60" text-anchor="middle" fill="white" font-size="36" font-weight="bold">D14 心理学・認知科学 — 5段階モデルとの構造対応調査</text>
  <text x="600" y="95" text-anchor="middle" fill="#cccccc" font-size="20">10理論の横断的分析</text>

  <!-- Left Column: Research Methodology Flow -->
  <defs>
    <linearGradient id="phaseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2C3E50" />
      <stop offset="100%" stop-color="#34495E" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F39C12" />
    </marker>
  </defs>

  <!-- Phase 1 -->
  <rect x="45" y="155" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
  <rect x="50" y="160" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" stroke-width="1" />
  <text x="200" y="195" text-anchor="middle" fill="white" font-size="18">Phase 1-2: 文献確認・理論選定</text>
  <line x1="200" y1="220" x2="200" y2="260" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

  <!-- Phase 2 -->
  <rect x="45" y="255" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
  <rect x="50" y="260" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" stroke-width="1" />
  <text x="200" y="295" text-anchor="middle" fill="white" font-size="18">Phase 3-4: 構造対応の判定</text>
  <line x1="200" y1="320" x2="200" y2="360" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

  <!-- Phase 3 -->
  <rect x="45" y="355" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
  <rect x="50" y="360" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" stroke-width="1" />
  <text x="200" y="395" text-anchor="middle" fill="white" font-size="18">Phase 5: 論拠監査</text>
  <line x1="200" y1="420" x2="200" y2="460" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

  <!-- Phase 4 -->
  <rect x="45" y="455" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
  <rect x="50" y="460" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" stroke-width="1" />
  <text x="200" y="495" text-anchor="middle" fill="white" font-size="18">Phase 6: 構造再読（4軸再評価）</text>
  <line x1="200" y1="520" x2="200" y2="560" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

  <!-- Phase 5 -->
  <rect x="45" y="555" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
  <rect x="50" y="560" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" stroke-width="1" />
  <text x="200" y="595" text-anchor="middle" fill="white" font-size="18">Phase 7: 横断統合</text>

  <!-- Right Section: Theory Correspondence Heat Map -->
  <!-- Column Headers -->
  <g id="column-headers">
    <rect x="425" y="150" width="140" height="30" rx="5" fill="#8B8682" />
    <text x="495" y="170" text-anchor="middle" fill="white" font-size="16" font-weight="bold">場</text>
    <rect x="575" y="150" width="140" height="30" rx="5" fill="#5B8DB8" />
    <text x="645" y="170" text-anchor="middle" fill="white" font-size="16" font-weight="bold">波</text>
    <rect x="725" y="150" width="140" height="30" rx="5" fill="#D4A857" />
    <text x="795" y="170" text-anchor="middle" fill="white" font-size="16" font-weight="bold">縁</text>
    <rect x="875" y="150" width="140" height="30" rx="5" fill="#C45B4D" />
    <text x="945" y="170" text-anchor="middle" fill="white" font-size="16" font-weight="bold">渦</text>
    <rect x="1025" y="150" width="140" height="30" rx="5" fill="#5B8B6A" />
    <text x="1095" y="170" text-anchor="middle" fill="white" font-size="16" font-weight="bold">束</text>
  </g>

  <!-- Theory Rows and Cells -->
  <g id="theory-grid">
    <!-- Row 1: 洞察問題解決（表象変化・制約緩和） | strong | 場,波,縁,渦,束 -->
    <text x="410" y="220" text-anchor="end" fill="white" font-size="14">洞察問題解決（表象変化・制約緩和）</text>
    <rect x="425" y="190" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="575" y="190" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="725" y="190" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="875" y="190" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="1025" y="190" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 2: 認知的不協和 | partial | 波,縁 -->
    <text x="410" y="272" text-anchor="end" fill="white" font-size="14">認知的不協和</text>
    <rect x="425" y="242" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="575" y="242" width="140" height="50" fill="#5B8DB8" opacity="0.7" />
    <rect x="725" y="242" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="875" y="242" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1025" y="242" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 3: フロー体験 | partial | 渦 -->
    <text x="410" y="324" text-anchor="end" fill="white" font-size="14">フロー体験</text>
    <rect x="425" y="294" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="575" y="294" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="725" y="294" width="140" height="50" fill="#D4A857" opacity="0.3" />
    <rect x="875" y="294" width="140" height="50" fill="#C45B4D" opacity="0.7" />
    <rect x="1025" y="294" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 4: 4E認知（身体化・埋め込み・行為化・拡張） | conditional | 場 -->
    <text x="410" y="376" text-anchor="end" fill="white" font-size="14">4E認知（身体化・埋め込み・行為化・拡張）</text>
    <rect x="425" y="346" width="140" height="50" fill="#8B8682" opacity="0.4" />
    <rect x="575" y="346" width="140" height="50" fill="#5B8DB8" opacity="0.2" />
    <rect x="725" y="346" width="140" height="50" fill="#D4A857" opacity="0.2" />
    <rect x="875" y="346" width="140" height="50" fill="#C45B4D" opacity="0.2" />
    <rect x="1025" y="346" width="140" height="50" fill="#5B8B6A" opacity="0.2" />

    <!-- Row 5: アフォーダンス | conditional | 場,縁 -->
    <text x="410" y="428" text-anchor="end" fill="white" font-size="14">アフォーダンス</text>
    <rect x="425" y="398" width="140" height="50" fill="#8B8682" opacity="0.4" />
    <rect x="575" y="398" width="140" height="50" fill="#5B8DB8" opacity="0.2" />
    <rect x="725" y="398" width="140" height="50" fill="#D4A857" opacity="0.4" />
    <rect x="875" y="398" width="140" height="50" fill="#C45B4D" opacity="0.2" />
    <rect x="1025" y="398" width="140" height="50" fill="#5B8B6A" opacity="0.2" />

    <!-- Row 6: 概念メタファーとイメージスキーマ | conditional | 縁 -->
    <text x="410" y="480" text-anchor="end" fill="white" font-size="14">概念メタファーとイメージスキーマ</text>
    <rect x="425" y="450" width="140" height="50" fill="#8B8682" opacity="0.2" />
    <rect x="575" y="450" width="140" height="50" fill="#5B8DB8" opacity="0.2" />
    <rect x="725" y="450" width="140" height="50" fill="#D4A857" opacity="0.4" />
    <rect x="875" y="450" width="140" height="50" fill="#C45B4D" opacity="0.2" />
    <rect x="1025" y="450" width="140" height="50" fill="#5B8B6A" opacity="0.2" />

    <!-- Row 7: ベイズ脳仮説／予測処理 | strong | 場,波,縁,渦,束 -->
    <text x="410" y="532" text-anchor="end" fill="white" font-size="14">ベイズ脳仮説／予測処理</text>
    <rect x="425" y="502" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="575" y="502" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="725" y="502" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="875" y="502" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="1025" y="502" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 8: スキーマ理論 | strong | 場,波,縁,渦,束 -->
    <text x="410" y="584" text-anchor="end" fill="white" font-size="14">スキーマ理論</text>
    <rect x="425" y="554" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="575" y="554" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="725" y="554" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="875" y="554" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="1025" y="554" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 9: 注意のバイアス競合モデル | partial | 縁 -->
    <text x="410" y="636" text-anchor="end" fill="white" font-size="14">注意のバイアス競合モデル</text>
    <rect x="425" y="606" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="575" y="606" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="725" y="606" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="875" y="606" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1025" y="606" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 10: 認知的柔軟性（セットシフティング） | partial | 縁 -->
    <text x="410" y="688" text-anchor="end" fill="white" font-size="14">認知的柔軟性（セットシフティング）</text>
    <rect x="425" y="658" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="575" y="658" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="725" y="658" width="140" height="50" fill="#D4A857" opacity="0.7" />
    <rect x="875" y="658" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1025" y="658" width="140" height="50" fill="#5B8B6A" opacity="0.3" />
  </g>

  <!-- Bottom Bar -->
  <rect x="0" y="730" width="1200" height="70" rx="20" fill="#2C3E50" stroke="#cccccc" stroke-width="1" />
  <text x="600" y="765" text-anchor="middle" fill="white" font-size="18">
    <tspan fill="#27AE60">■</tspan> 強い対応: 3件 /
    <tspan fill="#F1C40F">■</tspan> 部分的対応: 4件 /
    <tspan fill="#E67E22">■</tspan> 条件付き: 3件
  </text>
</svg>