  <text x="200" y="295" text-anchor="middle" font-size="18" fill="white">Phase 3-4: 構造対応の判定</text>
  <line x1="200" y1="320" x2="200" y2="360" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

  <!-- Phase 5 -->
  <rect x="45" y="355" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
  <rect x="50" y="360" width="300" height="60" rx="10" fill="url(#gradientPhaseBox)" stroke="#cccccc" />
  <text x="200" y="395" text-anchor="middle" font-size="18" fill="white">Phase 5: 論拠監査</text>
  <line x1="200" y1="420" x2="200" y2="460" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowhead)" />

  <!-- Phase 6 -->
