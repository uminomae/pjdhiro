  <!-- Title Section -->
  <text x="600" y="60" text-anchor="middle" fill="white" font-size="36" font-weight="bold">D23 発達心理学 — 5段階モデルとの構造対応調査</text>
  <text x="600" y="95" text-anchor="middle" fill="#cccccc" font-size="20">15理論の横断的分析</text>

  <!-- Left Column: Research Methodology Flow -->
  <!-- Phase Boxes and Glows -->
  <!-- Phase 1-2 -->
  <rect x="45" y="155" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
