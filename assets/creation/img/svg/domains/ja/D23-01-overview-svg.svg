  <text x="200" y="197" text-anchor="middle" fill="white" font-size="18">Phase 1-2: 文献確認・理論選定</text>

  <!-- Phase 3-4 -->
  <rect x="45" y="255" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
  <rect x="50" y="260" width="300" height="60" rx="10" fill="url(#phaseBoxGradient)" stroke="#cccccc" stroke-width="1" />
  <text x="200" y="297" text-anchor="middle" fill="white" font-size="18">Phase 3-4: 構造対応の判定</text>

  <!-- Phase 5 -->
