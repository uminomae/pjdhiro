<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="60" font-size="32" font-weight="bold" fill="white" text-anchor="middle">物理学探究における横断的パターンの発見</text>

  <!-- Connections -->
  <g id="connections">
    <!-- Faint Satellite-to-Satellite Lines -->
    <line x1="300" y1="250" x2="900" y2="250" stroke="#D4A857" stroke-width="1" opacity="0.3" />
    <line x1="300" y1="600" x2="900" y2="600" stroke="#D4A857" stroke-width="1" opacity="0.3" />
    <line x1="300" y1="250" x2="300" y2="600" stroke="#D4A857" stroke-width="1" opacity="0.3" />
    <line x1="900" y1="250" x2="900" y2="600" stroke="#D4A857" stroke-width="1" opacity="0.3" />
    <line x1="300" y1="250" x2="900" y2="600" stroke="#D4A857" stroke-width="1" opacity="0.3" />
    <line x1="900" y1="250" x2="300" y2="600" stroke="#D4A857" stroke-width="1" opacity="0.3" />

    <!-- Hub-to-Satellite Lines (Glow) -->
    <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
    <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
    <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />
    <line x1="600" y1="400" x2="900" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />
    
    <!-- Hub-to-Satellite Lines (Main) -->
    <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="2" />
    <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="2" />
    <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="2" />
    <line x1="600" y1="400" x2="900" y2="600" stroke="#D4A857" stroke-width="2" />
  </g>

  <!-- Satellite Cards -->
  <g id="satellite-cards">
    <!-- Top-Left: 縁の二類型 -->
    <g>
      <rect x="145" y="155" width="310" height="190" fill="#4a90e2" opacity="0.2" rx="10" />
      <rect x="150" y="160" width="300" height="180" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" rx="10" />
      <text x="300" y="195" font-size="20" font-weight="bold" fill="#4a90e2" text-anchor="middle">縁の二類型——概念的縁と物理的縁</text>
      <text x="300" y="220" font-size="14" fill="white" text-anchor="middle">0/10</text>
      <text x="300" y="260" font-size="16" fill="white" text-anchor="middle">
        <tspan x="300" dy="-0.6em">「物理学領域の縁段階には、</tspan>
        <tspan x="300" dy="1.2em">少なくとも二つの類型が確認されました」</tspan>
      </text>
    </g>
    <!-- Top-Right: 渦段階の物理的可視性 -->
    <g>
      <rect x="745" y="155" width="310" height="190" fill="#e24a4a" opacity="0.2" rx="10" />
      <rect x="750" y="160" width="300" height="180" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" rx="10" />
      <text x="900" y="195" font-size="20" font-weight="bold" fill="#e24a4a" text-anchor="middle">渦段階の物理的可視性</text>
      <text x="900" y="220" font-size="14" fill="white" text-anchor="middle">0/10</text>
      <text x="900" y="260" font-size="16" fill="white" text-anchor="middle">
        <tspan x="900" dy="-0.6em">「物理学は、30の調査領域中でも</tspan>
        <tspan x="900" dy="1.2em">渦段階の物理的可視性が最も高い領域の一つです」</tspan>
      </text>
    </g>
    <!-- Bottom-Left: 束の多様性と文脈依存性 -->
    <g>
      <rect x="145" y="505" width="310" height="190" fill="#50e3c2" opacity="0.2" rx="10" />
      <rect x="150" y="510" width="300" height="180" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" rx="10" />
      <text x="300" y="545" font-size="20" font-weight="bold" fill="#50e3c2" text-anchor="middle">束の多様性と文脈依存性</text>
      <text x="300" y="570" font-size="14" fill="white" text-anchor="middle">1/10</text>
      <text x="300" y="605" font-size="16" fill="white" text-anchor="middle">
        <tspan x="300" dy="-0.6em">「物理学の束段階は驚くほど多様な</tspan>
        <tspan x="300" dy="1.2em">物理的実現を示します」</tspan>
      </text>
      <text x="300" y="645" font-size="14" fill="#cccccc" text-anchor="middle">空間的周期構造</text>
    </g>
    <!-- Bottom-Right: QFTの発想源 -->
    <g>
      <rect x="745" y="505" width="310" height="190" fill="#b34ae2" opacity="0.2" rx="10" />
      <rect x="750" y="510" width="300" height="180" fill="#2a2a4e" stroke="#b34ae2" stroke-width="2" rx="10" />
      <text x="900" y="545" font-size="20" font-weight="bold" fill="#b34ae2" text-anchor="middle">QFTの発想源としての位置づけ</text>
      <text x="900" y="570" font-size="14" fill="white" text-anchor="middle">9件</text>
      <text x="900" y="605" font-size="16" fill="white" text-anchor="middle">
        <tspan x="900" dy="-0.6em">「QFTは5段階モデルの発想源の一つであり、</tspan>
        <tspan x="900" dy="1.2em">QFTとの対応が良いことは循環的です」</tspan>
      </text>
    </g>
  </g>

  <!-- Center Card (Hub) -->
  <g id="hub-card">
    <rect x="395" y="275" width="410" height="250" fill="#D4A857" opacity="0.2" rx="15" />
    <rect x="390" y="270" width="420" height="260" fill="#D4A857" opacity="0.3" rx="15" />
    <rect x="400" y="280" width="400" height="240" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" rx="15" />
    
    <text x="600" y="320" font-size="28" font-weight="bold" fill="#D4A857" text-anchor="middle">閾値遷移の普遍性</text>
    <text x="600" y="348" font-size="18" fill="white" text-anchor="middle">(10件中6件 theories)</text>
    <text x="600" y="385" font-size="20" fill="white" text-anchor="middle">「...縁から渦への遷移に『閾値』...」</text>
    
    <text x="420" y="425" font-size="16" fill="#cccccc">Found in:</text>
    <text fill="#D4A857" font-size="14">
      <tspan x="420" y="450">アブリコソフ渦糸格子, KZM, レーザー発振</tspan>
      <tspan x="420" y="470">ベナール対流, 古典核生成理論, くりこみ群</tspan>
    </text>
  </g>

  <!-- Key Finding Callout -->
  <g id="key-finding">
    <rect x="390" y="545" width="420" height="50" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" rx="25" />
    <text x="600" y="578" font-size="18" font-weight="bold" fill="#1a1a2e" text-anchor="middle">物理学で最も顕著な発見 = 閾値遷移の普遍性</text>
  </g>
</svg>