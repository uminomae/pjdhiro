<svg viewBox="0 0 1200 800" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" fill="white" font-size="32" font-weight="bold">経済学探究における横断的パターンの発見</text>

  <!-- Define card dimensions and positions for reusability -->
  <defs>
    <rect id="centerCardRect" x="400" y="280" width="400" height="240" rx="10" ry="10" />
    <rect id="satCardRect" width="300" height="180" rx="8" ry="8" />
  </defs>

  <!-- Connecting Lines (Glow layer) -->
  <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <line x1="600" y1="400" x2="900" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  
  <!-- Optional cross-connections between satellites -->
  <line x1="300" y1="250" x2="900" y2="250" stroke="white" stroke-width="1" opacity="0.3" />
  <line x1="300" y1="250" x2="300" y2="600" stroke="white" stroke-width="1" opacity="0.3" />
  <line x1="900" y1="250" x2="900" y2="600" stroke="white" stroke-width="1" opacity="0.3" />
  <line x1="300" y1="600" x2="900" y2="600" stroke="white" stroke-width="1" opacity="0.3" />
  <line x1="300" y1="250" x2="900" y2="600" stroke="white" stroke-width="1" opacity="0.3" />
  <line x1="900" y1="250" x2="300" y2="600" stroke="white" stroke-width="1" opacity="0.3" />

  <!-- Center Card (Hub) -->
  <!-- Glow layers -->
  <rect x="390" y="270" width="420" height="260" rx="12" ry="12" fill="#D4A857" opacity="0.2" />
  <rect x="395" y="275" width="410" height="250" rx="11" ry="11" fill="#D4A857" opacity="0.3" />
  <!-- Main card -->
  <use href="#centerCardRect" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" />
  <!-- Content -->
  <text x="600" y="320" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">パターン1: 安定した秩序は場を変質させる</text>
  <text x="600" y="350" text-anchor="middle" fill="white" font-size="18">(3件 theories)</text>
  <text x="600" y="385" text-anchor="middle" fill="white" font-size="20">
    <tspan x="600" dy="0">"アーサー、ミンスキー、ノースの3件が、独立に</tspan>
    <tspan x="600" dy="24">「安定した秩序（束）の長期化が場の性質を変える"</tspan>
  </text>
  <text x="600" y="450" text-anchor="middle" fill="#cccccc" font-size="16">Found in:</text>
  <text x="600" y="475" text-anchor="middle" fill="#D4A857" font-size="14">束</text>

  <!-- Satellite Cards -->
  <!-- Pattern 2: Top-left (x=300, y=250 center; rect x=150, y=160) -->
  <g transform="translate(150, 160)">
    <!-- Glow -->
    <rect x="-5" y="-5" width="310" height="190" rx="10" ry="10" fill="#4a90e2" opacity="0.2" />
    <!-- Main card -->
    <use href="#satCardRect" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" />
    <!-- Content -->
    <text x="150" y="40" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">パターン2: 「保持する」という第三の選択肢</text>
    <text x="150" y="65" text-anchor="middle" fill="white" font-size="14">3件</text>
    <text x="150" y="95" text-anchor="middle" fill="white" font-size="16">
      <tspan x="150" dy="0">ケインズ（流動性選好）、ナイト（不確実性下の判断保留）、</tspan>
      <tspan x="150" dy="20">ネルソン＆ウィンター（満足化）の3件が、「行動する</tspan>
    </text>
    <text x="150" y="150" text-anchor="middle" fill="#cccccc" font-size="14">流動性選好</text>
  </g>

  <!-- Pattern 3: Top-right (x=900, y=250 center; rect x=750, y=160) -->
  <g transform="translate(750, 160)">
    <!-- Glow -->
    <rect x="-5" y="-5" width="310" height="190" rx="10" ry="10" fill="#e24a4a" opacity="0.2" />
    <!-- Main card -->
    <use href="#satCardRect" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" />
    <!-- Content -->
    <text x="150" y="40" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">パターン3: 縁の多型性——7つの分岐タイプ</text>
    <text x="150" y="65" text-anchor="middle" fill="white" font-size="14">10件</text>
    <text x="150" y="95" text-anchor="middle" fill="white" font-size="16">
      <tspan x="150" dy="0">本調査は5段階のうち「縁</tspan>
    </text>
    <text x="150" y="150" text-anchor="middle" fill="#cccccc" font-size="14">シュンペーター</text>
  </g>

  <!-- Pattern 4: Bottom-left (x=300, y=600 center; rect x=150, y=510) -->
  <g transform="translate(150, 510)">
    <!-- Glow -->
    <rect x="-5" y="-5" width="310" height="190" rx="10" ry="10" fill="#50e3c2" opacity="0.2" />
    <!-- Main card -->
    <use href="#satCardRect" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" />
    <!-- Content -->
    <text x="150" y="40" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">パターン4: 場の二重性——豊かさと慣性</text>
    <text x="150" y="65" text-anchor="middle" fill="white" font-size="14">3件</text>
    <text x="150" y="95" text-anchor="middle" fill="white" font-size="16">
      <tspan x="150" dy="0">ペンローズ、ノース、ハイエクの3件が、場について</tspan>
      <tspan x="150" dy="20">二つの方向の記述を提供しています</tspan>
    </text>
    <text x="150" y="150" text-anchor="middle" fill="#cccccc" font-size="14"></text>
  </g>

  <!-- Pattern 5: Bottom-right (x=900, y=600 center; rect x=750, y=510) -->
  <g transform="translate(750, 510)">
    <!-- Glow -->
    <rect x="-5" y="-5" width="310" height="190" rx="10" ry="10" fill="#b34ae2" opacity="0.2" />
    <!-- Main card -->
    <use href="#satCardRect" fill="#2a2a4e" stroke="#b34ae2" stroke-width="2" />
    <!-- Content -->
    <text x="150" y="40" text-anchor="middle" fill="#b34ae2" font-size="20" font-weight="bold">パターン5: 変化は系の内部から生じる</text>
    <text x="150" y="65" text-anchor="middle" fill="white" font-size="14">3件</text>
    <text x="150" y="95" text-anchor="middle" fill="white" font-size="16">
      <tspan x="150" dy="0">シュンペーター、アーサー、ミンスキーの3件が、</tspan>
      <tspan x="150" dy="20">「変化は外部のショックによってではなく系の内部から生じる</tspan>
    </text>
    <text x="150" y="150" text-anchor="middle" fill="#cccccc" font-size="14"></text>
  </g>

  <!-- Connecting Lines (Sharp layer) -->
  <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="2" />
  <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="2" />
  <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="2" />
  <line x1="600" y1="400" x2="900" y2="600" stroke="#D4A857" stroke-width="2" />

  <!-- Key finding callout -->
  <rect x="300" y="545" width="600" height="50" rx="25" ry="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
  <text x="600" y="575" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">経済学で最も顕著な発見 = パターン1: 安定した秩序は場を変質させる</text>

</svg>