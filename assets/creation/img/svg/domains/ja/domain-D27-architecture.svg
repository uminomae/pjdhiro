<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <marker id="arrow27" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8" rx="8"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="#E0DDD8" stroke-width="1" rx="8"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" fill="#2C2C2C" font-weight="bold">D27 建築学 — 5段階モデルとの構造対応図</text>

  <!-- 5 Stages -->
  <rect x="45" y="90" width="130" height="60" rx="10" fill="#8B8682" opacity="0.15" stroke="#8B8682" stroke-width="2"/>
  <text x="110" y="118" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#8B8682" font-weight="bold">場</text>
  <text x="110" y="138" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#8B8682">Field</text>

  <rect x="195" y="90" width="130" height="60" rx="10" fill="#5B8DB8" opacity="0.15" stroke="#5B8DB8" stroke-width="2"/>
  <text x="260" y="118" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#5B8DB8" font-weight="bold">波</text>
  <text x="260" y="138" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#5B8DB8">Wave</text>

  <rect x="345" y="90" width="130" height="60" rx="10" fill="#D4A857" opacity="0.15" stroke="#D4A857" stroke-width="2.5"/>
  <text x="410" y="118" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#D4A857" font-weight="bold">縁</text>
  <text x="410" y="138" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#D4A857">Edge</text>

  <rect x="495" y="90" width="130" height="60" rx="10" fill="#C45B4D" opacity="0.15" stroke="#C45B4D" stroke-width="2"/>
  <text x="560" y="118" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#C45B4D" font-weight="bold">渦</text>
  <text x="560" y="138" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#C45B4D">Vortex</text>

  <rect x="645" y="90" width="130" height="60" rx="10" fill="#5B8B6A" opacity="0.15" stroke="#5B8B6A" stroke-width="2"/>
  <text x="710" y="118" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#5B8B6A" font-weight="bold">束</text>
  <text x="710" y="138" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#5B8B6A">Bundle</text>

  <!-- Arrows -->
  <line x1="175" y1="120" x2="195" y2="120" stroke="#666666" stroke-width="2" marker-end="url(#arrow27)"/>
  <line x1="325" y1="120" x2="345" y2="120" stroke="#666666" stroke-width="2" marker-end="url(#arrow27)"/>
  <line x1="475" y1="120" x2="495" y2="120" stroke="#666666" stroke-width="2" marker-end="url(#arrow27)"/>
  <line x1="625" y1="120" x2="645" y2="120" stroke="#666666" stroke-width="2" marker-end="url(#arrow27)"/>

  <!-- Ba concepts -->
  <line x1="110" y1="150" x2="110" y2="175" stroke="#8B8682" stroke-width="2"/>
  <rect x="40" y="175" width="140" height="110" rx="6" fill="#FAFAF8" stroke="#8B8682" stroke-width="1.5"/>
  <text x="110" y="195" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">「間」の余白性</text>
  <text x="110" y="215" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Ottoの潜在的特性</text>
  <text x="110" y="235" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Aravenaの不完全さ</text>
  <text x="110" y="260" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#666666">(Otto/Aravena)</text>

  <!-- Nami concepts -->
  <line x1="260" y1="150" x2="260" y2="175" stroke="#5B8DB8" stroke-width="2"/>
  <rect x="190" y="175" width="140" height="110" rx="6" fill="#FAFAF8" stroke="#5B8DB8" stroke-width="1.5"/>
  <text x="260" y="195" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">力学的形態発見</text>
  <text x="260" y="215" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">構造探索・変形</text>
  <text x="260" y="235" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">都市の多様性生成</text>
  <text x="260" y="260" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#666666">(Otto/Jacobs)</text>

  <!-- En concepts - strongest correspondence, thicker border -->
  <line x1="410" y1="150" x2="410" y2="175" stroke="#D4A857" stroke-width="2.5"/>
  <rect x="340" y="175" width="140" height="110" rx="6" fill="#FAFAF8" stroke="#D4A857" stroke-width="2.5"/>
  <text x="410" y="195" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">中間領域(van Eyck)</text>
  <text x="410" y="215" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">閾空間(Hertzberger)</text>
  <text x="410" y="235" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">縁側・poche</text>
  <text x="410" y="260" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#666666">(5理論が全条件充足)</text>

  <!-- Uzu concepts -->
  <line x1="560" y1="150" x2="560" y2="175" stroke="#C45B4D" stroke-width="2"/>
  <rect x="490" y="175" width="140" height="110" rx="6" fill="#FAFAF8" stroke="#C45B4D" stroke-width="1.5"/>
  <text x="560" y="195" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">構造保持変換</text>
  <text x="560" y="215" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">unfolding(Alexander)</text>
  <text x="560" y="235" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">計算形態生成</text>
  <text x="560" y="260" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#666666">(Alexander/Menges)</text>

  <!-- Taba concepts -->
  <line x1="710" y1="150" x2="710" y2="175" stroke="#5B8B6A" stroke-width="2"/>
  <rect x="640" y="175" width="140" height="110" rx="6" fill="#FAFAF8" stroke="#5B8B6A" stroke-width="1.5"/>
  <text x="710" y="195" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">15の性質(Alexander)</text>
  <text x="710" y="215" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">設計語彙の継承</text>
  <text x="710" y="235" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">制度化された教育</text>
  <text x="710" y="260" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#666666">(Lynch/Alexander)</text>

  <!-- Legend -->
  <rect x="40" y="310" width="720" height="100" rx="8" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1"/>
  <text x="60" y="335" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#2C2C2C" font-weight="bold">対応の強さ</text>
  <line x1="60" y1="355" x2="100" y2="355" stroke="#2C2C2C" stroke-width="2"/>
  <text x="110" y="360" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">強い対応</text>
  <line x1="240" y1="355" x2="280" y2="355" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="290" y="360" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">部分的対応</text>
  <line x1="420" y1="355" x2="460" y2="355" stroke="#D0D0D0" stroke-width="2" stroke-dasharray="2,3"/>
  <text x="470" y="360" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#666666">弱い対応</text>

  <text x="60" y="390" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">確定に近い: Alexander, Otto, van Eyck, Hertzberger, 間</text>
  <text x="60" y="400" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">対応なし: Schumacher(パラメトリシズム) — 縁の消去方向で5段階と構造的に矛盾</text>

  <!-- Summary -->
  <rect x="40" y="430" width="720" height="140" rx="8" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1"/>
  <text x="60" y="455" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#2C2C2C" font-weight="bold">全体評価サマリ</text>
  <text x="60" y="480" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">12理論中10理論で構造対応確認。全30領域中でも特に有力な領域。</text>
  <text x="60" y="500" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">「縁」との共振密度が際立つ: 建築は本質的に「境界の設計」を扱う学問。</text>
  <text x="60" y="520" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">「境界は線ではなく帯域である」が複数の理論家により独立に発見されている。</text>
  <text x="60" y="540" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">縁の類型: 帯域設計型 — 「縁を設計する」唯一の領域。記述から操作へのシフト。</text>
  <text x="60" y="560" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">「場」は空白でなく余白の積極的構成として現れる（間、Aravena）。</text>
</svg>