<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowD10" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
    <filter id="shadowD10" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="#E0DDD8" stroke-width="1" rx="4"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" font-weight="bold" fill="#2C2C2C">臨床医学 - 5段階モデルとの構造対応図</text>
  <text x="400" y="76" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#666666">D10: 全10件で構造対応確認。縁が分子・細胞レベルで具体的に観察可能</text>

  <!-- Stage boxes -->
  <!-- 1. Field -->
  <rect x="40" y="110" width="120" height="70" rx="8" fill="#8B8682" filter="url(#shadowD10)" opacity="0.9"/>
  <text x="100" y="140" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">場</text>
  <text x="100" y="162" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#FAFAF8">Field</text>

  <!-- 2. Wave -->
