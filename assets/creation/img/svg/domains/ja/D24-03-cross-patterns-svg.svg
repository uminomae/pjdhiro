<svg viewBox="0 0 1200 800" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="32" font-weight="bold">宗教学探究における横断的パターンの発見</text>

  <!-- Connecting Lines (Glow) -->
  <g stroke="#D4A857" stroke-width="4" opacity="0.4">
    <line x1="600" y1="400" x2="300" y2="250" />
    <line x1="600" y1="400" x2="900" y2="250" />
    <line x1="600" y1="400" x2="300" y2="600" />
    <line x1="600" y1="400" x2="900" y2="600" />
  </g>
  <!-- Connecting Lines (Sharp) -->
  <g stroke="#D4A857" stroke-width="2" opacity="1">
    <line x1="600" y1="400" x2="300" y2="250" />
    <line x1="600" y1="400" x2="900" y2="250" />
    <line x1="600" y1="400" x2="300" y2="600" />
    <line x1="600" y1="400" x2="900" y2="600" />
  </g>

  <!-- Satellite Cross-connections (Optional) -->
  <g stroke="#D4A857" stroke-width="1" opacity="0.3">
    <line x1="300" y1="250" x2="900" y2="250" />
    <line x1="300" y1="250" x2="300" y2="600" />
    <line x1="900" y1="250" x2="900" y2="600" />
    <line x1="300" y1="600" x2="900" y2="600" />
    <line x1="300" y1="250" x2="900" y2="600" />
    <line x1="900" y1="250" x2="300" y2="600" />
  </g>

  <!-- Center Card (Hub) -->
  <g>
    <!-- Glow effect -->
    <rect x="390" y="270" width="420" height="260" rx="10" fill="#D4A857" opacity="0.2" />
    <rect x="395" y="275" width="410" height="250" rx="10" fill="#D4A857" opacity="0.3" />
    <!-- Main card -->
    <rect x="400" y="280" width="400" height="240" rx="10" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" />
    <text x="600" y="320" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">パターン1: 「縁」における受動性への転換</text>
    <text x="600" y="350" text-anchor="middle" fill="white" font-size="18">(1/10 theories)</text>
    <text x="600" y="385" text-anchor="middle" fill="white" font-size="20">"少なくとも4つの異なる文化圏の理論で、「縁」"</text>
    <text x="600" y="435" text-anchor="middle" fill="#cccccc" font-size="16">Found in:</text>
    <text x="600" y="455" text-anchor="middle" fill="#D4A857" font-size="14">人間の努力による慰め</text>
  </g>

  <!-- Satellite Card 1 (Top-left) -->
  <g>
    <rect x="145" y="155" width="310" height="190" rx="8" fill="#4a90e2" opacity="0.2" />
    <rect x="150" y="160" width="300" height="180" rx="8" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" />
    <text x="300" y="195" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">パターン2: 束の二重構造</text>
    <text x="300" y="220" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">——「持続」と「帰還」</text>
    <text x="300" y="245" text-anchor="middle" fill="white" font-size="14">1/10</text>
    <text x="300" y="270" text-anchor="middle" fill="white" font-size="16">"束の段階には、二つの異なる側面が確認されました"</text>
    <text x="300" y="300" text-anchor="middle" fill="#cccccc" font-size="14">安定した平和の中での日常</text>
  </g>

  <!-- Satellite Card 2 (Top-right) -->
  <g>
    <rect x="745" y="155" width="310" height="190" rx="8" fill="#e24a4a" opacity="0.2" />
    <rect x="750" y="160" width="300" height="180" rx="8" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" />
    <text x="900" y="195" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">パターン3: 段階数の多様性</text>
    <text x="900" y="220" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">——「指月」の例証</text>
    <text x="900" y="245" text-anchor="middle" fill="white" font-size="14">1/10</text>
    <text x="900" y="270" text-anchor="middle" fill="white" font-size="16">"宗教学の10の理論における段階数は、</text>
    <text x="900" y="290" text-anchor="middle" fill="white" font-size="16">3段階（ファン・ヘネップ）から100段階（アンサーリー）まで大きく異なります"</text>
    <text x="900" y="320" text-anchor="middle" fill="#cccccc" font-size="14">ファン・ヘネップ</text>
  </g>

  <!-- Satellite Card 3 (Bottom-left) -->
  <g>
    <rect x="145" y="505" width="310" height="190" rx="8" fill="#50e3c2" opacity="0.2" />
    <rect x="150" y="510" width="300" height="180" rx="8" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" />
    <text x="300" y="545" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">パターン4: 「場」の二面性</text>
    <text x="300" y="570" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">——「未分化」と「動的力場」</text>
    <text x="300" y="595" text-anchor="middle" fill="white" font-size="14">1/10</text>
    <text x="300" y="620" text-anchor="middle" fill="white" font-size="16">"宗教学の理論間で、「場」"</text>
    <text x="300" y="650" text-anchor="middle" fill="#cccccc" font-size="14">未分化な素材</text>
  </g>

  <!-- Satellite Card 4 (Bottom-right) -->
  <g>
    <rect x="745" y="505" width="310" height="190" rx="8" fill="#b34ae2" opacity="0.2" />
    <rect x="750" y="510" width="300" height="180" rx="8" fill="#2a2a4e" stroke="#b34ae2" stroke-width="2" />
    <text x="900" y="545" text-anchor="middle" fill="#b34ae2" font-size="20" font-weight="bold">パターン5: 「縁→渦」接続の一貫性</text>
    <text x="900" y="595" text-anchor="middle" fill="white" font-size="14">0/10</text>
    <text x="900" y="620" text-anchor="middle" fill="white" font-size="16">"全10理論において、「縁」"</text>
    <!-- No "Found in:" or theory name for 0/10 -->
  </g>

  <!-- Key finding callout -->
  <g>
    <rect x="300" y="720" width="600" height="50" rx="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
    <text x="600" y="750" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">宗教学で最も顕著な発見 = パターン1: 「縁」における受動性への転換</text>
  </g>

</svg>