<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead18" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
    <style>
      .title { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 24px; fill: #2C2C2C; font-weight: 600; }
      .stage-label { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 14px; fill: #FAFAF8; font-weight: 600; }
      .stage-sub { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 11px; fill: #FAFAF8; }
      .concept { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 12px; fill: #2C2C2C; }
      .summary-title { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 14px; fill: #2C2C2C; font-weight: 600; }
      .summary { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 12px; fill: #666666; }
      .strength-label { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 11px; fill: #666666; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8" rx="0"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#E0DDD8" stroke-width="1" rx="8"/>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" class="title">社会学 (D18) — 5段階モデルとの構造対応図</text>

  <!-- Stage boxes -->
  <!-- 場 Field -->
  <rect x="48" y="95" width="120" height="65" rx="8" fill="#8B8682"/>
  <text x="108" y="122" text-anchor="middle" class="stage-label">場（Field）</text>
  <text x="108" y="140" text-anchor="middle" class="stage-sub">未分化の初期条件</text>

  <!-- Arrow 場→波 -->
  <line x1="168" y1="127" x2="192" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead18)"/>

  <!-- 波 Wave -->
  <rect x="196" y="95" width="120" height="65" rx="8" fill="#5B8DB8"/>
  <text x="256" y="122" text-anchor="middle" class="stage-label">波（Wave）</text>
  <text x="256" y="140" text-anchor="middle" class="stage-sub">発散・競合</text>

  <!-- Arrow 波→縁 -->
  <line x1="316" y1="127" x2="340" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead18)"/>

  <!-- 縁 Edge -->
  <rect x="344" y="95" width="120" height="65" rx="8" fill="#D4A857"/>
  <text x="404" y="122" text-anchor="middle" class="stage-label">縁（Edge）</text>
  <text x="404" y="140" text-anchor="middle" class="stage-sub">緊張・関係の編成</text>

  <!-- Arrow 縁→渦 -->
  <line x1="464" y1="127" x2="488" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead18)"/>

  <!-- 渦 Vortex -->
  <rect x="492" y="95" width="120" height="65" rx="8" fill="#C45B4D"/>
  <text x="552" y="122" text-anchor="middle" class="stage-label">渦（Vortex）</text>
  <text x="552" y="140" text-anchor="middle" class="stage-sub">秩序の自発的成立</text>

  <!-- Arrow 渦→束 -->
  <line x1="612" y1="127" x2="636" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead18)"/>

  <!-- 束 Bundle -->
  <rect x="640" y="95" width="120" height="65" rx="8" fill="#5B8B6A"/>
  <text x="700" y="122" text-anchor="middle" class="stage-label">束（Bundle）</text>
  <text x="700" y="140" text-anchor="middle" class="stage-sub">持続的構造</text>

  <!-- Concepts under each stage -->
  <!-- 場 concepts (strong = solid 2px) -->
  <line x1="108" y1="160" x2="108" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="108" y="200" text-anchor="middle" class="concept">規則と資源の集合</text>
  <text x="108" y="218" text-anchor="middle" class="concept">(Giddens)</text>
  <text x="108" y="240" text-anchor="middle" class="concept">多様な組織の併存</text>
  <text x="108" y="258" text-anchor="middle" class="concept">(DiMaggio/Powell)</text>
  <text x="108" y="280" text-anchor="middle" class="concept">日常の当たり前</text>
  <text x="108" y="298" text-anchor="middle" class="concept">(Berger/Luckmann)</text>

  <!-- 波 concepts (strong = solid 2px) -->
  <line x1="256" y1="160" x2="256" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="256" y="200" text-anchor="middle" class="concept">解釈の差異・葛藤</text>
  <text x="256" y="218" text-anchor="middle" class="concept">(Giddens)</text>
  <text x="256" y="240" text-anchor="middle" class="concept">正統性への圧力</text>
  <text x="256" y="258" text-anchor="middle" class="concept">(DiMaggio/Powell)</text>
  <text x="256" y="280" text-anchor="middle" class="concept">共通注意の収斂</text>
  <text x="256" y="298" text-anchor="middle" class="concept">(Collins)</text>

  <!-- 縁 concepts (strong = solid 2px) -->
  <line x1="404" y1="160" x2="404" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="404" y="200" text-anchor="middle" class="concept">弱い紐帯の橋渡し</text>
  <text x="404" y="218" text-anchor="middle" class="concept">(Granovetter)</text>
  <text x="404" y="240" text-anchor="middle" class="concept">情動的同期</text>
  <text x="404" y="258" text-anchor="middle" class="concept">(Collins)</text>
  <text x="404" y="280" text-anchor="middle" class="concept">フィールド構造化</text>
  <text x="404" y="298" text-anchor="middle" class="concept">(DiMaggio/Powell)</text>

  <!-- 渦 concepts (strong = solid 2px) -->
  <line x1="552" y1="160" x2="552" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="552" y="200" text-anchor="middle" class="concept">制度パターンの成立</text>
  <text x="552" y="218" text-anchor="middle" class="concept">(Giddens)</text>
  <text x="552" y="240" text-anchor="middle" class="concept">集合的沸騰</text>
  <text x="552" y="258" text-anchor="middle" class="concept">(Collins)</text>
  <text x="552" y="280" text-anchor="middle" class="concept">組織の同型化</text>
  <text x="552" y="298" text-anchor="middle" class="concept">(DiMaggio/Powell)</text>

  <!-- 束 concepts (strong = solid 2px) -->
  <line x1="700" y1="160" x2="700" y2="185" stroke="#2C2C2C" stroke-width="2"/>
  <text x="700" y="200" text-anchor="middle" class="concept">制度の再生産</text>
  <text x="700" y="218" text-anchor="middle" class="concept">(Giddens)</text>
  <text x="700" y="240" text-anchor="middle" class="concept">情動エネルギー</text>
  <text x="700" y="258" text-anchor="middle" class="concept">(Collins)</text>
  <text x="700" y="280" text-anchor="middle" class="concept">同型化慣行の定着</text>
  <text x="700" y="298" text-anchor="middle" class="concept">(DiMaggio/Powell)</text>

  <!-- Strength legend -->
  <rect x="48" y="330" width="712" height="1" fill="#E0DDD8"/>
  <text x="60" y="358" class="strength-label">対応の強さ:</text>
  <line x1="150" y1="354" x2="180" y2="354" stroke="#2C2C2C" stroke-width="2"/>
  <text x="185" y="358" class="strength-label">強い対応</text>
  <line x1="260" y1="354" x2="290" y2="354" stroke="#666666" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="295" y="358" class="strength-label">部分的対応</text>
  <line x1="380" y1="354" x2="410" y2="354" stroke="#D0D0D0" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="415" y="358" class="strength-label">弱い対応</text>

  <!-- Summary -->
  <rect x="48" y="378" width="712" height="180" rx="6" fill="none" stroke="#E0DDD8" stroke-width="1"/>
  <text x="68" y="402" class="summary-title">全体の対応評価サマリ</text>

  <text x="68" y="428" class="summary">対応度: 全体として強い（11理論中7理論が強い構造対応）</text>

  <text x="68" y="454" class="summary">強い対応: Giddens構造化理論、DiMaggio/Powell制度的同型化、Collins相互作用儀礼連鎖、社会運動論等</text>

  <text x="68" y="478" class="summary">特徴1: 「縁」が最も豊かに具体化される領域 — 11理論に11種類の異なる縁の型</text>

  <text x="68" y="502" class="summary">特徴2: ミクロ(Collins対面相互作用)からマクロ(Giddens構造化)まで多スケールで対応を確認</text>

  <text x="68" y="526" class="summary">特徴3: 束→場の循環が明示的 — Giddens、Collins、Berger/Luckmann、社会運動論で記述</text>

  <text x="68" y="550" class="summary">特徴4: Granovetterの弱い紐帯は「縁」の最も純粋な社会学的定式化</text>
</svg>