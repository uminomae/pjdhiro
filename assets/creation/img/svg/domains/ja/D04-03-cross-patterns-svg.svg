<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" font-size="32" font-weight="bold" fill="white">進化生物学探究における横断的パターンの発見</text>

  <!-- Connecting Lines -->
  <g>
    <!-- Faint cross-connections between satellites -->
    <g stroke="#cccccc" stroke-width="1" opacity="0.3">
      <line x1="300" y1="250" x2="900" y2="250" />
      <line x1="300" y1="250" x2="300" y2="600" />
      <line x1="900" y1="250" x2="300" y2="600" />
    </g>
    <!-- Glow layer for main lines -->
    <g stroke="#D4A857" stroke-width="4" opacity="0.4">
      <line x1="600" y1="400" x2="300" y2="250" />
      <line x1="600" y1="400" x2="900" y2="250" />
      <line x1="600" y1="400" x2="300" y2="600" />
    </g>
    <!-- Sharp layer for main lines -->
    <g stroke="#D4A857" stroke-width="2">
      <line x1="600" y1="400" x2="300" y2="250" />
      <line x1="600" y1="400" x2="900" y2="250" />
      <line x1="600" y1="400" x2="300" y2="600" />
    </g>
  </g>

  <!-- Center Card (Hub) -->
  <g>
    <!-- Glow effect -->
    <rect x="390" y="270" width="420" height="260" rx="20" fill="#D4A857" opacity="0.2" />
    <rect x="395" y="275" width="410" height="250" rx="18" fill="#D4A857" opacity="0.3" />
    <!-- Main card -->
    <rect x="400" y="280" width="400" height="240" rx="15" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" />
    <!-- Content -->
    <text x="600" y="325" text-anchor="middle" font-size="28" font-weight="bold" fill="#D4A857">縁の機能多様性</text>
    <text x="600" y="350" text-anchor="middle" font-size="18" fill="white">(6件 theories)</text>
    <text x="600" y="395" text-anchor="middle" font-size="20" fill="white">
      <tspan>"進化生物学は、30領域中で「縁」の機能が</tspan>
      <tspan x="600" dy="1.4em">最も多様に記述される領域であった"</tspan>
    </text>
    <text x="420" y="455" font-size="16" fill="#cccccc">Found in:</text>
    <!-- Theory names would go here if provided -->
  </g>

  <!-- Satellite Card 1: Top-Left -->
  <g>
    <rect x="145" y="155" width="310" height="190" rx="15" fill="#4a90e2" opacity="0.2" />
    <rect x="150" y="160" width="300" height="180" rx="10" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" />
    <text x="300" y="195" text-anchor="middle" font-size="20" font-weight="bold" fill="#4a90e2">場の多層構造</text>
    <text x="300" y="215" text-anchor="middle" font-size="14" fill="white">1/10</text>
    <text x="165" y="245" font-size="16" fill="white">
      <tspan>"複数の理論が、場が単一均質な背景ではなく</tspan>
      <tspan x="165" dy="1.4em">多層構造を持つことを示しています"</tspan>
    </text>
    <text x="165" y="310" font-size="14" fill="#cccccc">共通の発生遺伝子セット</text>
  </g>

  <!-- Satellite Card 2: Top-Right -->
  <g>
    <rect x="745" y="155" width="310" height="190" rx="15" fill="#e24a4a" opacity="0.2" />
    <rect x="750" y="160" width="300" height="180" rx="10" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" />
    <text x="900" y="195" text-anchor="middle" font-size="20" font-weight="bold" fill="#e24a4a">時間の非対称性</text>
    <text x="900" y="215" text-anchor="middle" font-size="14" fill="white">1/10</text>
    <text x="765" y="245" font-size="16" fill="white">
      <tspan>"断続平衡説を中心に、場の維持期(長い)と</tspan>
      <tspan x="765" dy="1.4em">渦の実現期(短い)の間に強い非対称性"</tspan>
    </text>
    <text x="765" y="310" font-size="14" fill="#cccccc">長い</text>
  </g>

  <!-- Satellite Card 3: Bottom-Left -->
  <g>
    <rect x="145" y="505" width="310" height="190" rx="15" fill="#50e3c2" opacity="0.2" />
    <rect x="150" y="510" width="300" height="180" rx="10" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" />
    <text x="300" y="545" text-anchor="middle" font-size="20" font-weight="bold" fill="#50e3c2">束→場回帰の多様性</text>
    <text x="300" y="565" text-anchor="middle" font-size="14" fill="white">0/10</text>
    <text x="165" y="595" font-size="16" fill="white">
      <tspan>"複数の理論が束から場への回帰を記述して</tspan>
      <tspan x="165" dy="1.4em">いますが、その質は多様です"</tspan>
    </text>
  </g>

  <!-- Key Finding Callout -->
  <g>
    <rect x="400" y="550" width="400" height="50" rx="25" fill="#D4A857" fill-opacity="0.9" stroke="white" stroke-width="1" />
    <text x="600" y="582" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">進化生物学で最も顕著な発見 = 縁の機能多様性</text>
  </g>

</svg>