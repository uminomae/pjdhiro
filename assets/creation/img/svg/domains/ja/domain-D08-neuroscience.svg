  <text x="75" y="346" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">予測符号化・自由エネルギー原理</text>
  <line x1="320" y1="341" x2="720" y2="341" stroke="#2C2C2C" stroke-width="2"/>
  <text x="735" y="346" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">強</text>

  <!-- Row 2: Synaptic plasticity - strong -->
