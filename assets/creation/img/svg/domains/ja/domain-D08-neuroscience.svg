  <text x="400" y="238" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">STDP時間窓</text>
  <text x="400" y="258" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">オートポイエーシスの膜</text>

  <!-- Vortex concepts -->
