  <text x="75" y="383" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">シナプス可塑性・STDP</text>
  <line x1="320" y1="378" x2="720" y2="378" stroke="#2C2C2C" stroke-width="2"/>
  <text x="735" y="383" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">強</text>

  <!-- Row 3: Polyvagal - strong -->
  <rect x="60" y="399" width="680" height="32" rx="4" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1"/>
  <text x="75" y="420" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">ポリヴェーガル理論</text>
  <line x1="320" y1="415" x2="720" y2="415" stroke="#2C2C2C" stroke-width="2"/>
  <text x="735" y="420" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">強</text>

  <!-- Row 4: Enactivism - strong -->
  <rect x="60" y="436" width="680" height="32" rx="4" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1"/>
  <text x="75" y="457" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">身体化された認知・エナクティヴィズム</text>
  <line x1="320" y1="452" x2="720" y2="452" stroke="#2C2C2C" stroke-width="2"/>
  <text x="735" y="457" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">強</text>

  <!-- Row 5: Neural avalanche - conditional -->
  <rect x="60" y="473" width="680" height="32" rx="4" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1"/>
  <text x="75" y="494" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">神経雪崩とクリティカリティ</text>
  <line x1="320" y1="489" x2="720" y2="489" stroke="#D0D0D0" stroke-width="2" stroke-dasharray="2,4"/>
  <text x="735" y="494" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">条件付</text>

  <!-- Legend -->
  <line x1="60" y1="530" x2="100" y2="530" stroke="#2C2C2C" stroke-width="2"/>
  <text x="108" y="534" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">強い対応</text>
  <line x1="200" y1="530" x2="240" y2="530" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="248" y="534" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">部分的対応</text>
  <line x1="360" y1="530" x2="400" y2="530" stroke="#D0D0D0" stroke-width="2" stroke-dasharray="2,4"/>
  <text x="408" y="534" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">条件付き対応</text>

  <!-- Summary -->
  <rect x="40" y="550" width="720" height="40" rx="6" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1"/>
  <text x="400" y="570" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">全体評価: シナプスから対人関係まで複数スケールで構造が反復。意識を伴わない水準でも作動</text>
  <text x="400" y="585" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">確定6割 / 有力3割 / 仮説1割 -- 実験的検証の密度が高い領域</text>
</svg>