<svg viewBox="0 0 1200 800" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="32" font-weight="bold">
    伝統知・技芸探究における横断的パターンの発見
  </text>

  <!-- Connecting Lines (Glow Layer) -->
  <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />
  <line x1="600" y1="400" x2="900" y2="600" stroke="#D4A857" stroke-width="4" opacity="0.4" />

  <!-- Connecting Lines (Sharp Layer) -->
  <line x1="600" y1="400" x2="300" y2="250" stroke="#D4A857" stroke-width="2" opacity="1" />
  <line x1="600" y1="400" x2="900" y2="250" stroke="#D4A857" stroke-width="2" opacity="1" />
  <line x1="600" y1="400" x2="300" y2="600" stroke="#D4A857" stroke-width="2" opacity="1" />
  <line x1="600" y1="400" x2="900" y2="600" stroke="#D4A857" stroke-width="2" opacity="1" />

  <!-- Optional Cross-connections between satellites -->
  <line x1="300" y1="250" x2="900" y2="250" stroke="#D4A857" stroke-width="1" opacity="0.3" />
  <line x1="300" y1="250" x2="300" y2="600" stroke="#D4A857" stroke-width="1" opacity="0.3" />
  <line x1="300" y1="250" x2="900" y2="600" stroke="#D4A857" stroke-width="1" opacity="0.3" />
  <line x1="900" y1="250" x2="300" y2="600" stroke="#D4A857" stroke-width="1" opacity="0.3" />
  <line x1="900" y1="250" x2="900" y2="600" stroke="#D4A857" stroke-width="1" opacity="0.3" />
  <line x1="300" y1="600" x2="900" y2="600" stroke="#D4A857" stroke-width="1" opacity="0.3" />

  <!-- Center Card (Hub) -->
  <!-- Glow effect -->
  <rect x="395" y="275" width="410" height="250" rx="20" fill="#D4A857" opacity="0.2" />
  <rect x="390" y="270" width="420" height="260" rx="25" fill="#D4A857" opacity="0.1" />
  
  <!-- Main card -->
  <rect x="400" y="280" width="400" height="240" rx="15" fill="#2a2a4e" stroke="#D4A857" stroke-width="4" />
  
  <!-- Content -->
  <text x="600" y="320" text-anchor="middle" fill="#D4A857" font-size="28" font-weight="bold">
    束の動態性
  </text>
  <text x="600" y="350" text-anchor="middle" fill="#D4A857" font-size="24" font-weight="bold">
    ——伝統知では「束が生きている」
  </text>
  <text x="600" y="380" text-anchor="middle" fill="white" font-size="18">
    (0/10 theories)
  </text>
  <text x="600" y="410" text-anchor="middle" fill="white" font-size="20">
    <tspan x="600" dy="0">"10の理論・概念を横断して最も顕著に現れるパターンは、</tspan>
    <tspan x="600" dy="25">束が固定的到達点ではなく動的に更新される構造です"</tspan>
  </text>

  <!-- Satellite Cards -->
  <!-- Satellite 1 (Top-left) -->
  <rect x="145" y="155" width="310" height="190" rx="15" fill="#4a90e2" opacity="0.2" />
  <rect x="150" y="160" width="300" height="180" rx="10" fill="#2a2a4e" stroke="#4a90e2" stroke-width="2" />
  <text x="300" y="190" text-anchor="middle" fill="#4a90e2" font-size="20" font-weight="bold">
    縁の多形性
  </text>
  <text x="300" y="215" text-anchor="middle" fill="#4a90e2" font-size="18" font-weight="bold">
    ——対面的・物質的・記号的の3形態
  </text>
  <text x="300" y="240" text-anchor="middle" fill="white" font-size="14">
    (0/10 theories)
  </text>
  <text x="300" y="265" text-anchor="middle" fill="white" font-size="16">
    <tspan x="300" dy="0">"伝統知の10の理論・概念を分析した結果、</tspan>
    <tspan x="300" dy="20">「縁」の多形性が確認されました。"</tspan>
  </text>
  <text x="300" y="310" text-anchor="middle" fill="#cccccc" font-size="14">
    Found in: 該当なし
  </text>

  <!-- Satellite 2 (Top-right) -->
  <rect x="745" y="155" width="310" height="190" rx="15" fill="#e24a4a" opacity="0.2" />
  <rect x="750" y="160" width="300" height="180" rx="10" fill="#2a2a4e" stroke="#e24a4a" stroke-width="2" />
  <text x="900" y="190" text-anchor="middle" fill="#e24a4a" font-size="20" font-weight="bold">
    反復としての創造
  </text>
  <text x="900" y="215" text-anchor="middle" fill="#e24a4a" font-size="18" font-weight="bold">
    ——線形モデルの超克
  </text>
  <text x="900" y="240" text-anchor="middle" fill="white" font-size="14">
    (0/10 theories)
  </text>
  <text x="900" y="265" text-anchor="middle" fill="white" font-size="16">
    <tspan x="900" dy="0">"10の理論・概念に共通するのは、</tspan>
    <tspan x="900" dy="20">「創造」が反復のプロセスとして捉えられる点です。"</tspan>
  </text>
  <text x="900" y="310" text-anchor="middle" fill="#cccccc" font-size="14">
    Found in: 該当なし
  </text>

  <!-- Satellite 3 (Bottom-left) -->
  <rect x="145" y="505" width="310" height="190" rx="15" fill="#50e3c2" opacity="0.2" />
  <rect x="150" y="510" width="300" height="180" rx="10" fill="#2a2a4e" stroke="#50e3c2" stroke-width="2" />
  <text x="300" y="540" text-anchor="middle" fill="#50e3c2" font-size="20" font-weight="bold">
    場の前提性
  </text>
  <text x="300" y="565" text-anchor="middle" fill="#50e3c2" font-size="18" font-weight="bold">
    ——場は段階か基盤か
  </text>
  <text x="300" y="590" text-anchor="middle" fill="white" font-size="14">
    (1/10 theories)
  </text>
  <text x="300" y="615" text-anchor="middle" fill="white" font-size="16">
    <tspan x="300" dy="0">"TEK・LPP・里山・メーティスで共通して確認されるパターンとして、</tspan>
    <tspan x="300" dy="20">場は他の段階の「前に来る段階」または基盤として機能します。"</tspan>
  </text>
  <text x="300" y="660" text-anchor="middle" fill="#cccccc" font-size="14">
    Found in: TEK, LPP, 里山, メーティス
  </text>

  <!-- Satellite 4 (Bottom-right) -->
  <rect x="745" y="505" width="310" height="190" rx="15" fill="#b34ae2" opacity="0.2" />
  <rect x="750" y="510" width="300" height="180" rx="10" fill="#2a2a4e" stroke="#b34ae2" stroke-width="2" />
  <text x="900" y="540" text-anchor="middle" fill="#b34ae2" font-size="20" font-weight="bold">
    身体性の不可欠性
  </text>
  <text x="900" y="565" text-anchor="middle" fill="#b34ae2" font-size="18" font-weight="bold">
    ——伝統知は「身体を経由する知」
  </text>
  <text x="900" y="590" text-anchor="middle" fill="white" font-size="14">
    (0/10 theories)
  </text>
  <text x="900" y="615" text-anchor="middle" fill="white" font-size="16">
    <tspan x="900" dy="0">"伝統知の多くの理論・概念では、</tspan>
    <tspan x="900" dy="20">知の生成・伝承が身体を経由することが確認されます"</tspan>
  </text>
  <text x="900" y="660" text-anchor="middle" fill="#cccccc" font-size="14">
    Found in: 該当なし
  </text>

  <!-- Key Finding Callout -->
  <rect x="350" y="720" width="500" height="50" rx="25" fill="#D4A857" opacity="0.9" stroke="white" stroke-width="1" />
  <text x="600" y="750" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">
    伝統知・技芸で最も顕著な発見 = 束の動態性——伝統知では「束が生きている」
  </text>

</svg>