    <rect x="430" y="710" width="180" height="55" fill="#5B8DB8" opacity="1.0" rx="5" ry="5"/>
    <text x="520" y="742" fill="#ffffff" text-anchor="middle">波</text>
    <rect x="620" y="710" width="180" height="55" fill="#D4A857" opacity="1.0" rx="5" ry="5"/>
    <text x="710" y="742" fill="#ffffff" text-anchor="middle">縁</text>
    <rect x="810" y="710" width="180" height="55" fill="#C45B4D" opacity="1.0" rx="5" ry="5"/>
