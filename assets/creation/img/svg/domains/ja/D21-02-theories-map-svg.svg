<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="sans-serif">
  <!-- Background -->
  <rect x="0" y="0" width="1200" height="900" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="600" y="60" font-size="36" fill="#ffffff" text-anchor="middle">10経済学理論と5段階モデルの対応関係マトリクス</text>

  <!-- Stage Colors -->
  <!-- 場: #8B8682 -->
  <!-- 波: #5B8DB8 -->
  <!-- 縁: #D4A857 -->
  <!-- 渦: #C45B4D -->
  <!-- 束: #5B8B6A -->

  <!-- Column Headers -->
  <g font-size="20" fill="#ffffff" text-anchor="middle">
    <rect x="240" y="120" width="180" height="50" fill="#8B8682" rx="5" ry="5"/>
    <text x="330" y="152">場 (Field)</text>
