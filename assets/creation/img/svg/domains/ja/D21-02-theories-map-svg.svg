    <rect x="430" y="775" width="180" height="55" fill="#5B8DB8" opacity="0.2" rx="5" ry="5"/>
    <text x="520" y="807" fill="#888888" text-anchor="middle">-</text>
    <rect x="620" y="775" width="180" height="55" fill="#D4A857" opacity="0.2" rx="5" ry="5"/>
    <text x="710" y="807" fill="#888888" text-anchor="middle">-</text>
    <rect x="810" y="775" width="180" height="55" fill="#C45B4D" opacity="0.2" rx="5" ry="5"/>
