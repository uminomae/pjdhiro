    <text x="900" y="677" fill="#888888" text-anchor="middle">-</text>
    <rect x="1000" y="645" width="180" height="55" fill="#5B8B6A" opacity="0.2" rx="5" ry="5"/>
    <text x="1090" y="677" fill="#888888" text-anchor="middle">-</text>

