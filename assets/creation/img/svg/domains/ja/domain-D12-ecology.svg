<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowD12" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
</defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8" rx="8"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#E0DDD8" stroke-width="1" rx="6"/>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24px" fill="#2C2C2C" font-weight="bold">D12 農学・生態学 — 5段階モデルとの構造対応図</text>

  <!-- Stage boxes -->
  <rect x="45" y="100" width="120" height="70" rx="10" fill="#8B8682"/>
  <text x="105" y="128" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">場（Field）</text>
  <text x="105" y="148" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#FAFAF8">撹乱後の初期条件</text>

  <rect x="195" y="100" width="120" height="70" rx="10" fill="#5B8DB8"/>
  <text x="255" y="128" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">波（Wave）</text>
  <text x="255" y="148" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#FAFAF8">揺らぎと不安定化</text>

  <rect x="345" y="100" width="120" height="70" rx="10" fill="#D4A857"/>
  <text x="405" y="128" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">縁（Edge）</text>
  <text x="405" y="148" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#FAFAF8">閾値・境界・関係</text>

  <rect x="495" y="100" width="120" height="70" rx="10" fill="#C45B4D"/>
  <text x="555" y="128" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">渦（Vortex）</text>
  <text x="555" y="148" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#FAFAF8">自己組織化</text>

  <rect x="645" y="100" width="120" height="70" rx="10" fill="#5B8B6A"/>
  <text x="705" y="128" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">束（Bundle）</text>
  <text x="705" y="148" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11px" fill="#FAFAF8">安定構造の持続</text>

  <!-- Arrows -->
  <line x1="165" y1="135" x2="193" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD12)"/>
  <line x1="315" y1="135" x2="343" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD12)"/>
  <line x1="465" y1="135" x2="493" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD12)"/>
  <line x1="615" y1="135" x2="643" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD12)"/>

  <!-- Concepts -->
  <!-- Field -->
  <line x1="105" y1="170" x2="105" y2="195" stroke="#8B8682" stroke-width="2"/>
  <rect x="40" y="195" width="130" height="90" rx="6" fill="none" stroke="#8B8682" stroke-width="1.5"/>
  <text x="105" y="215" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">撹乱後の裸地</text>
  <text x="105" y="235" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">外部条件（栄養塩等）</text>
  <text x="105" y="255" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">物質循環の背景場</text>

  <!-- Wave -->
  <line x1="255" y1="170" x2="255" y2="195" stroke="#5B8DB8" stroke-width="2"/>
  <rect x="190" y="195" width="130" height="90" rx="6" fill="none" stroke="#5B8DB8" stroke-width="1.5"/>
  <text x="255" y="215" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">先駆種の侵入</text>
  <text x="255" y="235" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">条件変動・撹乱</text>
  <text x="255" y="255" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">資源競争の顕在化</text>

  <!-- Edge -->
  <line x1="405" y1="170" x2="405" y2="195" stroke="#D4A857" stroke-width="2"/>
  <rect x="340" y="195" width="130" height="90" rx="6" fill="none" stroke="#D4A857" stroke-width="1.5"/>
  <text x="405" y="215" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">種間相互作用</text>
  <text x="405" y="235" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">閾値（tipping point）</text>
  <text x="405" y="255" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">エコトーン（境界）</text>

  <!-- Vortex -->
  <line x1="555" y1="170" x2="555" y2="195" stroke="#C45B4D" stroke-width="2"/>
  <rect x="490" y="195" width="130" height="90" rx="6" fill="none" stroke="#C45B4D" stroke-width="1.5"/>
  <text x="555" y="215" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">群集パターン形成</text>
  <text x="555" y="235" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">自己強化フィードバック</text>
  <text x="555" y="255" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">植生の自己組織化</text>

  <!-- Bundle -->
  <line x1="705" y1="170" x2="705" y2="195" stroke="#5B8B6A" stroke-width="2"/>
  <rect x="640" y="195" width="130" height="90" rx="6" fill="none" stroke="#5B8B6A" stroke-width="1.5"/>
  <text x="705" y="215" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">極相群集</text>
  <text x="705" y="235" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">安定状態の維持</text>
  <text x="705" y="255" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C">管理制度（IPM等）</text>

  <!-- Correspondence legend -->
  <text x="400" y="325" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14px" fill="#2C2C2C" font-weight="bold">対応の強さ（理論別）</text>

  <line x1="60" y1="348" x2="100" y2="348" stroke="#2C2C2C" stroke-width="2"/>
  <text x="108" y="352"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">強い対応</text>
  <line x1="240" y1="348" x2="280" y2="348" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="288" y="352"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">部分的対応</text>
  <line x1="440" y1="348" x2="480" y2="348" stroke="#D0D0D0" stroke-width="2" stroke-dasharray="2,3"/>
  <text x="488" y="352"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">条件付き対応</text>

  <!-- Theory rows -->
  <rect x="45" y="370" width="710" height="185" rx="6" fill="none" stroke="#E0DDD8" stroke-width="1"/>

  <text x="60" y="395"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C" font-weight="bold">確定に近い:</text>
  <line x1="60" y1="405" x2="740" y2="405" stroke="#2C2C2C" stroke-width="2"/>
  <text x="60" y="420"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">生態遷移、レジームシフト、IPM/経済閾値、景観コネクティビティ、乾燥地植生自己組織化</text>

  <text x="60" y="445"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C" font-weight="bold">有力:</text>
  <line x1="60" y1="455" x2="740" y2="455" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="60" y="470"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">農地窒素循環、エコトーン、植物-土壌フィードバック、状態-遷移モデル（STMs）</text>

  <text x="60" y="495"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#2C2C2C" font-weight="bold">条件付き:</text>
  <line x1="60" y1="505" x2="740" y2="505" stroke="#D0D0D0" stroke-width="2" stroke-dasharray="2,3"/>
  <text x="60" y="520"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">生態系エンジニアリング</text>

  <!-- Overall summary -->
  <text x="400" y="545" text-anchor="middle"  font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12px" fill="#666666">特徴: 「縁」が3つの型（閾値/境界/関係）で揃う。束→場の循環（撹乱→回復）が本質的構造。</text>
</svg>
