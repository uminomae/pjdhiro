  <line x1="625" y1="120" x2="645" y2="120" stroke="#666666" stroke-width="2" marker-end="url(#arrow25)" />

  
  <line x1="110" y1="150" x2="110" y2="175" stroke="#8B8682" stroke-width="2" stroke-dasharray="2,3" />
  <rect x="40" y="175" width="140" height="110" rx="6" fill="#FAFAF8" stroke="#8B8682" stroke-width="1.5" stroke-dasharray="2,3" />
  <text x="110" y="195" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">raw raw materials</text>
  <text x="110" y="215" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">existing social structure</text>
  <text x="110" y="235" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">habitus</text>
  <text x="110" y="260" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#666666">(Leroi-Gourhan/Bourdieu)</text>

  
  <line x1="260" y1="150" x2="260" y2="175" stroke="#5B8DB8" stroke-width="2" />
  <rect x="190" y="175" width="140" height="110" rx="6" fill="#FAFAF8" stroke="#5B8DB8" stroke-width="1.5" />
  <text x="260" y="195" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">breaking the norm</text>
  <text x="260" y="215" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Separation (peel off)</text>
  <text x="260" y="235" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Boundary violation (filth)</text>
  <text x="260" y="260" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#666666">(Turner/van Gennep/Douglas)</text>

  
  <line x1="410" y1="150" x2="410" y2="175" stroke="#D4A857" stroke-width="2" />
  <rect x="340" y="175" width="140" height="110" rx="6" fill="#FAFAF8" stroke="#D4A857" stroke-width="2" />
  <text x="410" y="195" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">liminality</text>
  <text x="410" y="215" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Corrective action/gift contact point</text>
  <text x="410" y="235" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Maintaining ethnic boundaries</text>
  <text x="410" y="260" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#666666">(Turner/Mauss/Barth)</text>

  
  <line x1="560" y1="150" x2="560" y2="175" stroke="#C45B4D" stroke-width="2" />
  <rect x="490" y="175" width="140" height="110" rx="6" fill="#FAFAF8" stroke="#C45B4D" stroke-width="1.5" />
  <text x="560" y="195" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Communitas established</text>
  <text x="560" y="215" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Reunification (or division)</text>
  <text x="560" y="235" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">formation of artifacts</text>
  <text x="560" y="260" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#666666">(Turner/Leroi-Gourhan)</text>

  
  <line x1="710" y1="150" x2="710" y2="175" stroke="#5B8B6A" stroke-width="2" stroke-dasharray="6,3" />
  <rect x="640" y="175" width="140" height="110" rx="6" fill="#FAFAF8" stroke="#5B8B6A" stroke-width="1.5" stroke-dasharray="6,3" />
  <text x="710" y="195" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Institutionalization of exchange system</text>
  <text x="710" y="215" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Taboos/purification rituals</text>
  <text x="710" y="235" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Technique tradition system</text>
  <text x="710" y="260" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#666666">(Mauss/Douglas/Lemonnier)</text>

  
  <rect x="40" y="310" width="720" height="100" rx="8" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1" />
  <text x="60" y="335" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#2C2C2C" font-weight="bold">Strength of response</text>
  <line x1="60" y1="355" x2="100" y2="355" stroke="#2C2C2C" stroke-width="2" />
  <text x="110" y="360" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">strong response</text>
  <line x1="240" y1="355" x2="280" y2="355" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="6,3" />
  <text x="290" y="360" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Partial response</text>
  <line x1="420" y1="355" x2="460" y2="355" stroke="#D0D0D0" stroke-width="2" stroke-dasharray="2,3" />
  <text x="470" y="360" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#666666">conditional response</text>

  <text x="60" y="390" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">4 that are almost confirmed: van Gennep, Turner (social drama), Turner (liminality), Douglas</text>
  <text x="60" y="400" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">Top 5: Barth, Mauss, Leroi-Gourhan, Lamont &amp; Molnar, Giddens/Bourdieu / Conditional: Pratt</text>

  
  <rect x="40" y="430" width="720" height="140" rx="8" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1" />
  <text x="60" y="455" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#2C2C2C" font-weight="bold">Overall evaluation summary</text>
  <text x="60" y="480" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Structural correspondence was confirmed in 9 out of 10 theories. Overwhelmingly dense as a ``edge study.''</text>
  <text x="60" y="500" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Eight faces on the edge: band type/mediation type/ambiguous type/transgression type/persistence type/exchange type/production type/two-layer type.</text>
  <text x="60" y="520" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Bifurcations of failure are inherent in theory: The ``splitting'' of social drama shows a path that does not lead to a vortex.</text>
  <text x="60" y="540" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">The correspondence to fields and bundles is relatively weak (the flip side of academic studies that focus on boundaries).</text>
  <text x="60" y="560" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Operation chain and structuring theory partially compensate for the weakness of fields and bundles.</text>
</svg>