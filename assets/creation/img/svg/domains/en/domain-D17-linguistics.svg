  <text x="108" y="140" text-anchor="middle" class="stage-sub">Initial conditions for undifferentiation</text>

  
  <line x1="168" y1="127" x2="192" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead17)" />

  
  <rect x="196" y="95" width="120" height="65" rx="8" fill="#5B8DB8" />
  <text x="256" y="122" text-anchor="middle" class="stage-label">Wave</text>
  <text x="256" y="140" text-anchor="middle" class="stage-sub">divergence/competition</text>

  
  <line x1="316" y1="127" x2="340" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead17)" />

  
  <rect x="344" y="95" width="120" height="65" rx="8" fill="#D4A857" />
  <text x="404" y="122" text-anchor="middle" class="stage-label">Edge</text>
