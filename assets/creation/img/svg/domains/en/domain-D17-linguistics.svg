  <line x1="464" y1="127" x2="488" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead17)" />

  
  <rect x="492" y="95" width="120" height="65" rx="8" fill="#C45B4D" />
  <text x="552" y="122" text-anchor="middle" class="stage-label">Vortex</text>
  <text x="552" y="140" text-anchor="middle" class="stage-sub">spontaneous establishment of order</text>

  
  <line x1="612" y1="127" x2="636" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead17)" />

  
  <rect x="640" y="95" width="120" height="65" rx="8" fill="#5B8B6A" />
  <text x="700" y="122" text-anchor="middle" class="stage-label">Bundle</text>
  <text x="700" y="140" text-anchor="middle" class="stage-sub">persistent structure</text>

  
  
  <line x1="108" y1="160" x2="108" y2="185" stroke="#2C2C2C" stroke-width="2" />
  <text x="108" y="200" text-anchor="middle" class="concept">Vocabulary ambiguity</text>
  <text x="108" y="218" text-anchor="middle" class="concept">(grammaticalization)</text>
  <text x="108" y="240" text-anchor="middle" class="concept">Accumulation of use cases</text>
  <text x="108" y="258" text-anchor="middle" class="concept">(Usage-based model)</text>
  <text x="108" y="280" text-anchor="middle" class="concept">Random initial state</text>
  <text x="108" y="298" text-anchor="middle" class="concept">(iterative learning)</text>

  
  <line x1="256" y1="160" x2="256" y2="185" stroke="#2C2C2C" stroke-width="2" />
  <text x="256" y="200" text-anchor="middle" class="concept">pragmatic reasoning</text>
  <text x="256" y="218" text-anchor="middle" class="concept">(grammaticalization)</text>
  <text x="256" y="240" text-anchor="middle" class="concept">Amplification of pronunciation variation</text>
  <text x="256" y="258" text-anchor="middle" class="concept">(Labov)</text>
  <text x="256" y="280" text-anchor="middle" class="concept">intergenerational variation</text>
  <text x="256" y="298" text-anchor="middle" class="concept">(iterative learning)</text>

  
  <line x1="404" y1="160" x2="404" y2="185" stroke="#2C2C2C" stroke-width="2" />
  <text x="404" y="200" text-anchor="middle" class="concept">Functional differentiation/equipment allocation</text>
  <text x="404" y="218" text-anchor="middle" class="concept">(Nicaraguan Sign Language)</text>
  <text x="404" y="240" text-anchor="middle" class="concept">Constraint ranking</text>
  <text x="404" y="258" text-anchor="middle" class="concept">(optimality theory)</text>
  <text x="404" y="280" text-anchor="middle" class="concept">transmission bottleneck</text>
  <text x="404" y="298" text-anchor="middle" class="concept">(iterative learning)</text>

  
  <line x1="552" y1="160" x2="552" y2="185" stroke="#2C2C2C" stroke-width="2" />
  <text x="552" y="200" text-anchor="middle" class="concept">Establishment of grammatical system</text>
  <text x="552" y="218" text-anchor="middle" class="concept">(Nicaraguan Sign Language)</text>
  <text x="552" y="240" text-anchor="middle" class="concept">Emergence of combinatorial structures</text>
  <text x="552" y="258" text-anchor="middle" class="concept">(iterative learning)</text>
  <text x="552" y="280" text-anchor="middle" class="concept">Establishment of syntax</text>
  <text x="552" y="298" text-anchor="middle" class="concept">(Usage-based model)</text>

  
  <line x1="700" y1="160" x2="700" y2="185" stroke="#2C2C2C" stroke-width="2" />
  <text x="700" y="200" text-anchor="middle" class="concept">Establishment of grammar system</text>
  <text x="700" y="218" text-anchor="middle" class="concept">(grammaticalization)</text>
  <text x="700" y="240" text-anchor="middle" class="concept">Establishment of phonological system</text>
  <text x="700" y="258" text-anchor="middle" class="concept">(optimality theory)</text>
  <text x="700" y="280" text-anchor="middle" class="concept">syntax network</text>
  <text x="700" y="298" text-anchor="middle" class="concept">(Usage-based model)</text>

  
  <rect x="48" y="330" width="712" height="1" fill="#E0DDD8" />
  <text x="60" y="358" class="strength-label">Strength of response:</text>
  <line x1="150" y1="354" x2="180" y2="354" stroke="#2C2C2C" stroke-width="2" />
  <text x="185" y="358" class="strength-label">strong response</text>
  <line x1="260" y1="354" x2="290" y2="354" stroke="#666666" stroke-width="1.5" stroke-dasharray="6,4" />
  <text x="295" y="358" class="strength-label">Partial response</text>
  <line x1="380" y1="354" x2="410" y2="354" stroke="#D0D0D0" stroke-width="1" stroke-dasharray="2,3" />
  <text x="415" y="358" class="strength-label">weak response</text>

  
  <rect x="48" y="378" width="712" height="180" rx="6" fill="none" stroke="#E0DDD8" stroke-width="1" />
  <text x="68" y="402" class="summary-title">Overall response evaluation summary</text>

  <text x="68" y="428" class="summary">Degree of correspondence: Overall strong (6 out of 10 theories have strong correspondence)</text>

  <text x="68" y="454" class="summary">Strong correspondence: grammaticalization, sound change diffusion, Nicaraguan sign language, syntactic emergence, optimality theory, iterative learning models</text>

  <text x="68" y="478" class="summary">Feature 1: “Creation without intention”—grammatical structures emerge spontaneously without the speaker’s explicit intention (materialization of the vortex)</text>

  <text x="68" y="502" class="summary">Feature 2: Multiscale isomorphism — 5 stages of isomorphism are repeated through individual acquisition, community change, and historical change.</text>

  <text x="68" y="526" class="summary">Feature 3: Various implementations of “edges” — social network propagation, competition between constraints, transmission bottlenecks, etc.</text>

  <text x="68" y="550" class="summary">Feature 4: Nicaraguan Sign Language is the most direct example where all five steps can be observed in real time.</text>
</svg>