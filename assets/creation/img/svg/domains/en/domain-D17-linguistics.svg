    </style>
  </defs>

  
  <rect width="800" height="600" fill="#FAFAF8" rx="0" />
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#E0DDD8" stroke-width="1" rx="8" />

  
  <text x="400" y="60" text-anchor="middle" class="title">Linguistics (D17) — Structural correspondence diagram with the 5-stage model</text>

  
  
  <rect x="48" y="95" width="120" height="65" rx="8" fill="#8B8682" />
