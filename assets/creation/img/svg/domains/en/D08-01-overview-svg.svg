    <text x="390" y="356" text-anchor="end" fill="white" font-size="14">実行機能と認知制御</text>
    <rect x="405" y="326" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="555" y="326" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="705" y="326" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="855" y="326" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1005" y="326" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 4: 意識とグローバルワークスペース | partial | 閾値条件 -->
    <text x="390" y="408" text-anchor="end" fill="white" font-size="14">意識とグローバルワークスペース</text>
    <rect x="405" y="378" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="555" y="378" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="705" y="378" width="140" height="50" fill="#D4A857" opacity="0.3" />
    <rect x="855" y="378" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1005" y="378" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 5: 睡眠・夢と予測-誤差ループ | partial | 場,波 -->
    <text x="390" y="460" text-anchor="end" fill="white" font-size="14">睡眠・夢と予測-誤差ループ</text>
    <rect x="405" y="430" width="140" height="50" fill="#8B8682" opacity="0.7" />
    <rect x="555" y="430" width="140" height="50" fill="#5B8DB8" opacity="0.7" />
    <rect x="705" y="430" width="140" height="50" fill="#D4A857" opacity="0.3" />
    <rect x="855" y="430" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1005" y="430" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 6: ポリヴェーガル理論 | strong | 場,縁 -->
    <text x="390" y="512" text-anchor="end" fill="white" font-size="14">ポリヴェーガル理論</text>
    <rect x="405" y="482" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="555" y="482" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="705" y="482" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="855" y="482" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1005" y="482" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 7: 身体化された認知・エナクティヴィズム | strong | 全段階 -->
    <text x="390" y="564" text-anchor="end" fill="white" font-size="14">身体化された認知・エナクティヴィズム</text>
    <rect x="405" y="534" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="555" y="534" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="705" y="534" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="855" y="534" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="1005" y="534" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 8: シナプス可塑性・STDP | strong | 縁 -->
    <text x="390" y="616" text-anchor="end" fill="white" font-size="14">シナプス可塑性・STDP</text>
    <rect x="405" y="586" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="555" y="586" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="705" y="586" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="855" y="586" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1005" y="586" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 9: θ-γカップリングとコヒーレンス通信 | strong | 波,縁 -->
    <text x="390" y="668" text-anchor="end" fill="white" font-size="14">θ-γカップリングとコヒーレンス通信</text>
    <rect x="405" y="638" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="555" y="638" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="705" y="638" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="855" y="638" width="140" height="50" fill="#C45B4D" opacity="0.3" />
    <rect x="1005" y="638" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 10: 神経雪崩とクリティカリティ | conditional | 場 -->
    <text x="390" y="720" text-anchor="end" fill="white" font-size="14">神経雪崩とクリティカリティ</text>
    <rect x="405" y="690" width="140" height="50" fill="#8B8682" opacity="0.4" />
    <rect x="555" y="690" width="140" height="50" fill="#5B8DB8" opacity="0.2" />
    <rect x="705" y="690" width="140" height="50" fill="#D4A857" opacity="0.2" />
    <rect x="855" y="690" width="140" height="50" fill="#C45B4D" opacity="0.2" />
    <rect x="1005" y="690" width="140" height="50" fill="#5B8B6A" opacity="0.2" />
  </g>

  <!-- Bottom Bar -->
  <rect x="50" y="750" width="1100" height="40" rx="20" fill="#2C3E50" stroke="#cccccc" />
  <g fill="white" font-size="16">
    <!-- 強い対応 -->
    <rect x="370" y="764" width="15" height="15" fill="#27AE60" />
    <text x="395" y="776" text-anchor="start">強い対応: 8件</text>
    <!-- 部分的対応 -->
    <rect x="540" y="764" width="15" height="15" fill="#F1C40F" />
    <text x="565" y="776" text-anchor="start">部分的対応: 2件</text>
    <!-- 条件付き -->
    <rect x="710" y="764" width="15" height="15" fill="#E67E22" />
    <text x="735" y="776" text-anchor="start">条件付き: 1件</text>
  </g>
</svg>
