<svg viewBox="0 0 1200 800" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="phaseGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2C3E50" />
      <stop offset="100%" stop-color="#34495E" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title Section -->
  <text x="600" y="60" text-anchor="middle" fill="white" font-size="36" font-weight="bold">D08 神経科学 — 5段階モデルとの構造対応調査</text>
  <text x="600" y="95" text-anchor="middle" fill="#cccccc" font-size="20">11理論の横断的分析</text>

  <!-- Left Column: Research Methodology Flow -->
  <g>
    <!-- Phase 1-2 -->
    <rect x="45" y="155" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="160" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" />
    <text x="200" y="196" text-anchor="middle" fill="white" font-size="18">Phase 1-2: 文献確認・理論選定</text>
    <path d="M 200 220 L 200 240 M 190 230 L 200 240 L 210 230" stroke="#F39C12" stroke-width="4" fill="none" />

    <!-- Phase 3-4 -->
    <rect x="45" y="255" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="260" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" />
    <text x="200" y="296" text-anchor="middle" fill="white" font-size="18">Phase 3-4: 構造対応の判定</text>
    <path d="M 200 320 L 200 340 M 190 330 L 200 340 L 210 330" stroke="#F39C12" stroke-width="4" fill="none" />

    <!-- Phase 5 -->
    <rect x="45" y="355" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="360" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" />
    <text x="200" y="396" text-anchor="middle" fill="white" font-size="18">Phase 5: 論拠監査</text>
    <path d="M 200 420 L 200 440 M 190 430 L 200 440 L 210 430" stroke="#F39C12" stroke-width="4" fill="none" />

    <!-- Phase 6 -->
    <rect x="45" y="455" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="460" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" />
    <text x="200" y="496" text-anchor="middle" fill="white" font-size="18">Phase 6: 構造再読（4軸再評価）</text>
    <path d="M 200 520 L 200 540 M 190 530 L 200 540 L 210 530" stroke="#F39C12" stroke-width="4" fill="none" />

    <!-- Phase 7 -->
    <rect x="45" y="555" width="310" height="70" rx="10" fill="#4A90E2" opacity="0.2" />
    <rect x="50" y="560" width="300" height="60" rx="10" fill="url(#phaseGradient)" stroke="#cccccc" />
    <text x="200" y="596" text-anchor="middle" fill="white" font-size="18">Phase 7: 横断統合</text>
  </g>

  <!-- Right Section: Theory Correspondence Heat Map -->
  <g>
    <!-- Column Headers -->
    <rect x="405" y="130" width="140" height="30" rx="5" fill="#8B8682" />
    <text x="475" y="151" text-anchor="middle" fill="white" font-size="16" font-weight="bold">場</text>
    <rect x="555" y="130" width="140" height="30" rx="5" fill="#5B8DB8" />
    <text x="625" y="151" text-anchor="middle" fill="white" font-size="16" font-weight="bold">波</text>
    <rect x="705" y="130" width="140" height="30" rx="5" fill="#D4A857" />
    <text x="775" y="151" text-anchor="middle" fill="white" font-size="16" font-weight="bold">縁</text>
    <rect x="855" y="130" width="140" height="30" rx="5" fill="#C45B4D" />
    <text x="925" y="151" text-anchor="middle" fill="white" font-size="16" font-weight="bold">渦</text>
    <rect x="1005" y="130" width="140" height="30" rx="5" fill="#5B8B6A" />
    <text x="1075" y="151" text-anchor="middle" fill="white" font-size="16" font-weight="bold">束</text>

    <!-- Row 0: 予測符号化・自由エネルギー原理 | strong | 全段階 -->
    <text x="390" y="200" text-anchor="end" fill="white" font-size="14">予測符号化・自由エネルギー原理</text>
    <rect x="405" y="170" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="555" y="170" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="705" y="170" width="140" height="50" fill="#D4A857" opacity="1.0" />
    <rect x="855" y="170" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="1005" y="170" width="140" height="50" fill="#5B8B6A" opacity="1.0" />

    <!-- Row 1: 内受容感覚と内受容的推論 | strong | 場,波,渦 -->
    <text x="390" y="252" text-anchor="end" fill="white" font-size="14">内受容感覚と内受容的推論</text>
    <rect x="405" y="222" width="140" height="50" fill="#8B8682" opacity="1.0" />
    <rect x="555" y="222" width="140" height="50" fill="#5B8DB8" opacity="1.0" />
    <rect x="705" y="222" width="140" height="50" fill="#D4A857" opacity="0.3" />
    <rect x="855" y="222" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="1005" y="222" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

    <!-- Row 2: 情動の構成理論 | strong | 渦 -->
    <text x="390" y="304" text-anchor="end" fill="white" font-size="14">情動の構成理論</text>
    <rect x="405" y="274" width="140" height="50" fill="#8B8682" opacity="0.3" />
    <rect x="555" y="274" width="140" height="50" fill="#5B8DB8" opacity="0.3" />
    <rect x="705" y="274" width="140" height="50" fill="#D4A857" opacity="0.3" />
    <rect x="855" y="274" width="140" height="50" fill="#C45B4D" opacity="1.0" />
    <rect x="1005" y="274" width="140" height="50" fill="#5B8B6A" opacity="0.3" />

