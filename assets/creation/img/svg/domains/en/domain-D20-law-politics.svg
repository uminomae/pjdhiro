  <text x="68" y="454"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Strong response: Ostrom shared resource governance, Habermas deliberative democracy, Rawls theory of justice, Hart first/second order rules, constitutional process</text>

  <text x="68" y="478"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Feature 1: “edge” is extremely specific as a procedural design — Ostrom’s eight principles, Habermas discussion conditions, Rawls reflective equilibrium</text>

  <text x="68" y="502"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Characteristic 2: Active theme of “place” as a crisis of legitimacy — theory of constitutional power, transitional justice</text>

  <text x="68" y="526"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Feature 3: Explicit bundle → field cycle — Easton feedback cycle, old bundle → collapse → new bundle of transitional justice</text>

  <text x="68" y="550"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Conditional: Kingdon policy window (emphasizes the temporality and contingency of edges, different from stable edges)</text>
