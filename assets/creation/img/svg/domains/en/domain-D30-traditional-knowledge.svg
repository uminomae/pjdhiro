  <text x="560" y="235" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Crystallization of Metis</text>
  <text x="560" y="260" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#666666">(Scott/Asahi Shuzo)</text>

  
  <line x1="710" y1="150" x2="710" y2="175" stroke="#5B8B6A" stroke-width="2" />
  <rect x="640" y="175" width="140" height="110" rx="6" fill="#FAFAF8" stroke="#5B8B6A" stroke-width="2" />
