  <text x="470" y="360" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#666666">weak response</text>

  <text x="60" y="390" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">4 strong responses: TEK, establishment of a troupe, handing down master brewer skills, satoyama landscape</text>
  <text x="60" y="400" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">Conditional: Tradition of folk performing arts (lack of documentary support)</text>

  
  <rect x="40" y="430" width="720" height="140" rx="8" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1" />
  <text x="60" y="455" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#2C2C2C" font-weight="bold">Overall evaluation summary</text>
  <text x="60" y="480" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">9 out of 10 theories correspond to structure. The basic structure is "generation in repetition."</text>
  <text x="60" y="500" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">The bundle is not a fixed destination, but a dynamic structure open to the environment FB. This shows the dynamics of the bundle most clearly.</text>
  <text x="60" y="520" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Relationships are established not within individuals, but between them: person-to-person, person-to-material, person-to-environment.</text>
  <text x="60" y="540" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Edge typology: Silence/Relationship type — “Silence constitutes the edge.” Orthodoxy is a condition for establishing ties.</text>
  <text x="60" y="560" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Strongly connected to the recirculation theme: Bun → field spirals are confirmed in all of TEK/oral tradition/shuhaari.</text>
</svg>