<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead16" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666" />
    </marker>
    <style>
      .title { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 24px; fill: #2C2C2C; font-weight: 600; }
      .stage-label { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 14px; fill: #FAFAF8; font-weight: 600; }
      .stage-sub { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 11px; fill: #FAFAF8; }
      .concept { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 12px; fill: #2C2C2C; }
      .summary-title { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 14px; fill: #2C2C2C; font-weight: 600; }
      .summary { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 12px; fill: #666666; }
      .strength-label { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 11px; fill: #666666; }
    </style>
  </defs>

  
  <rect width="800" height="600" fill="#FAFAF8" rx="0" />
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#E0DDD8" stroke-width="1" rx="8" />

  
  <text x="400" y="60" text-anchor="middle" class="title">History (D16) — Structural correspondence diagram with the 5-stage model</text>

  
  
  <rect x="48" y="95" width="120" height="65" rx="8" fill="#8B8682" />
  <text x="108" y="122" text-anchor="middle" class="stage-label">Field</text>
  <text x="108" y="140" text-anchor="middle" class="stage-sub">Initial conditions for undifferentiation</text>

  
  <line x1="168" y1="127" x2="192" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead16)" />

  
  <rect x="196" y="95" width="120" height="65" rx="8" fill="#5B8DB8" />
  <text x="256" y="122" text-anchor="middle" class="stage-label">Wave</text>
  <text x="256" y="140" text-anchor="middle" class="stage-sub">divergence/competition</text>

  
  <line x1="316" y1="127" x2="340" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead16)" />

  
  <rect x="344" y="95" width="120" height="65" rx="8" fill="#D4A857" />
  <text x="404" y="122" text-anchor="middle" class="stage-label">Edge</text>
  <text x="404" y="140" text-anchor="middle" class="stage-sub">Organization of tension/relationships</text>

  
  <line x1="464" y1="127" x2="488" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead16)" />

  
  <rect x="492" y="95" width="120" height="65" rx="8" fill="#C45B4D" />
  <text x="552" y="122" text-anchor="middle" class="stage-label">Vortex</text>
  <text x="552" y="140" text-anchor="middle" class="stage-sub">spontaneous establishment of order</text>

  
  <line x1="612" y1="127" x2="636" y2="127" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead16)" />

  
  <rect x="640" y="95" width="120" height="65" rx="8" fill="#5B8B6A" />
  <text x="700" y="122" text-anchor="middle" class="stage-label">Bundle</text>
  <text x="700" y="140" text-anchor="middle" class="stage-sub">persistent structure</text>

  
  
  <line x1="108" y1="160" x2="108" y2="185" stroke="#D0D0D0" stroke-width="1" stroke-dasharray="2,3" />
  <text x="108" y="200" text-anchor="middle" class="concept">Foundation for long-term sustainability</text>
  <text x="108" y="218" text-anchor="middle" class="concept">(Braudel)</text>
  <text x="108" y="240" text-anchor="middle" class="concept">experience space</text>
  <text x="108" y="258" text-anchor="middle" class="concept">(Koselleck)</text>
  <text x="108" y="280" text-anchor="middle" class="concept">origin of circulation</text>
  <text x="108" y="298" text-anchor="middle" class="concept">(Vico)</text>

  
  <line x1="256" y1="160" x2="256" y2="185" stroke="#666666" stroke-width="1.5" stroke-dasharray="6,4" />
  <text x="256" y="200" text-anchor="middle" class="concept">Challenge arises</text>
  <text x="256" y="218" text-anchor="middle" class="concept">(Toynbee)</text>
  <text x="256" y="240" text-anchor="middle" class="concept">Discrepancy between experience and expectations</text>
  <text x="256" y="258" text-anchor="middle" class="concept">(Koselleck)</text>
  <text x="256" y="280" text-anchor="middle" class="concept">increasing population pressure</text>
  <text x="256" y="298" text-anchor="middle" class="concept">(Turchin)</text>

  
  <line x1="404" y1="160" x2="404" y2="185" stroke="#2C2C2C" stroke-width="2" />
  <text x="404" y="200" text-anchor="middle" class="concept">critical·</text>
  <text x="404" y="218" text-anchor="middle" class="concept">juncture</text>
  <text x="404" y="240" text-anchor="middle" class="concept">aggregation integration</text>
  <text x="404" y="258" text-anchor="middle" class="concept">(Ibn Khaldun)</text>
  <text x="404" y="280" text-anchor="middle" class="concept">technology-society junction</text>
  <text x="404" y="298" text-anchor="middle" class="concept">(Hughes)</text>

  
  <line x1="552" y1="160" x2="552" y2="185" stroke="#2C2C2C" stroke-width="2" />
  <text x="552" y="200" text-anchor="middle" class="concept">self-reinforcing actuation</text>
  <text x="552" y="218" text-anchor="middle" class="concept">(route dependent)</text>
  <text x="552" y="240" text-anchor="middle" class="concept">dynasty expansion</text>
  <text x="552" y="258" text-anchor="middle" class="concept">(Ibn Khaldun)</text>
  <text x="552" y="280" text-anchor="middle" class="concept">system growth</text>
  <text x="552" y="298" text-anchor="middle" class="concept">(Hughes)</text>

  
  <line x1="700" y1="160" x2="700" y2="185" stroke="#2C2C2C" stroke-width="2" />
  <text x="700" y="200" text-anchor="middle" class="concept">lock in</text>
  <text x="700" y="218" text-anchor="middle" class="concept">(route dependent)</text>
  <text x="700" y="240" text-anchor="middle" class="concept">momentum</text>
  <text x="700" y="258" text-anchor="middle" class="concept">(Hughes)</text>
  <text x="700" y="280" text-anchor="middle" class="concept">Bundle → Field circulation</text>
  <text x="700" y="298" text-anchor="middle" class="concept">(Ibn Khaldun, Vico)</text>

  
  <rect x="48" y="330" width="712" height="1" fill="#E0DDD8" />
  <text x="60" y="358" class="strength-label">Strength of response:</text>
  <line x1="150" y1="354" x2="180" y2="354" stroke="#2C2C2C" stroke-width="2" />
  <text x="185" y="358" class="strength-label">strong response</text>
  <line x1="260" y1="354" x2="290" y2="354" stroke="#666666" stroke-width="1.5" stroke-dasharray="6,4" />
  <text x="295" y="358" class="strength-label">Partial response</text>
  <line x1="380" y1="354" x2="410" y2="354" stroke="#D0D0D0" stroke-width="1" stroke-dasharray="2,3" />
  <text x="415" y="358" class="strength-label">weak response</text>

  
  <rect x="48" y="378" width="712" height="180" rx="6" fill="none" stroke="#E0DDD8" stroke-width="1" />
  <text x="68" y="402" class="summary-title">Overall response evaluation summary</text>

  <text x="68" y="428" class="summary">Correspondence: Moderate to high (large difference depending on theory)</text>

  <text x="68" y="454" class="summary">Strong correspondence: path dependence (edge-vortex-bundle), Ibn Khaldun (edge-vortex-bundle → field circulation), Hughes (all 5 steps), Turchin (edge-bundle → field circulation)</text>

  <text x="68" y="478" class="summary">Feature 1: Polymorphism of the “edge” — 10 different types of edges in 10 theories (branching type, integrated type, mating type, threshold type, etc.)</text>

  <text x="68" y="502" class="summary">Characteristic 2: Circularity, which incorporates “bundle → return to field” in theory, is a notable feature of historical studies.</text>

  <text x="68" y="526" class="summary">Characteristic 3: The correspondence with “place” is weak overall — history studies have difficulty fully focusing on “before”</text>

  <text x="68" y="550" class="summary">Feature 4: “Success → destabilization” pattern (Ibn Khaldun, Turchin, Vico) is common as the collapse mechanism of bundles</text>
</svg>