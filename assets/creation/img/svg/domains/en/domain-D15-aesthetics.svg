<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowD15" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666" />
    </marker>
</defs>

  
  <rect width="800" height="600" fill="#FAFAF8" rx="8" />
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#E0DDD8" stroke-width="1" rx="6" />

  
  <text x="400" y="60" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="24px" fill="#2C2C2C" font-weight="bold">D15 Aesthetics — Structural correspondence diagram with the 5-stage model</text>

  
  <rect x="45" y="100" width="120" height="70" rx="10" fill="#8B8682" />
  <text x="105" y="128" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">Field</text>
  <text x="105" y="148" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">Opening up aesthetic possibilities</text>

  <rect x="195" y="100" width="120" height="70" rx="10" fill="#5B8DB8" />
