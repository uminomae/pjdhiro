  <text x="255" y="148" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">Creating tension and conflict</text>

  <rect x="345" y="100" width="120" height="70" rx="10" fill="#D4A857" />
  <text x="405" y="128" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">Edge</text>
  <text x="405" y="148" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">Coexistence and joining of conflicts</text>

  <rect x="495" y="100" width="120" height="70" rx="10" fill="#C45B4D" />
  <text x="555" y="128" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">Vortex</text>
  <text x="555" y="148" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">Spontaneous formation of form</text>

  <rect x="645" y="100" width="120" height="70" rx="10" fill="#5B8B6A" />
  <text x="705" y="128" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14px" fill="#FAFAF8" font-weight="bold">Bundle</text>
  <text x="705" y="148" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11px" fill="#FAFAF8">Complete without closing</text>

  
  <line x1="165" y1="135" x2="193" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD15)" />
  <line x1="315" y1="135" x2="343" y2="135" stroke="#666666" stroke-width="2" marker-end="url(#arrowD15)" />
