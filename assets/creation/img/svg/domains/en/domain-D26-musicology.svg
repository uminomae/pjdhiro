  <rect x="40" y="310" width="720" height="110" rx="8" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1" />
  <text x="60" y="335" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#2C2C2C" font-weight="bold">Strength of response</text>

  <line x1="60" y1="355" x2="100" y2="355" stroke="#2C2C2C" stroke-width="2" />
  <text x="110" y="360" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Strong correspondence (solid)</text>

  <line x1="280" y1="355" x2="320" y2="355" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="6,3" />
  <text x="330" y="360" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Partial correspondence (dashed)</text>

  <line x1="510" y1="355" x2="550" y2="355" stroke="#D0D0D0" stroke-width="2" stroke-dasharray="2,3" />
  <text x="560" y="360" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#666666">Weak correspondence (dotted)</text>

  <text x="60" y="390" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Close to definite: Meyer expectation theory, Huron ITPRA theory</text>
  <text x="60" y="408" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Prominent: Pressing improvisation model, sonata form, groove theory, auditory landscape analysis, research on the universality of songs</text>

  
  <rect x="40" y="440" width="720" height="130" rx="8" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1" />
  <text x="60" y="465" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#2C2C2C" font-weight="bold">Overall evaluation summary</text>
  <text x="60" y="490" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Seven out of ten theories have strong structural correspondence, and three have conditional correspondence. Theory without correspondence is zero.</text>
  <text x="60" y="510" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">“Edges” are identified at multiple levels: suspense, zones of optimal deviation, modulation of development, and perceptual bistability.</text>
  <text x="60" y="530" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Its unique strength is that "expectation → deviation → re-evaluation" appears recursively from milliseconds to centuries.</text>
  <text x="60" y="550" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Edge typology: Possibility space type (temporal artistic preservation of prediction errors, physical entrainment).</text>
</svg>