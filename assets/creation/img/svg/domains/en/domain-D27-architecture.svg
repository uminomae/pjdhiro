  <text x="60" y="390" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Almost certain: Alexander, Otto, van Eyck, Hertzberger, between</text>
  <text x="60" y="400" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">No correspondence: Schumacher (parametricism) — structurally inconsistent with the 5 stages in the direction of edge elimination</text>

  
  <rect x="40" y="430" width="720" height="140" rx="8" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1" />
  <text x="60" y="455" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#2C2C2C" font-weight="bold">Overall evaluation summary</text>
  <text x="60" y="480" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Confirmed structural correspondence in 10 out of 12 theories. This is a particularly powerful area among all 30 areas.</text>
  <text x="60" y="500" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">The density of resonance with the ``edges'' stands out: Architecture is essentially a discipline that deals with ``designing boundaries.''</text>
  <text x="60" y="520" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">``Boundaries are bands, not lines'' has been independently discovered by multiple theorists.</text>
  <text x="60" y="540" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Rim Typology: Band Design Type — The only area where you “design the rim.” Shift from description to manipulation.</text>
  <text x="60" y="560" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">``Ba'' appears not as a blank space but as an active composition of blank spaces (Aravena).</text>
