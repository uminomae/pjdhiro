  <text x="552" y="258" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#2C2C2C">(Collins)</text>
  <text x="552" y="280" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#2C2C2C">Organizational isomorphism</text>
  <text x="552" y="298" text-anchor="middle"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#2C2C2C">(DiMaggio/Powell)</text>

  
