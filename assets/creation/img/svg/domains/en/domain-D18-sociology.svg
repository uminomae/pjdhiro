  <rect x="48" y="378" width="712" height="180" rx="6" fill="none" stroke="#E0DDD8" stroke-width="1" />
  <text x="68" y="402"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14px" fill="#2C2C2C" font-weight="600">Overall response evaluation summary</text>

  <text x="68" y="428"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Degree of correspondence: Overall strong (7 out of 11 theories have strong structural correspondence)</text>

  <text x="68" y="454"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Strong correspondence: Giddens structuring theory, DiMaggio/Powell institutional isomorphism, Collins interaction ritual chain, social movement theory, etc.</text>

  <text x="68" y="478"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Feature 1: Area where “edge” is most abundantly embodied — 11 different types of edge in 11 theories</text>

  <text x="68" y="502"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Feature 2: Confirm support on multiple scales from micro (Collins face-to-face interaction) to macro (Giddens structuring)</text>

  <text x="68" y="526"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Feature 3: Explicit bundle → field circulation — Giddens, Collins, Berger/Luckmann, described in social movement theory</text>

  <text x="68" y="550"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Feature 4: Granovetter's weak ties are the purest sociological formulation of "edges"</text>
