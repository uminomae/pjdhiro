  <text x="60" y="390" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Almost confirmed: Zeamika Densho, Improvisational Theater (Johnstone/Spolin), Fischer-Lichte, Viewpoints</text>
  <text x="60" y="400" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#666666">Conditional: Laban Body Movement Analysis, Schechner Performance Research</text>

  
  <rect x="40" y="430" width="720" height="140" rx="8" fill="#FAFAF8" stroke="#E0DDD8" stroke-width="1" />
  <text x="60" y="455" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#2C2C2C" font-weight="bold">Overall evaluation summary</text>
  <text x="60" y="480" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">A strong area overall. The “edge → vortex” transition is described in a directly observable manner.</text>
  <text x="60" y="500" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">The most multi-layered description of "edge": physical relationship/performer-audience FB/form and internal process/social boundaries.</text>
  <text x="60" y="520" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">The "vortex" cannot be reached according to the plan. It is described as something that spontaneously appears when the marginal conditions are met.</text>
  <text x="60" y="540" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Type of edge: Operational definition type — "Yes and..." simultaneously practices the three conditions of edge in one word.</text>
  <text x="60" y="560" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">The block (improvised stop) is connected to the blind spot theme as a "vortex unreachable path".</text>
