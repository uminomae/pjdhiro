  <text x="60" y="480" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Structural compatibility was confirmed in 9 out of 10 cases. Areas with high overall correspondence.</text>
  <text x="60" y="500" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">The most important feature of En is: The intersection of effort and grace (crossing Christianity, Buddhism, and Islam).</text>
  <text x="60" y="520" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">There are two types: the persistent type (spiritual marriage/bakaa) and the cyclical type (eternal return/entering drate).</text>
  <text x="60" y="540" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Despite the diversity in the number of stages (7/10/100 stages), the overall flow is shared.</text>
  <text x="60" y="560" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">The positioning of "emptiness" (is it the limit of the vortex or the middle of the bundle → field) is an unresolved question.</text>
