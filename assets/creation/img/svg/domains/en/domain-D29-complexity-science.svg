  <text x="60" y="500" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">The central theme directly overlaps with the five-stage model: "Interaction of multiple elements → generation of new order."</text>
  <text x="60" y="520" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">SOC is the most rigorous scientific description of circulation. Clearly distinguish between two categories of places.</text>
  <text x="60" y="540" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Edge typology: Phase space type — 5 coordinates of threshold type/competition type/interface type/propagation type/structural type.</text>
  <text x="60" y="560" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#2C2C2C">Entropy increase and collapse into chaos are connected to the blind spot theme.</text>
