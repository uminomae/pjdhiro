  <rect x="48" y="378" width="712" height="180" rx="6" fill="none" stroke="#E0DDD8" stroke-width="1" />
  <text x="68" y="402"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14px" fill="#2C2C2C" font-weight="600">Overall response evaluation summary</text>

  <text x="68" y="428"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Correspondence: Overall high consistency (Tuckman shows the most intuitive correspondence among all 5 levels)</text>

  <text x="68" y="454"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Strong response (high): Tuckman (all 5 levels), Nonaka/Takeuchi SECI (all 5 levels) Medium: Weick, Christensen, March</text>

  <text x="68" y="478"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Feature 1: The strongest description of “edge” in D22 is Weick’s enactment — creating the environment through action.</text>

  <text x="68" y="502"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Feature 2: Confirm responses at four scales: individual/team/organization/industry — TPS/Lean implements retention systemization</text>

  <text x="68" y="526"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Feature 3: D1 connection (error pickup) has Christensen's weak signal retention, D3 connection (holding) has strong TPS automation</text>

  <text x="68" y="550"  font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12px" fill="#666666">Possible counter-evidence: Example of reversing the step order (Gersick), weakness of SECI driving principle, overemphasis on industrial scale (Christensen)</text>
