<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Title -->
  <text x="600" y="70" text-anchor="middle" font-size="40" fill="#D4A857">Track 9D — 数理形式化</text>

  <!-- Purpose -->
  <text x="600" y="120" text-anchor="middle" font-size="20" fill="#8B8682">Purpose: Express structural themes mathematically, enable theorem derivation</text>

  <!-- Math Frameworks and Themes -->
  <!-- Framework 1: Category Theory -->
  <text x="200" y="250" font-size="18" fill="#5B8DB8">Category Theory</text>
  <text x="900" y="250" text-anchor="end" font-size="18" fill="#5B8B6A">5 themes integration</text>
  <line x1="450" y1="245" x2="890" y2="245" stroke="#C45B4D" stroke-width="2" />
  <path d="M 890 245 L 880 240 L 880 250 Z" fill="#C45B4D" />

  <!-- Framework 2: Graph Theory -->
  <text x="200" y="315" font-size="18" fill="#5B8DB8">Graph Theory</text>
  <text x="900" y="315" text-anchor="end" font-size="18" fill="#5B8B6A">Edge Typology</text>
  <line x1="450" y1="310" x2="890" y2="310" stroke="#C45B4D" stroke-width="2" />
  <path d="M 890 310 L 880 305 L 880 315 Z" fill="#C45B4D" />

  <!-- Framework 3: Topological Spaces -->
  <text x="200" y="380" font-size="18" fill="#5B8DB8">Topological Spaces</text>
  <text x="900" y="380" text-anchor="end" font-size="18" fill="#5B8B6A">Field Multi-Layering</text>
  <line x1="450" y1="375" x2="890" y2="375" stroke="#C45B4D" stroke-width="2" />
  <path d="M 890 375 L 880 370 L 880 380 Z" fill="#C45B4D" />

  <!-- Framework 4: Dynamical Systems -->
  <text x="200" y="445" font-size="18" fill="#5B8DB8">Dynamical Systems</text>
  <text x="900" y="445" text-anchor="end" font-size="18" fill="#5B8B6A">Bundle-to-Field Recirculation</text>
  <line x1="450" y1="440" x2="890" y2="440" stroke="#C45B4D" stroke-width="2" />
  <path d="M 890 440 L 880 435 L 880 445 Z" fill="#C45B4D" />

  <!-- Framework 5: Fractal Geometry -->
  <text x="200" y="510" font-size="18" fill="#5B8DB8">Fractal Geometry</text>
  <text x="900" y="510" text-anchor="end" font-size="18" fill="#5B8B6A">Cross-Scale Self-Similarity</text>
  <line x1="450" y1="505" x2="890" y2="505" stroke="#C45B4D" stroke-width="2" />
  <path d="M 890 505 L 880 500 L 880 510 Z" fill="#C45B4D" />

  <!-- Framework 6: Lattice Theory -->
  <text x="200" y="575" font-size="18" fill="#5B8DB8">Lattice Theory</text>
  <text x="900" y="575" text-anchor="end" font-size="18" fill="#5B8B6A">Bundle Polymorphism</text>
  <line x1="450" y1="570" x2="890" y2="570" stroke="#C45B4D" stroke-width="2" />
  <path d="M 890 570 L 880 565 L 880 575 Z" fill="#C45B4D" />

  <!-- 5-Step Pipeline -->
  <!-- Step 1: Natural Language Analysis -->
  <text x="200" y="720" text-anchor="middle" font-size="18" fill="#D4A857">Natural Language Analysis</text>
  <line x1="300" y1="710" x2="350" y2="710" stroke="#C45B4D" stroke-width="2" />
  <path d="M 350 710 L 340 705 L 340 715 Z" fill="#C45B4D" />

  <!-- Step 2: Framework Selection -->
  <text x="400" y="720" text-anchor="middle" font-size="18" fill="#D4A857">Framework Selection</text>
  <line x1="500" y1="710" x2="550" y2="710" stroke="#C45B4D" stroke-width="2" />
  <path d="M 550 710 L 540 705 L 540 715 Z" fill="#C45B4D" />

  <!-- Step 3: Definition -->
  <text x="600" y="720" text-anchor="middle" font-size="18" fill="#D4A857">Definition</text>
  <line x1="700" y1="710" x2="750" y2="710" stroke="#C45B4D" stroke-width="2" />
  <path d="M 750 710 L 740 705 L 740 715 Z" fill="#C45B4D" />

  <!-- Step 4: Theorem Derivation -->
  <text x="800" y="720" text-anchor="middle" font-size="18" fill="#D4A857">Theorem Derivation</text>
  <line x1="900" y1="710" x2="950" y2="710" stroke="#C45B4D" stroke-width="2" />
  <path d="M 950 710 L 940 705 L 940 715 Z" fill="#C45B4D" />

  <!-- Step 5: Verification -->
  <text x="1000" y="720" text-anchor="middle" font-size="18" fill="#D4A857">Verification</text>
</svg>
