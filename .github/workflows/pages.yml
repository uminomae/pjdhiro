name: Deploy Jekyll site to Pages

# main への push で必ずビルド＆デプロイが走る（レガシー自動ビルド不発の再発防止）
on:
  push:
    branches: [main]
  workflow_dispatch: # 手動実行も可

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1本に集約（連続 push でも最新を確実に反映）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'      # ローカル 3.3.x に合わせる
          bundler-cache: true      # Gemfile.lock を使ってキャッシュ
      - name: Build with Jekyll
        # baseurl は _config.yml の "/pjdhiro" をそのまま使う（ローカルビルドと同一）
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
